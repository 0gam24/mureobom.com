human_notes: |
  차별화: 신용대출과 달리 신용조회·심사 없이 즉시 받는 '내 해지환급금 담보' 구조를 표로 대비.
  미상환 시 이자가 원금에 가산되어 해지환급금을 잠식, 계약이 실효될 수 있다는 리스크를 명확히.
  "보험계약대출을 받으면 보장이 사라진다"는 통념 반박(보장은 유지, 단 미상환 누적 위험).
  단정적 수익·금리 약속 금지 — 상품별 상이함을 반드시 명시(F-* 가드).
