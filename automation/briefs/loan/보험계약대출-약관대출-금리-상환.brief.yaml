  - 대출 한도(해지환급금의 일정 비율)와 대출 가능 상품
  - 금리 구조(가산금리 + 기준이 되는 예정이율/공시이율), 상품별 차이
  - 상환 방식(만기 없음, 수시상환, 미상환 시 이자 원금 가산·해지 위험)
  - 신용점수 영향 여부, 중도상환수수료 유무
  - 흔한 오해(대출받으면 보장 사라진다? 신용등급 떨어진다?) 바로잡기

