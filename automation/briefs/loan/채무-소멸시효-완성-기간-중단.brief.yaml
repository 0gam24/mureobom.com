human_notes: |
  차별화: '추심 연락이 오면 시효가 되살아난다' '소액이라도 갚으면 리셋된다'는 두 가지 흔한 오해를 정면으로 구분하는 표(단순 독촉 vs 재판상 청구, 일부 변제=승인의 함정)를 중심에 두고, 채권 종류별 시효 기간(민사 10년·상사 5년·판결 확정 10년)을 한눈에 정리하는 각도.
  최신 기준연도 2026 확인: 소멸시효 기간은 민법·상법 조문 기반이라 연도 변동 요소가 적으나, 중단·완성채권 매각 관련 금감원 안내는 갱신본으로 대조.
  자주 틀리는 통념: (1)시효 완성=빚이 자동으로 사라짐이 아니라 '항변'해야 소멸을 주장할 수 있다는 점, (2)일부 변제·"갚겠다"는 각서가 '승인'으로 시효를 다시 처음부터 진행시킬 수 있다는 점을 반드시 경고.
  비자문 고지 유지: 개별 채무의 시효 완성 여부·항변은 사안별로 다르므로 단정적 판단 금지, 일반정보 고지 노출. 특정 추심 대응·소송 전략 조언 금지(F-*).
