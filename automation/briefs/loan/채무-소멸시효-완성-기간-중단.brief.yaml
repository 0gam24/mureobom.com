id: loan-채무-소멸시효-완성-기간-중단
cluster: loan
status: published           # compliance 게이트 통과, 발행 승인 (2026-07-14 KST 스케줄)

target_query: "빌린 돈 안 갚으면 소멸시효 언제 완성되나요 시효 중단은"
search_intent: 정보형        # 채무 소멸시효 기간·중단 사유를 이해하고 싶어함

signal:                     # 수동 선정 gap-filling(읽기 전용, 원문 아님)
  score: 45.0
  trend_momentum: 0.45
  question_volume: 0.46
  cluster_fit: 1.0
  freshness: 0.5

must_cover:
  - 소멸시효 개념: 일정 기간 권리를 행사하지 않으면 채권이 소멸한다는 원칙(기산점은 변제기 등 권리 행사 가능 시점)
  - 채권 종류별 시효 기간: 일반 민사채권 10년(민법 제162조), 상사채권 5년(상법 제64조), 이자·임금 등 단기소멸시효 채권(민법 제163·164조)
  - 판결 등으로 확정된 채권은 단기시효 채권이라도 시효가 10년으로 연장(민법 제165조)
  - 시효 중단 사유: 청구(소송·지급명령), 압류·가압류·가처분, 승인(채무자가 빚 인정)로 그때까지 진행한 기간이 리셋됨(민법 제168조)
  - 시효 완성 후 채무자가 할 수 있는 것: 시효 완성 항변(소송에서 주장), 소멸시효 완성 사실 자체는 자동 소멸이지만 실무상 항변 필요
  - 흔한 오해 1: 추심 연락·독촉장만 와도 시효가 살아난다? → 재판상 청구가 아닌 단순 독촉은 중단 효력 제한(최고 후 6개월 내 소제기 등 필요)
  - 흔한 오해 2: 소액이라도 갚거나 갚겠다고 하면 시효가 리셋된다? → 일부 변제·채무 승인은 승인에 해당해 시효가 다시 처음부터 진행될 수 있음(주의 케이스)

required_sources:           # 공식 1차 출처만(화이트리스트 도메인). 0건이면 발행 차단
  - "민법 제162조~제165조 소멸시효 기간 (국가법령정보센터 law.go.kr)"
  - "민법 제168조 소멸시효의 중단사유 (국가법령정보센터 law.go.kr)"
  - "상법 제64조 상사시효 (국가법령정보센터 law.go.kr)"
  - "찾기쉬운 생활법령정보 소멸시효 안내 (easylaw.go.kr)"
  - "금융감독원 금융소비자정보포털 '파인' 소멸시효 완성채권 안내 (fss.or.kr)"

