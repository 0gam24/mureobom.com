  - 가입 — 누구나(연령·자격 제한 없음), 월 2만~50만 자유 납입
  - 국민주택 1순위 — 수도권 1년+12회 / 지방 6개월+6회 / 규제지역 2년+24회 (주택공급규칙 §27)
  - 민영주택 1순위 — 가입기간 + 지역별 예치금 (§28, 별표2)
  - 지역별 예치금 — 면적·지역별 차등 (정확 금액은 청약홈 확인)
  - 청약가점제 — 무주택기간·부양가족수·가입기간 84점 만점 (세부 배점 청약홈 확인)
  - 청년 주택드림 청약통장 — 전환 가능 (우대 수치는 은행 확인)
  - 소득공제 — 무주택 세대주, 연 300만 한도 40% (조특법 §87, 2028까지)
  - 가입 방법 — 시중은행, 청약홈

