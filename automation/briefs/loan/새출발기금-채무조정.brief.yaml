target_query: "새출발기금 채무조정"
search_intent: 정보형

signal:
  cluster_fit: 1.0
  freshness: 0.85
  manual: true

must_cover:
  - 새출발기금 개요 — 코로나19 피해 소상공인·자영업자 채무조정, 한국자산관리공사(KAMCO) 운영
  - 부실차주(연체 90일+) vs 부실우려차주(연체 90일 미만) — 지원내용 차이
  - 채무조정 — 부실차주 원금 감면 0~80%, 취약계층 최대 90% (2025.9.18 강화안, 1억 이하 무담보 한정)
  - 분할상환 — 최장 10년 (강화안 무담보는 20년까지)
  - 이자 감면 — 별도
  - 신청 자격 — 사업자등록 또는 폐업한 개인사업자
  - 신청 — 새출발기금 누리집(새출발기금.kr), 1660-1378, 캠코 사무소·서금센터
  - 신용회복위 채무조정과 차이 — 신복위는 일반(주로 신용채무), 새출발기금은 자영업자 담보·보증 포함
  - 사칭 사기 주의

required_sources:
  - "한국자산관리공사 — 새출발기금 개요·신청대상"
  - "한국자산관리공사 — 채무조정 지원내용"
  - "한국자산관리공사 — 채무조정 대상대출"
  - "금융위원회 — 새출발기금 확대(2025.9.18)"
  - "금융위원회 — 새출발기금 주요 이슈 Q&A"
  - "금융위원회 — 새출발기금 출범 안내"
