human_notes: |
  차별화: "LTV는 아는데 왜 대출이 그만큼 안 나오지?"의 진짜 원인인 방공제를
  지역별 소액임차보증금 표로 수치화하고, MCI/MCG로 되살리는 실무 경로까지 한 흐름으로.
  기발행 loan/소액임차인-최우선변제-기준(임차인 관점)과 각도가 반대 — 여기선 대출자(집주인)
  관점의 한도 차감. 의미중복 아님.
  방공제액=최우선변제 소액보증금 기준액이므로 시행령 제10조 최신 금액을 반드시 대조.
  단정적 금리·승인 약속 금지(F-*). MCI/MCG는 보험/보증이라 세대당 건수·중복 제한 명시.
