  - 변동금리 정의(코픽스 등 지표 연동, 6개월/1년 주기 재산정)와 장단점 — 초기 금리 낮음·상승 위험
  - 혼합형(초기 일정기간 고정 후 변동)과 주기형(주기마다 재산정) 구분 — 흔히 뒤섞이는 용어 정리
