  - 스트레스 DSR에서 금리유형별 가산 차이 — 고정형일수록 스트레스 완화(한도 유리)라는 최신 규제 포인트
  - 금리 유형 변경·갈아타기, 정책 고정금리(보금자리론 등)와의 관계 — 사후 조정 경로

