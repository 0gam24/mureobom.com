human_notes: |
  차별화: LTV·한도 글(loan/주택담보대출-ltv-한도-규제지역)과 완전 분리한 '금리 유형 선택' 전용 글 — 고정/변동/혼합형/주기형 4유형 개념·유불리를 스트레스 DSR 가산 차이(고정형일수록 완화)까지 엮어 표로 비교. 한도·LTV·규제지역은 다루지 않고 링크로만 위임.
  검수: 스캐너 큐 소진으로 운영자 수동 선정(score 0은 정상, 신호 부재 아님).
  검수: 특정 은행 금리 수치·전망을 단정하지 말 것 — 금리는 코픽스/기준금리에 연동되어 변동하므로 "~일 수 있다/구조" 서술로 한정, 개별 상품 금리 표기 금지.
  검수: 혼합형과 주기형 용어를 뒤섞는 통념 주의 — 2024년 이후 신규 취급 구조 기준으로 구분 명시. 스트레스 DSR은 최신 시행 단계(3단계) 기준연도 확인.
