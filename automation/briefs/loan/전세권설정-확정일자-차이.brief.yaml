human_notes: |
  차별화: 전세권설정등기 vs 확정일자(+전입신고) — 비용·효력·우선변제권·집주인 동의 필요 여부 비교표와 상황별 선택. 기발행 임차권등기명령·전세자금대출 글과 내부링크, "사전 보증금 보호수단 비교" 각도.
  기준연도 2026 명시 — 등록면허세율·확정일자 수수료 등 비용 수치는 최신 기준 확인.
  자주 틀리는 통념: "확정일자=전세권설정"이라는 혼동, 전세권설정은 임대인 동의가 필수라는 점 강조.
  내부링크는 발행 완료 슬러그만 사용(임차권등기명령·전세자금대출 확인됨).
