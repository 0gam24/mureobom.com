human_notes: |
  차별화: 깡통전세(전세가>매매가)·역전세(시세 하락 보증금 미반환 위험) 대처 — 위험 자가진단(시세·근저당·선순위), 반환보증 가입, 임차권등기, 전세사기 신고를 묶는 절차형 허브. 기발행 임차권등기명령·전세사기 피해자 지원·전세대출 글과 내부링크.
  검수 포인트:
  - 전세보증금반환보증 가입 가능 전세가율 한도·기준 연도는 자주 바뀌니 2026 최신 기준만 명시.
  - "확정일자=절대 안전"은 오해 — 선순위 근저당·다가구 선순위 임차보증금이 있으면 우선변제 순위가 밀린다. 자가진단 단락에서 반드시 반박.
  - 보증보험은 가입 요건 미충족·전세가율 초과 시 거절될 수 있고 전액 보전이 아님을 분명히.
