must_cover:
  - 신용회복위원회 개요 — 서민의 금융생활 지원에 관한 법률, 신복위 운영
  - 채무조정 3종 — 신속채무조정 / 사전채무조정 / 개인워크아웃
  - 신속채무조정 — 연체 30일 이내, 이자 감면·상환기간 연장 (감면 없음)
  - 사전채무조정 — 연체 31~89일, 약정이자율 감면
  - 개인워크아웃 — 연체 90일 이상, **미상각 최대 30%·상각 20~70%** 채무 감면, 무담보 최장 8년/담보 최장 35년 분할상환
  - 신청 자격 — 총채무액 15억 이하, 본인 명의 채무
  - 신청 방법 — ccrs.or.kr, 1600-5500, 방문
  - 개인회생·파산과의 차이 — 법원 절차와 사적 조정
  - 신용정보(연체정보) 영향

