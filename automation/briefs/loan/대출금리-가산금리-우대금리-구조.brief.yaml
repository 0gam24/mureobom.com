human_notes: |
  차별화: '한국은행 기준금리 = 내 대출금리'라는 통념을 정면으로 깨고, 대출금리를 지표금리·가산금리·우대금리 3층 구조로 분해해 소비자가 실제로 손댈 수 있는 부분(우대금리·금리인하요구)을 짚어주는 각도.
  코픽스(COFIX)는 은행연합회 공시값이지만 원문 캡처 없이 개념만 설명. 은행별 실제 금리표는 인용하지 않고 산정 '구조'만 다룬다.
  단정적 금리 예측·특정 상품 추천 금지(F-*). 금리는 시점·개인 신용·은행별로 다르다는 일반정보 고지 유지.
