target_query: "대출금리는 어떻게 정해지나요 기준금리 가산금리 우대금리"
search_intent: 정보형        # 금리 산정 구조를 이해하고 싶어함

signal:                     # 스캐너 산출(읽기 전용, 원문 아님)
  score: 46.0
  trend_momentum: 0.48
  question_volume: 0.44
  cluster_fit: 1.0
  freshness: 0.5

must_cover:
  - 대출금리 = 기준금리(지표금리) + 가산금리 − 우대금리(가감조정금리) 구조
  - 기준금리(지표금리)의 종류: 코픽스(COFIX), 금융채, CD 등과 한국은행 기준금리와의 관계
  - 가산금리 구성 요소(업무원가, 리스크프리미엄, 자본비용, 목표이익률 등)
  - 우대금리(가감조정금리) 항목과 우대 조건(급여이체, 카드실적, 자동이체 등)
  - 고정금리 vs 변동금리에서 지표금리가 바뀔 때 금리가 어떻게 움직이는지
  - 금리인하요구권 등 소비자가 금리를 낮출 수 있는 방법(간단 연결)
  - 흔한 오해(한국은행 기준금리가 곧 내 대출금리가 아니다) 바로잡기

required_sources:           # 공식 1차 출처만. 0건이면 발행 차단
  - "금융감독원 금융소비자정보포털 '파인' 대출금리 산정체계 안내"
  - "금융위원회 대출금리·금리인하요구권 관련 보도·안내자료"
  - "한국은행 기준금리 및 통화정책 안내"

