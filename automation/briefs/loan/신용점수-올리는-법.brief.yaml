must_cover:
  - NICE(나이스평가정보) vs KCB(코리아크레딧뷰로) 점수 차이가 발생하는 메커니즘(가중치·반영 시점 차이)
  - 신용점수 산정 5대 요소(상환이력·부채수준·신용기간·신용형태·신용조회) 비중과 각 요소를 움직이는 실제 행동
  - 비금융 정보 가점 — 통신비/국민연금/건강보험료 납부내역 자동 반영 vs 직접 신청 반영 구분, 신청 채널과 반영 시점
  - 신용점수 조회의 점수 영향(본인조회는 점수 무영향, 신용조회 항목은 신규 대출/카드 신청 등에만 반영되는 구조)
  - 흔한 오해 바로잡기(현금만 써도 점수 좋다?, 한 번 연체로 영구 하락?, 카드 해지하면 무조건 유리?)
  - 신용회복 절차 — 단기연체/장기연체/채무조정 단계별 점수 회복 평균 소요기간과 신용회복위원회 개인채무조정 개요
  - 2026 기준 점수가 실제로 올라가기까지 걸리는 시간(연체이력 유무·금액별) 현실적 안내

