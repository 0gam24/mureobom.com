human_notes: |
  차별화: NICE vs KCB 점수 차이 발생 메커니즘 + 통신비/국민연금/건보료 비금융 정보 "자동 반영 vs 신청 반영" 구분 표 + 연체이력별 점수 회복 평균 기간(현실치) 명시.
  금융 표현 가드 — F-01 단정적 약속 금지: "X점 보장", "○개월이면 무조건 회복", "이 방법이면 100% 오름" 류 표현 금지. 모든 수치는 "일반적 사례", "평균적으로", "개인 신용이력에 따라 다름" 톤으로.
  F-02 특정 상품/플랫폼 추천 금지 — 토스/카카오뱅크/뱅크샐러드 등 신용점수 조회 앱 이름 명시 금지. "본인 명의 신용평가사 무료조회 또는 금융기관 앱"처럼 일반 명사로.
  검수 포인트: (1) NICE/KCB는 민간사 — 1차 출처는 금감원·금융위·신용정보원 발표자료로 제한하고 민간사 자체 마케팅 페이지 인용은 피할 것. (2) 비금융정보 가점 제도는 연도별로 반영 항목이 확대되어왔으니 2026 최신 기준 확인. (3) "신용등급"은 2021년 폐지 — 현재는 1~1000점 신용점수제. 이 변경을 모르는 통념 단락에 포함.
