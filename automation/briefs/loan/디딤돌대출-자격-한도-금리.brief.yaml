human_notes: |
  차별화: 기존 loan 5편(신용점수·DSR·전세·LTV·신용대출)과 분리. 무주택 첫 집 마련용 정책대출 단독.
  검수 포인트:
  - 금리·한도는 매년 변동 → "발행 시점(2026-05) 기준, 최신은 주택도시기금 포털 확인" 본문 명시.
  - F-01 단정 금지 — "최저 1.80%" X, "다자녀 우대 적용 시 연 1.80%~2.65% 구간" O.
  - F-02 추천 금지 — 시중은행 영업 페이지 링크 X, 주택도시기금 또는 HF만.
  - 보금자리론 비교는 표 1개로 제한, 본문 길게 늘리지 말 것.
