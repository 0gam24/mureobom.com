human_notes: |
  차별화: 리볼빙(일부결제금액이월약정) — 구조·실제 수수료율(고금리)·잔액/이자 누적 위험·약정 해지 및 축소 방법. 기발행 카드론·현금서비스·마이너스통장 글과 의도 분리(리볼빙 단일 의도)·내부링크.
