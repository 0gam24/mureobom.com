human_notes: |
  차별화: 기존 loan 글이 한도·금리·자격 중심인 것과 달리, 아직 미발행인 '상환 구조 비교'
  공백을 메운다 — 원리금균등·원금균등·만기일시·거치식을 같은 원금·금리·기간 가정의 총이자
  비교표 하나로 한눈에 정리하고, 상환방식이 DSR·중도상환수수료로 이어지는 영향까지 연결한다.
  스캐너 큐 소진으로 운영자가 사이트 공백을 메우려 수동 선정한 토픽(score=0, 신호 미측정).
  검수 포인트: (1) 총이자 예시는 반드시 "같은 원금·금리·기간" 전제를 명시하고 특정 은행·상품
  수치를 단정하지 말 것(일반 원리 설명으로). (2) "원리금균등이 무조건 유리/불리"는 흔한
  통념이니 상황별(현금흐름 vs 총이자) 유불리로 균형 있게. (3) 초기 상환부담 크기 순서
  (원금균등 > 원리금균등 > 만기일시)와 총이자 크기 순서(만기일시 > 원리금균등 > 원금균등)를
  혼동하지 말 것.
