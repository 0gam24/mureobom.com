target_query: "대출 상환방식 원리금균등 원금균등 만기일시 차이"
search_intent: 정보형     # 상환 구조·총이자·유불리를 비교 이해하려는 의도

signal:                  # 스캐너 산출 아님 — 운영자 수동 선정(큐 소진 공백 보강). 집계 수치만
  score: 0
  trend_momentum: 0
  question_volume: 0
  cluster_fit: 1.0
  freshness: 1.0

must_cover:
  - 원리금균등상환 — 매월 원리금(원금+이자) 합계가 동일, 초기에는 이자 비중이 크고 갈수록 원금 비중 증가
  - 원금균등상환 — 매월 갚는 원금이 동일, 초기 상환부담이 가장 크지만 잔액이 빨리 줄어 총이자가 가장 적음
  - 만기일시상환 — 만기까지 이자만 내고 원금은 만기에 일시 상환, 매월 부담은 작지만 총이자가 가장 큼
  - 거치기간 개념 — 원금 상환을 미루고 이자만 내는 기간(거치식), 거치 후 원리금/원금 균등으로 전환되는 구조
  - 총이자 비교 예시 — 같은 원금·금리·기간을 가정했을 때 방식별 총이자·초기 월납입액 차이(원금균등 < 원리금균등 < 만기일시)
  - 상환방식이 DSR·중도상환에 미치는 영향 + 상황별 유불리(현금흐름 여유 vs 총이자 최소화, 단기 보유·매도 예정 등)

required_sources:        # 공식 1차 출처만. 은행 상품페이지·개인 블로그·질의응답 게시판 금지. 0건이면 발행 차단
  - "금융감독원 금융소비자정보포털 '파인'(fine.fss.or.kr) — 대출 상환방식(원리금균등·원금균등·만기일시) 안내"
  - "금융감독원(fss.or.kr) — 대출 이용 시 유의사항·상환방식별 이자 부담 안내"
  - "은행법 / 대부업법 등 관련 법령 (국가법령정보센터 law.go.kr) — 상환 관련 규정 확인이 필요한 경우"

