must_cover:
  - 근저당권 말소가 왜 필요한가 - 대출을 완제해도 근저당권은 자동 소멸되지 않고 등기부에 남는다. 재대출·매매 시 걸림돌이 되므로 별도 말소 등기가 필요.
  - 말소에 필요한 서류 - 은행이 완제 후 발급하는 근저당권 해지(말소) 서류(위임장, 근저당권설정계약 해지증서, 등기필정보/등기필증 등) 구성.
  - 셀프 말소등기 vs 법무사(은행 대행) 비용 비교 - 대행 수수료가 붙는 경우와 직접 처리 시 실비만 드는 경우의 총액 차이.
  - 신청 경로 - 대법원 인터넷등기소 전자신청 절차와 관할 등기소 방문 절차의 단계별 흐름.
  - 실제 비용 항목 분해 - 등록면허세(부동산 1건당 6,000원)·등기신청수수료(전자/방문 차등)·지방교육세 등 항목별 금액.
  - 방치했을 때 생기는 구체적 불이익 - 새 대출 실행 지연, 매매 잔금일 지연, 은행 폐점·합병 시 서류 재발급 번거로움.

required_sources:        # 공식 1차 출처만. 0건이면 발행 차단
  - "부동산등기법 (국가법령정보센터, law.go.kr)"
  - "대법원 인터넷등기소 등기신청 안내 (iros.go.kr)"
  - "지방세법 등록면허세 규정 (국가법령정보센터, law.go.kr)"
  - "대한법률구조공단 법률정보 근저당권 말소 (klac.or.kr)"

