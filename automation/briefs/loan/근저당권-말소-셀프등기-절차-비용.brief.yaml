human_notes: |
  차별화: 셀프 말소등기 실제 비용 항목별 분해(등록면허세 6,000원 + 수수료 + 지방교육세) 후 은행 대행/법무사 총액과 나란히 비교표 + 방치 리스크(재대출·매매 지연) 강조.
  검수 포인트: 등록면허세·등기신청수수료 금액은 지방세법·인터넷등기소 최신 고시 기준으로 researcher가 재확인(2026 기준). 전자신청과 방문신청 수수료가 다르니 표기 구분.
  자주 틀리는 통념: "대출 다 갚으면 근저당권이 알아서 없어진다"는 오해를 초반에 명확히 반박. 은행은 서류만 내주고 말소 신청은 채무자 몫임을 명시.
