human_notes: |
  차별화: 5천만→1억 상향을 "시행 시기 × 적용 대상(예보 대상 여부)" 축으로 정리하고,
  예금보험공사 보호 대상(은행·저축은행 등) vs 별도 자체기금 보호(새마을금고·신협·우체국)를
  구분하는 표 + 흔한 통념 반박. 원금+소정이자 합산·금융회사별 별도 한도 개념 명확화.
  검수 포인트:
  - 시행 시기는 개정법 부칙 기준으로 확정 표기(추측성 "곧" 금지). 시행 전/후 한도 구분 명시.
  - 새마을금고·신협·우체국은 예보 대상 아님 — 각 자체제도(우체국은 국가 전액보장) 정확히.
  - 한도는 "1인당 금융회사별" 개념: 한 금융회사 여러 계좌는 합산, 다른 회사는 별도.
