id: loan-예금자보호-한도-1억-상향-시행시기
cluster: loan
status: approved          # 운영자 일일 자동 발행 스케줄 = 즉석 승인

target_query: "예금자보호 한도 1억 상향 언제부터 대상 은행 저축은행"
search_intent: 정보형      # 제도 변경 사실·시기·적용 대상 확인 목적

signal:                   # 수동 선정(topic-queue stale 대체) 근사 추정치, 집계 수치만
  score: 55
  trend_momentum: 0.35
  question_volume: 0.45
  cluster_fit: 0.9
  freshness: 1.0

must_cover:
  - 예금자보호제도 기본 구조(예금보험공사, 보호 대상 금융회사·상품 범위)
  - 보호한도 5천만원→1억원 상향의 근거 법령(개정 예금자보호법)과 시행 시기
  - 금융회사별 한도 적용 방식(같은 금융회사 내 여러 계좌 합산, 원금+소정이자 기준)
  - 예금보험 대상이 아닌 기관(새마을금고·신협·우체국 등)의 별도 보호제도 구분
  - 보호되지 않는 상품(투자상품·실적배당형 등) 주의
  - 흔한 통념 바로잡기("모든 금융권 즉시 1억 보호", "새마을금고·신협도 예보 보호")

required_sources:         # 공식 1차 출처만. WebFetch 화이트리스트 도메인. 0건이면 발행 차단
  - "예금자보호법 / 예금자보호법 시행령 (국가법령정보센터 law.go.kr)"
  - "금융위원회 보도자료·정책 안내 (fsc.go.kr)"
  - "금융감독원 금융소비자 정보 (fss.or.kr)"

