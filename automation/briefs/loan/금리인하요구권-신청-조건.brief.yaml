human_notes: |
  차별화: 금리인하요구권 — 신청 사유(취업·승진·소득증가·신용점수 상승·부채감소)별 자격, 대상 대출, 신청 절차(영업점/앱), 금융권 수용률. 기발행 신용점수/신용대출/대환 글과 내부링크, "사유별 수용 가능성" 각도.
  검수 포인트:
  - 수용률·이자 감면액은 반기 공시로 갱신되니 2026 최신 공시 기준연도 명시(작년 수치 그대로 두지 말 것).
  - 자주 틀리는 통념: "고정금리는 무조건 안 된다" / "거절당하면 끝" — 상품별 반영 여부와 재신청 가능을 정확히 구분.
  - 수용률 표는 업권별 비교공시(은행연합회·각 협회)를 근거로 — 비공식 UGC 출처 수치 금지.
