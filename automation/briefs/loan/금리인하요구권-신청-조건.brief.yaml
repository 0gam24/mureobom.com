  - 신청 사유별 자격(취업·승진·이직, 연소득 증가, 신용점수 상승, 부채 감소·상환)
  - 적용 대상 대출(개인신용·주택담보·전세·사업자 등)과 제외·불가 케이스(정책금융·고정형 등 약정상 금리 미반영 상품)
  - 신청 절차 — 영업점 방문 vs 모바일앱/인터넷뱅킹 비대면 신청, 제출 증빙(재직증명·소득금액증명·원천징수영수증 등)
  - 신청 후 처리 흐름 — 영업일 내 심사·수용/미수용 통보, 미수용 시 사유 안내, 재신청 가능 여부
  - 금융권 수용률 데이터 — 은행·카드·보험 업권별 신청 대비 수용 비율과 이자 감면액 추세(반기 공시 기준)
  - 다른 사이트가 놓치는 케이스 — "신용점수만 올라도 되나" 단독 사유의 실제 수용 가능성, 변동금리 갱신 시점과 별개로 언제든 신청 가능하다는 점

