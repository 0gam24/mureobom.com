target_query: "주택연금 가입조건 월수령액 2026"
search_intent: 정보형

signal:
  cluster_fit: 1.0
  freshness: 0.75
  manual: true

must_cover:
  - 주택연금 개요 — 한국주택금융공사법, HF 운영, 종신연금
  - 가입조건 — 만 55세 이상 (2020.4 인하), 부부 중 1명이 대한민국 국민
  - 대상 주택 — 공시가격 12억 이하, 단독·다세대·아파트·노인복지주택·주거 오피스텔
  - 부부 합산 12억 이하 (다주택자 가능)
  - 지급 방식 — 종신지급/종신혼합/확정기간 등 (이용 현황 종신 63%)
  - 월 수령액 — 가입 연령·주택 가격에 따라 차등 (예: 70세·3억 = 약 92.3만 원)
  - 가입 후 본인 거주 — 사망 시까지 종신 거주, 주민등록 전입 필수
  - 보증료 — 초기 1.0% + 연 0.95%
  - 종료 — 부부 모두 사망 시 주택 매각으로 대출 상환, 잔액은 상속자에게 (비소구)
  - 기초연금·국민연금과 별개 (중복 수령 일반적으로 가능, 본인 케이스 상담)

