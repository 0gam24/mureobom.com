human_notes: |
  차별화: 스트레스 DSR 3단계(2026 시행) — 스트레스(가산) 금리 적용으로 대출한도 축소 구조, 대상(주담대·신용·기타대출)·적용 시기·지역별 차등, 한도 영향 계산 예시. 기발행 DSR 계산 글의 심화(스트레스 가산 단일 의도)로 의도 분리.
  스트레스 금리(가산금리) 수치·반영 비율은 단계별로 다르니 2026 3단계 최신 기준 명시 — 1·2단계 수치와 혼동 주의.
  지역별 차등(수도권 vs 비수도권)은 자주 틀리는 포인트 — 금융위 공식 발표 기준으로 확인.
  "스트레스 DSR = DSR 규제 강화"로 단정하지 말 것. 실제 차주가 부담하는 금리가 오르는 게 아니라 한도 산정용 가산이라는 점 구분.
