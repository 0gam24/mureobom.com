human_notes: |
  차별화: 전세보증금 반환보증(HUG) — 가입 대상·보증한도·보증료율·가입 시기(잔여기간)·필요서류, 전세사기 사전 예방 핵심 수단. 기발행 깡통전세·전세사기 피해자 지원·임차권등기(사후 대응) 글과 의도 분리(사전 보증 가입 단일 의도).
  검수 포인트: (1) 보증료율·보증한도는 연도별로 바뀌니 2026 최신 기준 명시 — 과거 요율 복붙 주의.
  (2) 가입 시기(전세계약 잔여기간) 마감 기한이 다른 사이트가 자주 놓치는 지점 — 신규/갱신 계약별 기한을 표로 분리.
  (3) "전세대출 받으면 자동으로 반환보증된다"는 통념 반박 단락 필요(대출보증 vs 반환보증 구분).
