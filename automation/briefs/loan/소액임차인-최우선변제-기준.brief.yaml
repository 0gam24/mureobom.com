must_cover:
  - 소액임차인 최우선변제란 무엇인가 — 경매·공매 시 보증금 일부를 다른 담보권자보다 먼저 배당
  - 지역별 보증금 기준(서울/과밀억제권역/광역시/그 외)과 최우선변제 금액 상한
  - 최우선변제 요건 — 경매개시결정 등기 전 대항요건(주택 인도 + 전입신고) 확보, 배당요구 종기까지 배당요구
  - 최우선변제금은 주택가액(대지 포함)의 1/2 범위 내로 제한된다는 점
  - 기준 시점(임차 시점이 아니라 담보물권 설정 시점의 시행령 기준 적용) 주의
  - 흔한 오해(전입신고만 하면 무조건 전액 우선? 확정일자와 최우선변제의 차이) 바로잡기

required_sources:           # 공식 1차 출처만. 0건이면 발행 차단
  - "주택임대차보호법 (국가법령정보센터 law.go.kr)"
  - "주택임대차보호법 시행령 — 우선변제를 받을 임차인의 범위·보증금 중 일정액 (law.go.kr)"
  - "대한법률구조공단 주택임대차 법률정보"

