search_intent: 정보형        # 내 보증금이 최우선변제 대상인지 + 얼마 돌려받는지 확인

signal:                     # 수동 선정(큐 소진) — 사이트 공백 메움, 원문 아님
  score: 0.0
  trend_momentum: 0.0
