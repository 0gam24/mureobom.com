human_notes: |
  차별화: 지역별 보증금 기준·최우선변제 상한을 한 표로 정리하고, '확정일자 우선변제'와
  '소액임차인 최우선변제'의 차이를 명확히 대비. 기준 시점이 임차 계약일이 아니라
  '담보물권 설정일 당시 시행령'이라는 점(가장 흔한 착오)을 반드시 강조.
  주택가액 1/2 한도 때문에 표상 상한을 다 못 받을 수 있다는 현실적 한계도 명시.
  단정적 '무조건 받는다' 표현 금지 — 요건 미충족 시 배당 제외됨을 명확히(F-* 가드).
