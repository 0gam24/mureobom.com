human_notes: |
  차별화: "연체 등록 기준 × 해제 후 기록 보존 기간" 두 축으로 정리하고, 단기연체(소액·수일)와
  장기연체(90일 이상)의 신용도 영향 차이를 표로 구분. "갚으면 즉시 삭제"라는 통념을 상환 후에도
  일정 기간 신용평가에 반영되는 실제 구조로 반박. 신용점수 회복은 단정 표현 없이 일반 경향으로만 서술.
  검수 포인트(egress 복구 후 researcher가 확정):
  - 연체 등록의 금액·일수 기준은 신용정보 관리규약/CB사 기준으로 확정 표기(추측성 "며칠" 금지).
  - 연체기록 보존·공유 기간은 신용정보법·관리규약 기준으로 정확히(상환 후 즉시 삭제 아님 명확화).
  - 신용점수 상승을 약속·보장하는 표현 금지(F-*), 일반정보 고지 유지.
