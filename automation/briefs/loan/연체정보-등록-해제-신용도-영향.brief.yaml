status: approved         # 운영자 일일 자동 발행 지시(스케줄 실행) = 즉석 승인 (2026-07-22 KST). 단, egress 차단으로 발행 보류

target_query: "연체정보 등록 기준 며칠 해제 신용점수 영향 삭제 기간"
search_intent: 정보형      # 연체 등록·해제 기준과 신용도 영향 확인 목적

signal:                   # topic-queue stale 대체 수동 선정 근사 추정치, 집계 수치만
  score: 58
  trend_momentum: 0.40
  question_volume: 0.50
  cluster_fit: 0.9        # loan boost 1.15 반영 전 원값
  freshness: 0.7

must_cover:
  - 연체정보(단기·장기)와 신용정보 등록의 기본 구조(신용정보원 집중, CB사 반영)
  - 연체 등록 기준(금액·경과일수: 통상 영업일 기준 일정 기간·일정 금액 이상)과 단기연체/장기연체(90일 이상) 구분
  - 연체 상환 시 해제 절차와 연체기록 보존(공유) 기간(상환 후에도 일정 기간 신용평가 반영되는 개념)
  - 신용점수(NICE·KCB)에 미치는 영향과 회복 흐름(상환 시점·연체기간·반복 여부에 따른 차등)
  - 단기연체 소액 완제 시 기록 관리, 신용회복 지원(채무조정·신용교육) 연결점
  - 흔한 통념 바로잡기("하루만 늦어도 바로 신용불량", "갚으면 즉시 기록 삭제")

required_sources:         # 공식 1차 출처만. WebFetch 화이트리스트 도메인. 0건이면 발행 차단
  - "신용정보의 이용 및 보호에 관한 법률 / 시행령 (국가법령정보센터 law.go.kr)"
  - "금융감독원 금융소비자 정보·신용정보 안내 (fss.or.kr)"
  - "한국신용정보원 신용정보 집중·관리 안내 (kcredit.or.kr)"

