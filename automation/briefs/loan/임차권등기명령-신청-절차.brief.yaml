  - 신청부터 등기 완료까지 절차 흐름과 소요 기간, 신청 비용(등록면허세·등기수수료·송달료 등 항목 단위)
  - 핵심 효력: 등기 완료 후 이사·전출해도 기존 대항력과 우선변제권이 유지된다는 점(놓치기 쉬운 케이스)
  - 흔한 오해 바로잡기 — 임차권등기명령은 보증금을 직접 받아주는 절차가 아니며 보증금반환청구소송/강제집행과 별개라는 구분
  - 2026년 기준 비용·관할·전자소송 절차 확인(연도별로 수수료·운영 기준이 바뀔 수 있음)

