human_notes: |
  차별화: 보증금 미반환 시 임차권등기명령 — 신청 요건·법원 절차·필요서류·비용·이사 후 대항력/우선변제권 유지 효력. 기발행 전세사기 피해자 지원·전세자금대출 글과 3부작 내부링크.
  검수 포인트: 비용·관할·전자소송 절차는 2026 최신 기준으로 명시(연도별 수수료·운영 변동).
  "등기명령만 하면 보증금이 돌아온다"는 통념 반박 — 반환청구소송/강제집행과 별개 절차임을 분리.
  이사 후 대항력·우선변제권 유지 효력은 다른 사이트가 자주 흐리는 핵심 — 등기 완료 시점 기준으로 정확히 서술.
