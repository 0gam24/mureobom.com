human_notes: |
  차별화: 전세 계약 갱신 시 전세자금대출 연장 — 연장 요건·한도/금리 재산정·필요서류·신청 시기, 묵시적 갱신/감액 갱신 처리. 기발행 전세자금대출(신규)·버팀목 글과 의도 분리(연장 절차 단일 의도).
  검수 포인트: 한도·금리는 "연장 시 신규 기준으로 재산정"이 핵심 — "기존 조건 그대로 유지"는 흔한 오해이니 반박 단락 필수.
  2026 최신 기준연도 명시(보증한도·LTV·우대금리 요건은 연도·정책별 변동). 단정적 금리·한도 약속 표현 금지(금융 표현 가드).
  묵시적 갱신·감액 갱신 케이스는 비공식 UGC 출처에 정보가 흩어져 있으므로 공식 보증약관 근거로 정리 — 이 둘이 다른 사이트가 놓치는 구체 케이스.
