human_notes: |
  차별화: 법정최고금리 초과 이자 무효·부당이득 반환 + 불법사금융 피해 대응 창구(1332·신고센터·채무자대리인) 전용 — 기존 loan 채무조정·연체·신용점수 글과 분리. "최고금리에 실제로 합산되는 대가 항목(선이자·수수료·공제금)" 비교 표를 다른 사이트가 잘 안 다루는 각도로.
  스캐너 큐 소진으로 운영자 수동 선정 (score:0 = 스캐너 미측정, cluster_fit 1.0·freshness 1.0으로 수동 세팅).
  검수 포인트: (1) 법정최고금리는 2021.7 이후 연 20% — 대부업법 시행령·이자제한법 동일 기준인지 최신 확인. (2) "20% 넘으면 무조건 안 갚아도 된다"식 단정·공포조장 금지 — 초과분만 무효이고 원금·적법 이자는 별개, 대응은 반드시 신고·법률지원 창구 병기. (3) 미등록 대부와 등록 대부업체 추심 규정 혼동 주의, 채권추심법 적용 범위 명확히.
