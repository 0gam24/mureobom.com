must_cover:
  - 보금자리론 개요 — 한국주택금융공사(HF) 정책 모기지론, 한국주택금융공사법 §1 근거
  - 자격 — 부부합산 연소득 일반 7천만/신혼 8.5천만/다자녀 1억, 무주택 또는 1주택자(처분 조건), 신용점수 271점 이상
  - 대상 주택 — 6억 원 이하
  - 한도 — 일반 3.6억/다자녀·전세사기피해자 4억/생애최초 4.2억. LTV 70%(생애최초 80%), DTI 60%
  - 금리 — u-보금자리·아낌e·t-보금자리 3종, 고정금리, 만기·분기 단위 차등 (구체 수치는 발행 시점 HF 공시 재확인)
  - 우대금리 — 신혼·다자녀·한부모·다문화·장애인·저소득 청년·전세사기피해자 최대 1.0%p
  - 만기 — 10/15/20/30/40/50년, 원리금균등·원금균등·체증식
  - 디딤돌과 차이 — 표 1개 (어제 발행 디딤돌 글과 인터널 링크)
  - 신청 — u-보금자리(uhf.go.kr) 또는 취급은행 / 6단계 절차

