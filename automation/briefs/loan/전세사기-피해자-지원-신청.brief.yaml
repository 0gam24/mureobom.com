human_notes: |
  차별화: 전세사기특별법 지원(우선매수권·LH 매입·저리 대환·긴급주거)을 "누가→어디에→무엇을" 단계별 절차표로 — 기발행 HUG/전세자금대출 글은 대출 한도 안내, 본 글은 피해 발생 후 구제 절차로 의도 분리.
  검수 포인트:
  - 특별법은 한시법 — 2026 기준 일몰·연장·개정 항목(우선매수권 6→% 확대 등) 최신 반영 필수.
  - "특별법이면 보증금 다 돌려받는다"는 통념 반박 단락 필수(원칙은 환급이 아니라 우선매수·거주안정 지원).
  - 인정 4대 요건과 보증금 한도(현행 5억 등) 기준연도 재확인 — 자주 바뀜.
