  - 기한이익상실 개념(약정 위반 시 만기 전 잔액 전액 상환 의무 발생, 통상 약정상 2회 이상·일정 기간 연체 시 발생하는 구조와 사전통지)
  - 연체정보(단기·장기 연체)의 신용정보원 등록 기준과 해제(상환 시 기록 유지·삭제) 기준
  - 신용점수(KCB·NICE) 하락 폭과 회복 경로(연체 해소 후 반영 시차 포함)
  - 연체 발생 시 대응 옵션(대출 약정 변경, 상환유예, 프리워크아웃 등 채무조정 제도 연계 — 제도 상세는 내부 링크로)
  - 연체 예방·상환유예 제도 개요와 조기 상담 권장(가계·서민금융 지원 창구 안내)

