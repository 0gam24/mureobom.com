human_notes: |
  차별화: 채무조정 '제도 소개' 글(신용회복위원회·개인회생)과 분리 — 이 글은 연체
  발생 직후 시간순으로 벌어지는 불이익(연체이자 → 기한이익상실 → 신용정보 등록 →
  추심/법적조치)을 '단계별 타임라인'으로만 다룬다. 제도 자체 설명은 링크로 넘긴다.
  스캐너 큐 소진으로 운영자 수동 선정(신호 0). 승인 전 차별화 각도 재확인 필요.
  검수 포인트:
  - 기한이익상실 발생 요건은 약정·규정 기준이며 '무조건 O회 연체 시'로 단정하지 말 것
    (통상 기준으로 서술, 최신 은행업감독규정 확인).
  - 연체정보 등록·해제 기준과 신용점수 반영 시차는 기관(신용정보원·KCB·NICE) 기준을
    분리 표기. 회복 경로를 단정하지 말고 '해소 후 반영' 구조로 정보 전달.
  - 공포 조장·단정 금지: 불이익은 사실 그대로, 대응·상담 창구를 반드시 병기.
