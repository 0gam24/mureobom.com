  "부모와 같은 세대면 무조건 안 된다"는 통념 — 세대분리 가능 시점/예정 세대주 인정 케이스 단락 필수.
  소득 산정에 부부합산 포함 여부(미혼 단독 vs 예비부부)는 자주 틀리는 포인트 — Q&A에 명시.
