human_notes: |
  차별화: 일반 전세자금(loan/전세자금대출-조건-한도)·신혼 버팀목(loan/신혼부부-전세자금대출)에서 청년 전용 단일 의도만 분리 — 만 19~34세·보증금 3억 이하·한도 2억(수도권) 구체 숫자 + 중소기업 취업청년 우대금리 라인업 + 일반/신혼/청년 3종 비교표를 한 화면에 제시.
