human_notes: |
  차별화: 전세대출 4종(버팀목·신혼·중기청·일반) 한 페이지 비교 표 + 보증기관 HUG·HF·SGI 차이 표 + 청년·신혼·다자녀 우대 조건 매트릭스.
  2026년 기준 소득·자산 요건과 보증금 상한이 매년 갱신되니 최신 고시 확인 필수.
