# cta 필드는 폐기 — 수익화는 AdSense 단독 (계산기/제휴 CTA 미사용)

compliance:
  medical_legal_financial_advice_disclaimer: true  # 일반정보 고지 삽입 (AdSense YMYL + 금융정보 정책 친화)
  # F-01 가드: "X% 금리 보장" 등 단정 금지 — 모든 금리 수치는 "일반적/공시 기준" 명시
  # F-02 가드: 토스/카카오뱅크 등 민간사 추천·우열 비교 금지 — 제도·산정 구조만 설명

geo:
  faq_schema: true
  faq_pairs_min: 4
  llms_txt: true

human_notes: |
  차별화: 금리 산정 구조 한 페이지 + 신용점수대별 평균 금리 추정 표 + 변동/고정·신용/마통 비교 매트릭스.
  검수 포인트:
  - 2026년 기준 한국은행 기준금리 및 COFIX 추세를 본문 작성 시점 기준으로 반영했는지 확인.
  - 신용점수대별 금리는 은행연합회 공시 기반 "일반적 범위"로만 표기 (특정 은행·특정 % 단정 금지 — F-01).
  - 토스뱅크·카카오뱅크·케이뱅크 등 민간사 상품명/우열 비교 금지 (F-02). 1금융 vs 2금융 제도 차이 수준에서 멈춰라.
  - "한도 조회만 해도 신용점수 하락" 통념 — 2020년 신용조회 제도 개편 이후 실제 영향 범위 명확히 설명.
  - DSR 40%는 가계대출 총합 기준이므로 기존 대출이 있으면 신용대출 한도가 줄어든다는 점, 반드시 본문에 명시.
