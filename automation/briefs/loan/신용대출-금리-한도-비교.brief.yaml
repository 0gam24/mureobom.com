status: published   # Micro OODA approve            # draft → approved(사람) → published(자동)

target_query: "신용대출 금리 2026 한도 산정 신용점수 영향"
search_intent: 정보형     # 금리·한도 산정 구조 이해 + 비교 판단

signal:                  # 스캐너 산출(읽기 전용, 원문 아님)
  score: 82.7
  trend_momentum: 0.78
  question_volume: 0.85
  cluster_fit: 1.0
  freshness: 0.60

must_cover:
  - 신용대출 금리 산정 기본 구조(기준금리 + 가산금리 - 우대금리)
  - 신용점수(KCB/NICE)가 금리에 미치는 영향과 점수대별 일반적 금리 차이
  - 한도 산정 방식(연소득 × N배 + DSR 40% 규제 동시 적용)
  - 변동금리 vs 고정금리 선택 기준 (금리 사이클·상환기간별)
  - 마이너스통장 vs 일반 신용대출 차이 (이자 산정·한도·약정 방식)
  - 중도상환 수수료 구조와 면제 조건
  - 흔한 오해 바로잡기 — "금리비교 사이트 = 실제 승인 금리"가 아닌 이유, 한도 조회만 해도 신용점수가 하락한다는 통념

required_sources:        # 공식 1차 출처만. 지식iN 아님. 0건이면 발행 차단
  - "은행법 / 여신전문금융업법 (국가법령정보센터 law.go.kr)"
  - "금융감독원 가계대출 / 신용대출 안내 (fss.or.kr)"
  - "금융위원회 가계부채 관리방안 / DSR 규제 (fsc.go.kr)"
  - "전국은행연합회 소비자포털 — 은행별 가계대출 금리공시 (portal.kfb.or.kr)"
  - "한국은행 기준금리 / COFIX 등 지표금리 공시"

internal_links:
  - loan/신용점수-올리는-법       # 점수 → 금리 영향 연결
  - loan/dsr-계산-방법            # 한도 산정의 DSR 축 연결
