human_notes: |
  차별화: 2026 기준금리를 실제 숫자로 대입한 전환 계산 예시(전세→월세, 월세→전세 양방향) + 법정 상한 초과 시 초과분 무효 논리를 표로.
  기준금리는 한국은행 발표에 따라 수시 변동하니 발행 시점 최신값을 required_sources bok.or.kr에서 재확인.
  "전환율 = 대출이자율"이라는 통념, "법정 상한을 넘겨도 계약서에 서명하면 유효"라는 오해를 명시적으로 반박.
  상가(상가건물임대차보호법)는 산정률이 주택과 다르니 주택 기준임을 첫 단락에서 못박을 것.
