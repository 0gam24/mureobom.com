  차별화: 청약 가점제 84점 — 무주택기간(최대 32점)·부양가족수(최대 35점)·청약통장 가입기간(최대 17점) 산정 기준표와 계산 예시, 가점제 vs 추첨제 적용 비율. 기발행 주택청약종합저축-1순위 글과 의도 분리(가점 계산 단일 의도).
