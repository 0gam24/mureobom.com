id: loan-연대보증-보증인-책임
cluster: loan
status: published        # compliance 게이트 통과 발행 (D-2026-07-10). 즉석 승인 후 발행 직전 전항목 검증 완료

target_query: "연대보증 보증인 책임 범위 보증인 보호법"
search_intent: 정보형     # 보증 서기 전/후 책임 범위와 보호장치를 알고 싶은 의도

signal:                  # 스캐너 산출(읽기 전용, 원문 아님). 큐 소진 → 수동 선정으로 0 채움
  score: 0
  trend_momentum: 0
  question_volume: 0
  cluster_fit: 1.0
  freshness: 1.0

must_cover:
  - (단순)보증 vs 연대보증 차이 — 연대보증은 최고의 항변·검색의 항변이 없어 "먼저 주채무자에게 청구하라"고 요구할 수 없다
  - 연대보증인 책임 범위 — 주채무 전액(원금+이자+지연손해금)에 대해 채권자가 주채무자를 거치지 않고 보증인에게 바로 청구 가능
  - 보증인 보호 장치 — 보증채무 최고액 서면 특정(구두·백지보증 무효), 보증기간, 채권자의 통지의무(주채무 연체 등 통지) : 보증인 보호를 위한 특별법 + 민법 보증 조문
  - 금융회사 대출 연대보증 원칙 폐지 — 2012~2013년 이후 은행권 개인 연대보증 제한(개인 간 사적 보증과 구분되는 지점)
  - 구상권 — 보증인이 대신 갚으면 주채무자에게 갚은 만큼 청구 가능(사전·사후 구상권)
  - 보증 서기 전 확인사항 체크 — 최고액·기간 서면 기재 여부, 주채무 규모·상환능력, 서명 전 반드시 확인할 항목

required_sources:        # 공식 1차 출처만. 은행 상품·블로그·질의응답 금지. 0건이면 발행 차단
  - "민법 (보증채무·연대보증·구상권 조문) — 국가법령정보센터 law.go.kr"
  - "보증인 보호를 위한 특별법 (서면 특정·최고액·채권자 통지의무) — 국가법령정보센터 law.go.kr"
  - "금융감독원 금융소비자 정보(보증 관련 안내) — fss.or.kr"

internal_links:
  - loan/신용회복위원회-채무조정
  - loan/개인회생-신청-자격-절차       # 보증채무 이행 후 상환 곤란 시 채무조정 경로
  - loan/법정최고금리-불법사금융-대응    # 사적 보증·고금리 채무 관련 연결

# cta 필드는 폐기 — 수익화는 AdSense 단독 (계산기/제휴 CTA 미사용)

compliance:
  medical_legal_financial_advice_disclaimer: true  # 일반정보 고지 삽입 (개별 보증 계약은 법률 전문가 확인 고지)

geo:
  faq_schema: true
  faq_pairs_min: 4
  llms_txt: true

human_notes: |
  차별화: 보증·연대보증의 "책임 범위 + 보증인 보호" 전용 각도 — 채무조정/연체/최고금리 등
  기존 loan 글과 분리. (단순)보증 vs 연대보증을 최고의 항변·검색의 항변 유무로 구분하는 표 +
  보증인 보호를 위한 특별법의 서면 특정·최고액·통지의무를 "다른 사이트가 뭉뚱그리는" 지점으로 명확화.
  놓치기 쉬운 케이스: (1) 2012~2013 은행권 개인 연대보증 폐지 이후에도 개인 간 사적 보증은
  여전히 유효 — "이제 연대보증 없어졌다"는 통념 반박, (2) 구두·백지 보증은 특별법상 무효라는 점.
  [수동 선정 기록] 스캐너 큐 소진으로 운영자 수동 공백 선정(signal 0). score<30 자동거부 예외.
  검수 포인트: 기준연도는 2026 최신으로. 단정 표현("무조건 안 갚아도 된다" 등) 금지 —
  개별 보증계약·소송은 변호사 등 법률 전문가 확인 고지 필수. 법령 조문 번호는 researcher가
  국가법령정보센터 원문으로 재검증(민법·보증인 보호를 위한 특별법 개정 여부 확인).
