target_query: "프리워크아웃 개인워크아웃 차이 조건 신용회복위원회 채무조정 연체기간"
search_intent: 정보형      # 연체 단계별 신용회복위 채무조정 프로그램 선택 기준 확인 목적

signal:                   # topic-queue stale 대체 수동 선정 근사 추정치, 집계 수치만
  score: 60
  trend_momentum: 0.45
  question_volume: 0.52
  cluster_fit: 0.9        # loan boost 1.15 반영 전 원값
  freshness: 0.7

must_cover:
  - 신용회복위원회 채무조정 제도의 전체 그림(연체 전 신속채무조정 → 프리워크아웃 → 개인워크아웃 단계 구조)
  - 프리워크아웃(사전채무조정)의 대상 연체 구간(통상 단기연체, 30일 초과 90일 미만)과 지원 내용(이자 감면·상환기간 연장 중심)
  - 개인워크아웃(채무조정)의 대상(90일 이상 장기연체)과 지원 내용(이자 전액 감면·원금 일부 감면 가능)
  - 두 제도의 신청 자격·채무 범위·감면 수준 차이를 표로 비교
  - 신청 절차(사이버상담부·전국 서민금융통합지원센터)와 신청 후 추심 중단·신용회복 흐름
  - 흔한 오해 바로잡기("워크아웃=신용불량 확정", "개인회생·파산과 동일") 및 법원 개인회생과의 경계

required_sources:         # 공식 1차 출처만. WebFetch 화이트리스트 도메인. 0건이면 발행 차단
  - "서민의 금융생활 지원에 관한 법률 / 시행령 (국가법령정보센터 law.go.kr)"
  - "신용회복위원회 채무조정제도(신속채무조정·프리워크아웃·개인워크아웃) 안내 (ccrs.or.kr)"
  - "금융감독원 서민금융 1332 채무조정 안내 (fss.or.kr)"

