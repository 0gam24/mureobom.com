human_notes: |
  차별화: 기발행 loan/신용회복위원회-채무조정(제도 총론)과 겹치지 않도록 "연체 경과일수 축"으로
  프리워크아웃(단기연체) vs 개인워크아웃(장기연체)의 대상·감면 수준·상환조건을 한 표로 대비하는 데
  집중. 개인회생·파산(법원)과의 경계선을 명확히 그어 오해를 차단.
  검수 포인트(egress 복구 후 researcher가 확정):
  - 프리워크아웃/개인워크아웃 연체 경과일수·채무 상한·감면율은 신용회복위 최신 협약 기준으로 확정 표기
    (추측성 수치 금지). 제도명 표기(신속채무조정=연체 전, 프리워크아웃=이자 감면 중심)를 공식 명칭과 일치.
  - 원금·이자 감면은 "가능"의 범위로만 서술하고 특정 감면율 보장·약속 표현 금지(F-*), 일반정보 고지 유지.
