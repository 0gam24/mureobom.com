human_notes: |
  차별화: 기발행 loan/임차권등기명령-신청-절차(등기로 대항력·우선변제권 보전)와 겹치지 않도록
  "돈을 실제로 회수하는 절차(지급명령→강제집행)"에 초점. 임차권등기는 '떠나도 권리 유지', 지급명령은
  '집행권원 확보'로 역할을 나란히 배치하고 병행 전략을 안내.
  검수 포인트(egress 복구 후 researcher가 확정):
  - 인지대·송달료 등 비용은 법원 전자소송 고시 기준으로 확정 표기(추정 금액 단정 금지).
  - 이의신청 기간(2주)·본안소송 전환·확정 효력은 민사소송법 조문으로 근거 표기.
  - "반드시 받을 수 있다"式 결과 단정 금지(F-*). 상황별 원칙만 서술하고 개별 사안은 법률구조공단·
    변호사 상담 안내로 마무리. 일반정보 고지 유지.
