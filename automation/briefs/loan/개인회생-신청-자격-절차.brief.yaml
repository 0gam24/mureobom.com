human_notes: |
  차별화: 개인회생(법원) — 신청 자격(소득·담보채무 15억/무담보 10억 한도)·절차(신청→개시→변제계획 인가→3년 변제)·변제금 산정(가용소득)·면책. 기발행 신용회복위원회·새출발기금 글과 의도 분리(법원 개인회생 단일 의도)·내부링크.
  검수 포인트:
  - 채무 한도(담보 15억/무담보 10억)와 변제 기간(원칙 3년·최장 5년)은 2026 현행 채무자회생법 기준으로 재확인. 과거 5억/10억 표기 잔존 문서가 흔하니 최신값 확정.
  - "개인회생=파산=신용불량 영구낙인" 통념 반박: 개인회생은 변제 후 면책되는 절차이며 파산·신용회복위원회 조정과 다른 제도임을 표로 구분.
  - 변제금은 가용소득(월소득 − 법원 인정 생계비) 기준이라는 점을 단정적 약속 없이 일반정보로 설명. "무조건 얼마 감면" 류 단정 표현 금지.
