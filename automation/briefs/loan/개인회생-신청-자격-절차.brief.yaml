must_cover:
  - 개인회생 신청 자격 — 일정한 소득(급여·영업소득 등)으로 변제 가능할 것, 채무 한도(담보부 채무 15억 원·무담보 채무 10억 원 이하)
  - 신청 대상 채무 범위와 제외 사유(파산·면책 결격 사유, 재산 은닉 등 신청 기각 케이스)
  - 절차 단계 — 신청 → 보전처분·금지명령 → 개시결정 → 채권자집회 → 변제계획 인가 → 변제 수행 → 면책
  - 변제금 산정 방식 — 가용소득(월소득 − 법원 인정 생계비) 기준, 청산가치 보장 원칙
  - 변제 기간 — 원칙 3년(최장 5년), 변제 완료 시 잔여 채무 면책
  - 흔한 오해 바로잡기 — 개인회생(법원) vs 신용회복위원회 채무조정·새출발기금(비법원)의 차이, 신용점수·취업 영향에 대한 통념
  - 변제 기간 중 변경·폐지 케이스(소득 변동 시 변제계획 변경, 미이행 시 폐지)

