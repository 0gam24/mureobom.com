human_notes: |
  차별화: 지급요건 4가지 체크리스트 + 청구기한 5년 함정(놓치면 소멸) + 이혼 시점 선청구 제도 안내.
  청구 기한은 2018년부터 3년에서 5년으로 연장된 점 명시 — 옛 정보(3년)로 안내하는 글이 많으니 최신 기준.
  "무조건 절반 나눠준다"는 통념 반박 — 2016.12.30 이후 협의·재판으로 비율을 달리 정할 수 있음.
  본인 재혼해도 분할연금은 유지되나, 분할연금 수급권 소멸 규정은 사망 케이스별로 다르니 표로 구분.
