id: insurance-국민연금-분할연금-이혼-신청
cluster: insurance
status: published        # compliance 게이트 통과 (2026-07-12) → 발행 승인

target_query: "이혼하면 배우자 국민연금 분할연금 받을 수 있나요"
search_intent: 절차형     # 수급 자격 확인 + 청구 절차·기한을 함께 원함

signal:                  # 수동 선정(읽기 전용, 원문 아님, 집계 수치만)
  score: 0.0             # 수동 큐잉 (스캐너 미측정)
  trend_momentum: 0.0
  question_volume: 0.5
  cluster_fit: 1.0
  freshness: 1.0

must_cover:
  - 분할연금 개념 — 이혼한 배우자가 상대방의 국민연금(노령연금)을 나눠 받는 제도(국민연금법 제64조)
  - 지급 요건 4가지 — 혼인기간 중 국민연금 가입기간 5년 이상 + 배우자였던 사람이 노령연금 수급권자 + 본인이 지급연령(출생연도별 61~65세) 도달 + 이혼 상태
  - 분할 비율 — 원칙 균등 1/2, 2016.12.30 이후 협의이혼·재판으로 비율 별도 결정 가능
  - 청구 기한 — 요건 충족일부터 5년 이내 청구(2018년부터 3년→5년 연장)
  - 분할연금 선(先)청구 제도 — 이혼 시점에 미리 청구해두는 방법
  - 재혼·본인 사망·상대방 사망 시 분할연금 지속 여부(수급권 소멸 규정)

required_sources:        # 공식 1차 출처만. 0건이면 발행 차단
  - "국민연금법 제64조(분할연금 수급권자 등)(국가법령정보센터, law.go.kr)"
  - "국민연금법 제64조의2·제64조의3(분할연금 지급의 특례·선청구)(국가법령정보센터, law.go.kr)"
  - "국민연금공단 분할연금 안내(nps.or.kr)"

