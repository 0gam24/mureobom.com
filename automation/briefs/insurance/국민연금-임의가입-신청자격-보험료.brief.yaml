id: insurance-국민연금-임의가입-신청자격-보험료
cluster: insurance
status: published  # 2026-06-11 compliance 게이트 통과

target_query: "국민연금 임의가입 신청자격 보험료 전업주부"
search_intent: 절차형

signal:
  cluster_fit: 1.0
  freshness: 0.78
  manual: true

must_cover:
  - 임의가입 개요 — 국민연금법 §10, 사업장·지역 가입 의무가 없는 자가 본인 희망으로 가입
  - 대상자 — 만 18세 이상 60세 미만 중 의무가입 대상이 아닌 자(전업주부, 만 27세 미만 소득 없는 학생·군인 등)
  - 임의계속가입과 차이 — §13, 60세 도달 후 가입기간 채우려 계속 납부(별개 제도) 구분
  - 보험료 산정 — 본인이 기준소득월액 선택(하한~상한 범위 내), 보험료율 9% 전액 본인 부담
  - 최저 보험료 — 지역가입자 중위수 기준소득월액 기준 하한 적용(공식 수치·변동 확인)
  - 신청·자격유지 — 국민연금공단 지사·전자민원 신청, 보험료 미납 시 자격 상실/탈퇴 가능
  - 가입 실익 — 최소 가입기간 120개월(10년) 채워 노령연금 수급권 확보, 다만 본인 손익 판단
  - 흔한 오해 — 소득이 없어도 가입 가능, 임의가입은 강제 아님

required_sources:
  - "국민연금법 제10조 (임의가입자) — 국가법령정보센터"
  - "국민연금법 제13조 (임의계속가입자) — 국가법령정보센터"
  - "국민연금공단 — 임의가입 제도 안내 및 보험료"

internal_links:
  - insurance/국민연금-추납-추후납부-신청
  - insurance/국민연금-예상수령액-계산

compliance:
  medical_legal_financial_advice_disclaimer: true

geo:
  faq_schema: true
  faq_pairs_min: 5
  llms_txt: true

human_notes: |
  차별화: 임의가입 vs 임의계속가입(§10 vs §13) 구분 + 기준소득월액 본인 선택·9% 전액 본인부담 + 하한 보험료.
  검수: 하한 보험료·기준소득월액 범위는 변동값이므로 공식 출처 + 변동 명시. 추납 글과 내부링크 연계.
  "무조건 이득" 단정 금지 — 본인 손익 판단 안내, 일반정보 고지.
