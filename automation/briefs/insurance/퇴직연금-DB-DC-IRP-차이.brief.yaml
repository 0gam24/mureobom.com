human_notes: |
  차별화: 직장인 퇴직금 운용 방식 비교 (DB/DC/IRP). 기존 연금저축IRP 글(세액공제 중심)과 분리. 합산 한도는 두 글 모두 명시해 충돌 회피.
  검수: 수익률·세율 단정 금지, 특정 운용 상품 추천 금지, DB vs DC는 중립.
