human_notes: |
  차별화: 기발행 `insurance/의료비-본인부담상한제`(제도 해설·소득분위별 상한액)와 완전 분리 —
  본 글은 "8월 말 사후환급금 어떻게 조회하고 신청하느냐" 단일 절차 의도.
  The건강보험 앱 동선 + 위임 신청 케이스 + 3년 시효 소멸 3축으로 차별.
  검수 포인트 1: 2026년 8월 지급분은 2025년 진료분 기준 — 연도 혼동 주의.
  검수 포인트 2: "자동 입금"이라는 흔한 통념 반박 단락 필수 (공단 안내문 수신 → 본인 계좌 신청 동선).
  검수 포인트 3: 사전급여(병원 단계 면제) vs 사후환급(8월 지급) 구분 표 1개 포함.
