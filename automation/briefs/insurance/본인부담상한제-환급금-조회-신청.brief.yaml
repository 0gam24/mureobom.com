must_cover:
  - 본인부담상한제 사후환급 시기 — 매년 8월 말 전년도 진료분 지급 (2026년 8월 = 2025년 진료분)
  - 조회 동선 1: 국민건강보험공단 The건강보험 모바일 앱 → 민원여기요 → 환급금 조회/신청
  - 조회 동선 2: 공단 홈페이지(nhis.or.kr) 로그인 → 환급금 조회·신청 메뉴 / 1577-1000 ARS
  - 신청 방법 — 본인 계좌 입력 후 신청(공단이 대상자에게 안내문 발송, 자동 지급 아님)
  - 위임 신청 케이스 — 가족·대리인 신청 시 위임장·신분증 사본 필수, 치매·고령 부모 환급 대리 수령 절차
  - 미지급 시효 — 신청 후 미수령·무신청 환급금은 **3년 시효 경과 시 소멸** (국민건강보험법 제91조)
  - 자주 틀리는 통념 — "자동 입금된다"는 오해 / 사전급여(상한액 초과분 병원 직접 면제)와 사후환급 구분

