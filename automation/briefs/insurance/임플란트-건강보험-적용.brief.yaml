  - 평생 적용 횟수 — 2개 (의학적 중단 시 횟수 미산입 예외)
  - 사전등록 — 치과 통해 공단 등록 절차
  - 노인 틀니 — 만 65세 이상, 7년 1회, 부분틀니/완전틀니
  - 임플란트 vs 틀니 — 본인 상황별 차이 (단정 X)
  - 적용 제외 — 비급여 시술, 일부 케이스

