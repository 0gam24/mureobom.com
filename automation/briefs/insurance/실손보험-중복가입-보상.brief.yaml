human_notes: |
  차별화: 실손보험 2개 이상 가입 시 비례보상(중복 전액 보상 안 됨)·자기부담금 처리·해지 판단 기준. 기발행 실손보험 청구/세대별 글과 의도 분리(중복가입 단일 의도).
  검수 포인트:
  - 기준연도 2026. 비례보상은 보험업법·표준약관 원칙이지만 자기부담률·중지/재개 세부는 세대(1~4세대)별로 다르니 "중복가입 시 보상 구조"에 초점을 두고 세대별 상세는 기발행 세대별 글로 내부링크 유도.
  - 자주 틀리는 통념: "2개 가입하면 보상금 두 배 / 자기부담금 면제" — 비례보상으로 실제 부담한 의료비 한도 내 분담이며 자기부담금은 유지된다는 점을 반박 단락으로.
  - 단체실손+개인실손 중복은 "해지"가 아니라 "중지·재개"가 정답인 케이스가 많음 — 해지 권유로 읽히지 않게 표현 주의(단정적 가입/해지 권유 금지).
