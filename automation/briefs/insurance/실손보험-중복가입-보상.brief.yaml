must_cover:
  - 실손보험 2개 이상 가입해도 보장은 비례보상 — 중복으로 전액 보상되지 않고 가입금액 비율로 분담된다는 원칙
  - 비례보상 계산 구조(각 보험사 부담 비율 = 본인 보험가입금액 / 전체 가입금액 합)와 실제 부담한 의료비 한도 내 정산
  - 자기부담금(급여/비급여 공제율)이 중복가입으로 줄어들거나 사라지지 않는다는 점
  - 중복가입 확인 방법(보험가입 조회 시스템·청약 단계 중복 고지) 및 가입 시점에 비례보상 안내 의무
  - 해지 판단 기준 — 보장 중복으로 보험료만 이중 부담될 때 어느 계약을 유지/해지할지(세대별 보장조건·갱신주기·자기부담률 비교)
  - 단체(직장)실손 + 개인실손 동시 보유 시 중지·재개 제도로 개인실손 보험료를 멈추는 선택지
  - 흔한 오해 바로잡기 — "2개 들면 두 배 받는다"는 통념과 실제 비례보상의 차이

required_sources:         # 공식 1차 출처 후보(researcher 검증·보완). 0건이면 발행 차단
