must_cover:
  - 자동차보험 의무가입 — 자동차손해배상 보장법 §5(가입의무)·§8(운행금지)·§48(과태료)
  - 갱신 절차 — 만기 전 안내, 공식 비교 채널(보험다모아) 중립 언급
  - 할인할증 등급 체계 — 최초 11Z, 1Z~29Z 범위, Z(일반)·P(보호)·F(중간) 표기 (손보협회 공시)
  - 사고 시 할증 — 사고점수에 따른 할증등급, 적용률 30~200% 사이 자율 적용
  - 무사고 시 — 매년 1등급씩 할인
  - 보험사 변경 시 등급 승계 — 보험개발원이 집중 데이터로 관리(빅인)
  - 본인 등급 조회 — 손해보험협회 자동차보험 종합포털·보험개발원 빅인
  - "낮은 적용률 ≠ 저렴" 공식 안내 — 다른 요율 요소가 보험료 결정

