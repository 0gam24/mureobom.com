human_notes: |
  차별화: 기존 insurance 5편(4대보험·건강보험 피부양자·국민연금·실손·연금저축IRP)과 분리. 자동차보험 단독 + 할인할증 등급 체계의 정확 인용.
  검수 포인트:
  - F-01 단정 금지 — "○○만 원 된다", "○○% 할인" 같은 구체 수치 단정 금지.
  - F-02 추천 금지 — "△△화재가 싸다" 류 절대 금지. knia 공식 안내 인용.
  - 등급 표기는 11Z·1Z~29Z·Z/P/F 손보협회 표기 그대로.
  - 미가입 과태료 구체 금액은 시행령 별표 미확보 → "과태료 부과 대상"까지만.
  - 일반정보 고지 필수.
