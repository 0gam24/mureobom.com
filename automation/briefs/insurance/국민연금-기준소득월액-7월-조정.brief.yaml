must_cover:
  - 기준소득월액 정의 — 국민연금 보험료(소득의 9%)와 향후 연금액 산정의 기준이 되는 월 소득액
  - 상·하한액이 매년 7월 1일 조정되는 이유 — 전체 가입자 평균소득월액 변동률(A값 연동)에 따라 시행령으로 상·하한 재설정, 적용기간 7/1~익년 6/30
  - 상한액 초과 시 적용 — 실제 소득이 상한을 넘어도 상한액 기준으로 부과(보험료 상한 고정), 하한액 미만 시 하한액 기준 부과
  - 보험료 변동 계산 예시 — 상·하한 적용 시 본인부담(직장 4.5%)·전체(9%) 보험료가 어떻게 바뀌는지 숫자 단위 예시(상한 걸린 가입자가 7월에 더 내게 되는 케이스)
  - 누가 영향받는지 — 상한액 부근 고소득 가입자(보험료 인상)와 하한액 부근 저소득·지역가입자 구분, 직장가입자(사업장 정기결정)와의 차이
  - 흔한 오해 바로잡기 — "소득이 안 늘었는데 7월에 보험료가 오른 건 인상 아니라 기준소득월액 상·하한 조정 때문"임을 구분
  - 기준소득월액과 다른 개념 구분 — '소득월액'(보수외소득)·'A값'과 혼동하지 않도록 1줄 정리

