human_notes: |
  차별화: 7/1 국민연금 기준소득월액 상·하한액 조정 — 산정 기준(A값 변동), 상·하한 적용 시 보험료 변동·계산 예시, 누가 영향받는지. 기발행 국민연금 수령/임의가입/추납 글과 의도 분리(보험료 부과 기준 단일 의도).
  검수 포인트: 상·하한액 금액과 적용기간(7/1~익년 6/30)은 매년 7월 시행령 개정으로 바뀜 — 발행 시점의 2026.7 적용 상·하한액을 공식 고시로 재확인 필수(추정 금지). 작년 수치 복사 금지.
  자주 틀리는 통념: "7월에 보험료 오른 건 요율(9%) 인상"이 아니라 기준소득월액 상·하한 조정 — 요율은 그대로, 부과 기준만 바뀐다는 점을 본문에서 분명히 가를 것.
  기준연도 2026 명시. 상·하한액 표는 다른 곳에도 있으니 '상한 걸린 가입자만 7월에 더 낸다'는 보험료 변동 케이스 예시로 각도를 벌릴 것. 비공식 UGC 출처의 풍문 수치 인용 금지 — 시행령·공단 고시값만.
