must_cover:
  - 국가건강검진 개요 — 건강검진기본법, 보건복지부 + 국민건강보험공단 운영
  - 일반건강검진 — 직장가입자(사무직 격년·비사무직 매년)·지역가입자·피부양자·의료급여수급권자
  - 6대 암검진 — 위·간·대장·유방·자궁경부·폐 (연령·주기 표, 본인부담 10% / 대장·자궁경부 제외 + 의료급여수급권자·차상위계층 전액 국가 부담)
  - 영유아 건강검진 — 14일~71개월, 8회 + 구강검진 3~4회, 본인부담 0원
  - 학생 건강검진 — 초1·4, 중1, 고1 일반검진 / 그 외 학년 구강검진, 전액 국고지원
  - 생애전환기 — 만 40세·66세, 구강검진 + 인지기능장애검사
  - 폐암 고위험군 정의 — 30갑년 이상 흡연력 + 현재 흡연 만 54~74세
  - 본인 대상 확인 — nhis.or.kr 건강모아 / The건강보험 앱 / 1577-1000

