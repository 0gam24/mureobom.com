human_notes: |
  차별화: 산정특례(특정 질환 본인부담률 자체 경감)와 본인부담상한제(연간 총액 상한 초과분 환급)는 '다른 제도'임을 상단 비교표로 명확히 구분 — 상한제 상세는 내부링크로만 넘기고 이 글은 산정특례에 집중. (스캐너 큐 소진으로 운영자 수동 선정.)
  검수 포인트 1: 질환군별 본인부담률(암·중증화상 5%, 희귀·중증난치 10%)과 적용기간은 고시 개정으로 바뀔 수 있으니 2026 최신 '본인일부부담금 산정특례에 관한 기준' 고시본으로 대조.
  검수 포인트 2: 산정특례는 등록 질환·합병증 관련 진료에만 적용 — "모든 진료비가 5%"라는 통념 반박 단락 필수. 비급여는 산정특례 대상 아님.
  검수 포인트 3: 의료 정보는 일반 안내 수준으로만. 특정 질환 진단·치료·병원 선택 권유 절대 금지(AdSense YMYL). 등록 여부·본인부담은 개인 상황에 따라 다름을 고지.
