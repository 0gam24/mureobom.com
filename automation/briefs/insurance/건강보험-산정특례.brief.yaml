target_query: "건강보험 산정특례 대상 질환 본인부담 등록 방법 2026"
search_intent: 정보형     # 제도 개념·대상 질환·본인부담률·등록 절차를 한 번에 파악하려는 의도

signal:                  # 스캐너 큐 소진 → 운영자 수동 선정 (읽기 전용, 원문 아님)
  score: 0
  trend_momentum: 0
  question_volume: 0
  cluster_fit: 1.0
  freshness: 1.0

must_cover:
  - 산정특례 제도 개념 — 중증질환·희귀질환·중증난치질환·결핵 등 등록 시 건강보험 본인부담률 자체를 경감하는 제도
  - 질환군별 본인부담률과 적용기간 — 암·중증화상 등 5%(암 5년 등), 희귀질환·중증난치질환 10%, 결핵 등 별도 기준
  - 등록 방법 — 담당 의사 진단·등록신청서 작성 후 국민건강보험공단에 산정특례 등록 신청(병원 대행/공단 접수)
  - 재등록·적용 종료 — 특례기간 만료 시 재등록 요건, 적용 시작·종료 시점 처리
  - 본인부담상한제와의 차이 — 산정특례는 '본인부담률 비율 경감', 상한제는 '연간 총액 상한 초과분 환급'(상한제 상세는 내부링크로만)
  - 산정특례가 적용되는 진료 범위 — 등록 질환 및 합병증 관련 진료에 한정, 비급여·적용 제외 항목 경계

required_sources:        # 공식 1차 출처만. 0건이면 발행 차단. 블로그·개인 Q&A·병원 광고 등 비공식 출처 배제
  - "국민건강보험법 / 국민건강보험법 시행령 (국가법령정보센터, law.go.kr)"
  - "본인일부부담금 산정특례에 관한 기준 (보건복지부 고시, 국가법령정보센터 law.go.kr)"
  - "국민건강보험공단 산정특례 안내 (nhis.or.kr)"
  - "보건복지부 (mohw.go.kr)"

