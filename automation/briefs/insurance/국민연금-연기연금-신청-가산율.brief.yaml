must_cover:
  - 연기연금 제도 개요(노령연금 수급권자가 수급 시기를 최대 5년 늦추는 제도)
  - 연기 1개월당 0.6%(연 7.2%) 가산, 최대 5년 연기 시 36% 증액
  - 신청 가능 연령·횟수(수급개시연령~70세, 1회), 전부 연기와 일부(50~90%) 연기 선택
  - 조기노령연금(감액)과의 대칭 비교, 재직자 노령연금 감액과의 관계
  - 손익분기(더 받는 총액이 역전되는 시점) 개념과 판단 시 고려사항

required_sources:        # 공식 1차 출처만
  - "국민연금법 제62조(연기연금), 국가법령정보센터"
  - "국민연금법 제63조의2(소득활동에 따른 노령연금액), 국가법령정보센터"
  - "국민연금공단, 연기연금(노령연금 연기제도) 안내"

