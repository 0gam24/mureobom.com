human_notes: |
  차별화: 기발행 '조기수령-감액률(0.5%/월 감액)'과 정확히 대칭되는 '연기연금(0.6%/월 가산)'
  비교표를 핵심으로. 조기수령은 월 0.5%·연 6% 감액, 연기연금은 월 0.6%·연 7.2% 가산이라는
  비대칭 수치를 명확히. 전부 연기와 일부 연기(50~90%) 선택지, 손익분기 개념까지.
  단, 특정 개인에게 '연기가 유리하다'는 단정적 재무 권유는 금지(일반정보 고지 유지).
