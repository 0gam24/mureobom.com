human_notes: |
  차별화: 지역가입자 건강보험료 — 소득(점수)·재산(점수)·자동차 부과체계와 2026 부과점수당 금액·계산 예시, 직장가입자와 차이. 기발행 피부양자/임의계속/4대보험 글과 의도 분리(지역가입자 산정 단일 의도).
  검수 포인트: 부과점수당 금액과 재산공제 금액은 매년 고시로 바뀌니 2026 최신 기준 반드시 확인(연도 명시).
  자주 틀리는 통념 — "재산이 많으면 무조건 비싸다"는 단정 회피, 재산공제·자동차 부과 축소 흐름 반영.
  계산 예시는 가상의 표준 사례(소득·재산·차량 가정)로 산정 과정만 보여주고, 단정적 금액 약속 금지.
