status: published  # 2026-05-24 운영자 직접 발행

target_query: "노란우산공제 가입자격 세액공제"
search_intent: 정보형

signal:
  cluster_fit: 1.0
  freshness: 0.7
  manual: true

must_cover:
  - 제도 개요 — 중소기업협동조합법 §115, 중기중앙회 운영, 소기업·소상공인 폐업·노후 대비
  - **제목의 "세액공제" → 본문에서는 "소득공제"로 정정** (조세특례제한법 §86조의3)
  - 가입자격 — 업종별 매출액 15억~140억 이하 (2025.9.1 결산 기준), 가입제한 업종(주점·도박 등)
  - 부금 — 월 5만~100만원 (1만원 단위)
  - 소득공제 한도 — 사업소득금액 구간별 (4천 이하 600/4~6천 500/6천~1억 400/1억 초과 200), 법인 대표 근로소득 8천 이하 동일 적용
  - 압류·양도·담보 금지 — 중소기업협동조합법 §119, 압류금지 수급계좌 신설 보완
  - 공제금 지급 사유 — 폐업/노령(60↑·납입 120개월↑)/사망/퇴임
  - 임의해지 시 기타소득 과세 — 소득공제 받은 금액 초과분
  - 가입 방법 — 중기중앙회·콜센터 1666-9988·12개 은행 위탁

required_sources:
  - "조세특례제한법 §86조의3 (소득공제) — 국가법령정보센터"
  - "중소기업협동조합법 (§115·§119) — 국가법령정보센터"
