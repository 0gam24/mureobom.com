must_cover:
  - 수급 대상 — 만 65세 이상 + 소득인정액이 선정기준액 이하(단독/부부가구 구분)
  - 소득인정액 개념 — 소득평가액 + 재산의 소득환산액(근로소득 공제, 기본재산 공제 포함)
  - 2026년 선정기준액과 기준연금액(최대 지급액)의 의미
  - 감액 요인 — 국민연금 연계 감액, 부부 동시 수급 20% 감액, 소득역전방지 감액
  - 신청 방법(주소지 읍면동·국민연금공단, 복지로 온라인)과 필요 서류
  - 흔한 오해: "국민연금 받으면 기초연금 못 받는다" 바로잡기(연계 감액이지 배제 아님)

required_sources:        # 공식 1차 출처만(법령·기관). 0건이면 발행 차단
  - "기초연금법 제3조(수급권자 범위)·제5조(기초연금액 산정) (국가법령정보센터 law.go.kr 조문 렌더)"
  - "보건복지부 기초연금 사업안내(선정기준액·기준연금액 고시) (mohw.go.kr)"
  - "국민연금공단 기초연금 신청·소득인정액 안내 (nps.or.kr / basicpension.mohw.go.kr)"

