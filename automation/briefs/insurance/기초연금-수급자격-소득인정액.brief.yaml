human_notes: |
  차별화: "국민연금 받으면 기초연금 못 받는다"는 최다 오해를 국민연금 연계 감액 구조로
  정면 반박하고, 소득인정액=소득평가액+재산 소득환산액 계산 얼개를 도식으로.
  기발행 국민연금 글들과 축이 다름(국민연금=기여형, 기초연금=조세형 노후소득보장) — 의미중복 아님.
  선정기준액·기준연금액은 매년 1월 보건복지부 고시로 변동 → 2026 고시값 반드시 대조,
  구체 금액은 "2026년 기준" 명시로 노후화 대비.
  단정적 수급 확언 금지(F-*). 감액 3종(국민연금 연계·부부·소득역전방지) 구분 정확히.
