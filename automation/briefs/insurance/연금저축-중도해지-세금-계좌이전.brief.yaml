human_notes: |
  차별화: 기발행 insurance/연금저축-irp-세액공제-한도(가입·공제 관점)와 겹치지 않도록 "해지 시 세금
  불이익 × 대안(계좌이전)" 관점에 집중. 세액공제 받은 원금·수익에 기타소득세 16.5%가 붙는 구조와,
  해지 대신 계좌이전으로 세금 없이 유지하는 선택지를 나란히 제시.
  검수 포인트(egress 복구 후 researcher가 확정):
  - 기타소득세율(16.5%, 지방세 포함)·연금소득세 저율(3.3~5.5%)·부득이한 사유 범위를 소득세법 시행령으로
    확정 표기. 계좌이전 시 과세이연 유지 근거를 통합연금포털/법령으로 확인.
  - 세부담 절감을 단정·권유하는 표현 금지(F-*). "해지가 유리/불리"의 일반화 대신 상황별 원칙만 서술,
    개별 판단은 전문가·금융회사 상담 안내로 마무리. 일반정보 고지 유지.
