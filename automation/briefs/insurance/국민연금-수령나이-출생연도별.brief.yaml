  - 출생연도별 개시연령표 — 1952년 이전 60세 / 1953~56년생 61세 / 1957~60년생 62세 / 1961~64년생 63세 / 1965~68년생 64세 / 1969년생 이후 65세
  - 조기노령연금: 개시연령보다 최대 5년 앞당겨 수령, 1년 앞당길수록 6%씩(최대 30%) 감액·평생 적용
  - 연기연금: 개시연령부터 최대 5년 연기, 1개월당 0.6%(연 7.2%, 최대 36%) 가산
  - 조기수령 vs 정상수령 vs 연기수령 손익분기 개념과 선택 시 고려 요소(소득활동·기대수명·건강)
  - 흔한 오해 바로잡기 — "수급개시연령 = 정년/65세 고정"이 아니라 출생연도로 결정된다는 점
  - 소득활동 시 감액(재직자 노령연금) 등 개시연령 도달 후에도 달라지는 변수 1줄 짚기

