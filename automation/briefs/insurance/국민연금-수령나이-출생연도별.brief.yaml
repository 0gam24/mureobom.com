human_notes: |
  차별화: 출생연도별 노령연금 개시연령표(1953~69년생 단계 상향·1969년생 이후 65세)·조기수령(최대 5년·최대 30% 감액)·연기연금(최대 5년·최대 36% 증액)을 한 화면에 묶는다. 기발행 예상수령액(금액) 글과 의도 분리 — 본 글은 "수령 개시 연령" 단일 의도.
  검수 포인트: 개시연령표는 출생연도 구간을 1년이라도 틀리면 신뢰 붕괴 — 작성 시 부칙 경과규정으로 구간 재확인 필수(추정 금지).
  자주 틀리는 통념: "국민연금은 무조건 65세부터"는 1969년생 이후에만 해당. 조기수령 감액·연기연금 가산율은 연도가 아닌 제도값이니 2026 기준 수치 그대로.
  기준연도 2026 명시. 출생연도별 표는 다른 사이트도 많으니 조기/연기 손익분기 관점 한 단락으로 각도를 벌릴 것.
