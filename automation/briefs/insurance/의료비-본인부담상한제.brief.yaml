must_cover:
  - 본인부담상한제 개요 — 국민건강보험법 §44, 공단 운영
  - 작동 원리 — 1년 본인부담금이 상한액 초과 시 초과분 환급
  - 소득분위별 상한액 — 1~10분위 차등 (저소득 낮음), 매년 공시 (구체 금액은 연도별 확인)
  - 사전급여(동일기관 초과) vs 사후환급(여러 기관 합산)
  - 적용 제외 — 비급여·선별급여·전액본인부담·임플란트·상급병실
  - 환급 신청 — 공단 안내문 발송 → 본인 계좌 신청
  - 요양병원 장기입원(120일 초과) 별도 상한
  - 본인부담상한제 vs 실손보험 — 약관별 정산 차이

