human_notes: |
  차별화: 부양·소득·재산 3축 매트릭스 표 + 직계존비속/형제자매 부양 인정 기준 비교 표 + 자격 상실 시 지역가입자 보험료 평균 증가폭(현실 수치 범위). 단순 "조건 나열형" 글들과 달리 "내가 어느 축에서 걸리는지" 자가 진단 가능한 구조로 작성.
  검수 포인트:
  - 2026년 소득·재산 한도 수치(2,000만원·1,000만원·5.4억·9억)는 매년 미세 조정 가능성 — researcher가 공단 최신 고시 반드시 재확인. 추정치 금지.
  - "소득 없으면 무조건 피부양자" 통념 반박 단락 필수(재산 기준 단독 탈락 케이스 존재).
  - 형제자매 부양 인정은 30세 미만/65세 이상 등 연령 제약이 따로 있음 — 직계존비속과 분리 서술.
  - 사업소득 발생 시 즉시 탈락은 "사업자등록 여부"에 따라 다름 — 일률 단정 금지(F-01).
