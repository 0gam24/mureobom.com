human_notes: |
  차별화: 장애등급별 지급률 + 4급 일시보상금 갈림길을 한 표로 정리하고, 국민연금 장애연금 vs 장애인연금(복지부)·장애인등록의 3자 혼동을 명시 구분.
  검수 포인트 1: 급여율은 기본연금액 기준 1급100/2급80/3급60%, 4급은 기본연금액의 225% 일시보상금 — 등급·비율 최신 법령값 재확인.
  검수 포인트 2: 초진일 요건과 완치일(미완치 시 초진일 1년 6개월 경과일) 기준을 흔히 헷갈림. 국민연금법 제67조/제68조/제71조 조문으로 대조.
  검수 포인트 3: "장애인등록되면 자동 지급"은 오해 — 국민연금 가입·납부요건이 별도. 통념 반박 단락 필수.
