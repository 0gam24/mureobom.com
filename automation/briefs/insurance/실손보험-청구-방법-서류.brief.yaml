human_notes: |
  차별화: 실손 1~5세대 보장범위 비교 표 + 청구 가능/제외 항목 매트릭스 + 비대면 청구 단계별 흐름 (실손24/자체앱/직접전송 분기).
  세대 구분은 가입 시기로 결정되므로 "내 실손이 몇 세대인지 확인하는 법" 한 문단 필수 — 다른 사이트가 자주 놓치는 진입점.
  비대면 청구는 2024~2025 실손24 본격화 이후 흐름이 빠르게 바뀌었음 → 2026 5월 현재 기준 실손24 참여 보험사·의료기관 범위로 최신화.
  "한 번 청구하면 보험료 즉시 오른다"는 통념은 갱신 주기·할인할증 구조와 연결해 정확히 반박 — 단정 회피 (F-01).
  특정 손보사 청구 앱 사용법으로 빠지지 말 것 (F-02). 제도·서류·기한 중심.
