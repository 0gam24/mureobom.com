  - 청구 기한 — 상법상 보험금 청구권 소멸시효 3년 (사고일/진료일 기준 산정)
  - 비대면 청구 흐름 — 실손24 통합 청구앱, 손보사 자체 앱, 사진/의료기관 직접 전송 방식 단계별 정리
  - 다회 청구 가능 여부 — 같은 진료 건 분할/추가 청구, 통원·약제 합산 청구 한도
  - 흔한 오해 바로잡기 — "영수증 없으면 못 받는다", "한 번 청구하면 보험료가 즉시 오른다", "3년 지나면 무조건 못 받는다" 등 통념 반박

