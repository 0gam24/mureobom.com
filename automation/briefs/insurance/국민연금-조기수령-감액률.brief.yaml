human_notes: |
  차별화: 이미 발행된 '수령나이-출생연도별'(정상 개시연령)·'예상수령액-계산'과 분리 —
  이 글은 조기노령연금의 '감액 구조·손익' 전용. 1년당 6%(월 0.5%)·최대 5년 30% 감액
  메커니즘과 연령별 예시표 + 정상수령 대비 총액 교차 시점을 다른 사이트가 놓치는 각도로.
  스캐너 큐 소진으로 운영자 수동 선정(2026-07 공백 채움) — score 0은 정상.
  검수 포인트: 감액률·신청 요건(가입기간 10년, 소득 있는 업무 종사 여부 기준액)은
  2026 기준으로 재확인. 정상 개시연령은 출생연도별로 다르므로 '5년 앞당김'의 실제 나이는
  출생연도에 따라 달라짐을 명시. 손익분기 시점은 수령액·기대수명·물가상승 가정에 따라
  개인차가 크므로 특정 나이를 단정하지 말 것(예시·조건부 서술로만).
