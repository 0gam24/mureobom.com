must_cover:
  - 조기노령연금 개념 — 정상 노령연금 개시연령보다 최대 5년 앞당겨 받는 제도
  - 신청 요건 — 가입기간 10년(120개월) 이상, 소득 있는 업무에 종사하지 않을 것 등
  - 감액률 구조 — 1년 앞당길수록 6%씩(월 0.5%), 최대 5년 30% 감액되어 평생 적용
  - 연령별 감액 예시 — 1년(6%)·3년(18%)·5년(30%) 앞당김에 따른 수령액 비교표
  - 조기수령 손익분기 — 일찍 받는 대신 평생 감액, 정상 수령과 총액이 교차하는 시점(개인차 큼, 단정 회피)
  - 조기수령 정지·재개(소득 발생 시 지급정지 가능)와 연기연금(늦춰 받으면 연 7.2% 가산)과의 대비

