target_query: "국민연금 예상수령액 2026 가입기간 보험료"
search_intent: 정보형     # 예상 수령액 산정 방식과 변수를 이해하려는 정보 탐색

signal:                  # 스캐너 산출(읽기 전용, 원문 아님)
  score: 86.4
  trend_momentum: 0.71
