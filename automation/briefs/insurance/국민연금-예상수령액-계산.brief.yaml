human_notes: |
  차별화: 가입기간별(10·20·30·40년) 예상 수령액 시뮬레이션 표 + 조기·연기 수령 시 평균 변동률 + A값/B값 의미 설명으로 "공식 해부형" 각도.
  F-01 가드: "월 X만원 보장" 단정 금지 — 모든 금액은 "예상", "공단 모의계산 기준"으로 표현. A·B값과 물가변동률에 따라 매년 달라진다는 점 명시.
  F-02 가드: 사적연금·연금저축·IRP 등 상품 비교/추천 절대 금지. 국민연금 제도만 다룬다. "부족하면 사적연금으로" 같은 유도 문장도 빼라.
  2026년 1월 조정된 A값·부양가족연금액 최신 수치 반영 확인. 조기/연기 가산율은 연 단위(월할 계산)이므로 "연 6%·연 7.2%" 명확히.
  "낸 만큼 받는다"는 통념 반박 — 국민연금은 소득재분배(A값 가중) 구조라 저소득자 수익비가 더 높다는 점이 차별 포인트.
