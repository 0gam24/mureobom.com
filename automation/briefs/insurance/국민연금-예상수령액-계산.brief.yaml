  cluster_fit: 1.0
  freshness: 0.62

must_cover:
  - 국민연금 기본연금액 산정 공식 (기본연금액 = 1.2×(A+B)×(1+0.05n/12)×P/12 구조, A값·B값·가입월수 n 의미)
  - A값(전체 가입자 3년 평균소득)과 B값(본인 가입기간 평균소득) 개념과 차이
  - 가입기간별 예상 수령액 시뮬레이션(10년 최소가입·20년·30년·40년 구간별 변동 폭, "예상" 톤 유지)
  - 조기노령연금(55~59세, 연 6% 감액)과 연기연금(최대 5년, 연 7.2% 가산) 가산·감액률
  - 2026년 물가변동률 반영 및 매년 1월 연금액 자동 조정(소비자물가지수 연동)
  - 부양가족연금액(배우자·자녀·부모) 가산 기준과 2026년 금액
  - 흔한 오해 바로잡기("낸 만큼만 받는다" 통념 vs 소득재분배 구조) + 국민연금공단 '내 연금 알아보기' 모의계산 도구 안내

required_sources:        # 공식 1차 출처만. 지식iN 아님. 0건이면 발행 차단
  - "국민연금법 / 국민연금법 시행령 (국가법령정보센터)"
  - "국민연금공단 (nps.or.kr) — 내 연금 알아보기·예상연금 모의계산"
  - "보건복지부 (mohw.go.kr) — 연금정책과 공식 자료 및 연금액 조정 고시"

