human_notes: |
  차별화: 추납 상한 119개월(2020 개정) + 손익 판단(납부액 대비 연금증가) 단락.
  검수: "무조건 이득" 단정 금지 — 본인 손익 계산 안내로 표현. 임의가입자도 신청 가능 명시.
  분할납부 가산·일시납 구분, 적용제외 기간(전업주부) 케이스 포함.
