id: insurance-국민연금-추납-추후납부-신청
cluster: insurance
status: published  # 2026-06-10 compliance 게이트 통과 발행

target_query: "국민연금 추납 추후납부 신청자격 금액"
search_intent: 절차형

signal:
  cluster_fit: 1.0
  freshness: 0.78
  manual: true

must_cover:
  - 추후납부(추납) 개요 — 국민연금법 §92, 납부예외·적용제외 기간을 나중에 납부해 가입기간 인정
  - 신청 자격 — 현재 국민연금 가입 중(임의가입 포함)이어야 신청 가능, 과거 1개월 이상 보험료 납부 이력 필요
  - 추납 대상 기간 — 납부예외 기간, 1988년 이후 적용제외(경력단절 전업주부 등) 기간
  - 추납 가능 상한 — 최대 119개월(10년 미만)까지만 인정 (2020.12 개정)
  - 추납 보험료 산정 — 신청 당시 연금보험료 × 추납 개월수, 일시납 또는 최대 60회 분할납부
  - 신청 방법 — 국민연금공단 지사 방문·우편·전화, 일부 전자민원 가능
  - 효과·주의 — 가입기간 늘어 수령액 증가하나 본인 손익(납부액 대비 연금증가) 판단 필요, 분할 시 가산

required_sources:
  - "국민연금법 제92조 (연금보험료의 추후납부) — 국가법령정보센터"
  - "국민연금공단 — 추후납부 제도 안내"
  - "국민연금공단 — 추납 보험료 및 신청 방법"

