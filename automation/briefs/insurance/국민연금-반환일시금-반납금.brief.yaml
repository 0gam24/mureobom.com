must_cover:
  - 반환일시금이란 — 연금 수급요건(최소 가입기간)을 못 채우고 수급연령 도달·국외이주·사망 등일 때 납부한 보험료를 이자와 함께 일시 지급
  - 반환일시금 지급 사유(60세 도달 후 가입기간 10년 미만, 국적상실·국외이주, 사망 등)와 청구 소멸시효(5년)
  - 반납금이란 — 과거 받았던 반환일시금을 이자와 함께 되돌려 내고 그 가입기간을 복원하는 제도
  - 반납의 이점(가입기간 복원 → 노령연금 수급요건·연금액 유리), 분할납부 가능
  - 반환일시금 vs 반납금 관계 정리(받은 것을 되돌리는 것이 반납)
  - 흔한 오해(낸 돈 그냥 사라진다? 반환일시금 받으면 끝인가?) 바로잡기

