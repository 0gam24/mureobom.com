human_notes: |
  차별화: '반환일시금(받는 것)'과 '반납금(되돌려 내는 것)'을 한 표로 대비 — 방향이 반대인 두 제도의 혼동을 정리.
  반납은 저평가된 가입기간 복원 카드(노령연금 수급요건 10년 채우기)라는 실용 각도 강조.
  청구 소멸시효 5년, 분할납부 가능 등 실무 포인트. 단정적 수익 약속 금지, 개별 금액은 공단 확인 안내(F-*·L-* 가드).
