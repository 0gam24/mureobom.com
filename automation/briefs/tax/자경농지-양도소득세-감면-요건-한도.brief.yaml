human_notes: |
  차별화: "8년 자경 + 재촌 요건"을 실제 판정 축으로 분해하고, 소유만으로는 자경이 인정되지 않는다는 점과
  다른 소득 규모에 따른 자경기간 제외 개념을 명확화. 감면 한도(연간·5년 합산)를 "무제한"이라는 통념과 대비.
  대토 감면과 자경 감면의 차이를 표로 구분.
  검수 포인트(egress 복구 후 researcher가 확정):
  - 감면 한도액·재촌 거리 기준·소득 제외 기준은 조특법/시행령 조문으로 확정 표기(추측 금지).
  - 세액 계산·절세 단정 표현 금지, "개별 사안은 관할 세무서·세무대리인 확인" 일반정보 고지 유지.
  - 자경 인정 판정은 사실관계 다툼이 많은 영역 — 단정적 판단 대신 요건 정리 중심 서술.
