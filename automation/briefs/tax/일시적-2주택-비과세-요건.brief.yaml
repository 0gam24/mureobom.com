human_notes: |
  차별화: 기발행 `tax/양도소득세-1세대1주택-비과세`의 후속 심화 — "신규 주택 취득 후 3년 이내 종전 처분" 단일 의도로 좁히고, 처분 기한 산정 기준일(잔금일 vs 등기일)·2026 조정대상지역 변동에 따른 거주요건 재판정·분양권/입주권을 신규 주택으로 본 경우의 기한 특례까지 한 표로 정리.
  검수 포인트:
    - 처분 기한은 시행령 개정 이력이 잦음(2년→3년 환원 등). 본문은 2026-06 현재 시행 중인 기한만 명시하고, "법령 개정 이력은 별도 표로 시각화"하라.
    - "조정대상지역에서 취득" 요건은 *취득 당시* 기준임. 2026 현재 해제됐어도 취득 시점이 조정대상지역이었으면 2년 거주 요건이 살아있음 — 자주 틀리는 통념.
    - 상속·혼인·동거봉양 합가 2주택 특례는 시행령 별도 조항(155-2/3/4)이라 본 글 범위 밖. 한 문장 경계 표시 + 추후 별도 글 안내.
