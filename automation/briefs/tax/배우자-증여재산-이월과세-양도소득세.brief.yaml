human_notes: |
  차별화: 기발행 tax/부담부증여-양도세-증여세, tax/증여세-면제한도와 겹치지 않도록 "이월과세 = 취득가액
  이월"이라는 단일 메커니즘에 초점. 특히 5년→10년 적용기간 강화 개정의 시행일·적용대상(취득 시점 기준)을
  정확히 짚어 "지금 증여하면 몇 년 뒤 팔아야 이월과세를 피하나"를 명확히.
  검수 포인트(egress 복구 후 researcher가 확정):
  - 이월과세 적용 경과기간(5년/10년)과 적용 개시 시점(자산 취득일 기준 개정 시행일)을 소득세법 §97의2와
    부칙으로 확정 표기(추측 금지). 대상 자산 범위(부동산·부동산에 관한 권리·특정시설물이용권 등) 정확히.
  - "이렇게 하면 세금이 준다" 식 단정·회피 조언 금지(F-*). 부당행위계산부인과의 관계는 원칙만 서술,
    개별 사안 세무판단은 전문가 상담 안내로 마무리. 일반정보 고지 유지.
