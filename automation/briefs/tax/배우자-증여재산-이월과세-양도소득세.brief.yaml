  - 이월과세가 적용될 때 취득가액·필요경비(증여세 산입) 계산 방식과 세부담 변화
  - "증여로 취득가액을 높여 양도세를 줄이는" 절세 시도가 이월과세로 차단되는 원리와 예외(수증자 사망 등)
  - 우회증여 부당행위계산부인(§101)과의 관계, 흔한 오해 바로잡기("증여받고 바로 팔면 취득가액이 증여가액")

