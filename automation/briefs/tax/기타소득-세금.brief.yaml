id: tax-기타소득-세금
cluster: tax
status: published        # compliance OK (D-2026-07-07) — O-01~04·K-01~04·L-02·AD-01~05 통과. 즉석 승인 큐 소진 수동 선정.

target_query: "기타소득 세금 필요경비 분리과세 종합과세 원천징수"
search_intent: 정보형     # 개념·과세방식·세율을 한 번에 파악하려는 의도

signal:                  # 수동 선정(스캐너 큐 소진) — 원문 아님, 집계 수치만
  score: 0
  trend_momentum: 0
  question_volume: 0
  cluster_fit: 1.0
  freshness: 1.0

must_cover:
  - 기타소득 개념·범위 — 강연료·원고료·상금·사례금·일시적 인적용역 등 일시·우발적 소득. 사업소득(계속·반복성)/근로소득(고용관계)과의 구분 기준
  - 필요경비 — 강연료·원고료 등 일부 기타소득은 60% 의제필요경비 인정, 실제 경비와 큰 쪽을 적용(실제 경비가 60% 초과 시 실액 공제)
  - 원천징수 — 기타소득금액의 20%(소득세) + 지방소득세 포함 실효 22%. 지급자가 원천징수 후 지급하는 구조
  - 분리과세 vs 종합과세 선택 — 기타소득금액 연 300만원 이하면 분리과세(22%)로 종결 선택 가능, 초과 시 종합과세 의무
  - 과세최저한 — 건별 기타소득금액 5만원 이하 등 과세 제외·비과세 케이스(다른 사이트가 자주 누락하는 지점)
  - 종합과세 시 합산 신고 — 다음해 5월 종합소득세 신고 시 다른 소득과 합산, 원천징수세액은 기납부세액으로 정산

required_sources:        # 공식 1차 출처만. 0건이면 발행 차단
  - "소득세법 (기타소득 범위·과세최저한·분리과세 선택 조문) — 국가법령정보센터 law.go.kr"
  - "소득세법 시행령 (기타소득 의제필요경비율·원천징수 조문) — 국가법령정보센터 law.go.kr"
  - "국세청 기타소득 안내(원천징수·연말정산·종합소득세) — nts.go.kr"

