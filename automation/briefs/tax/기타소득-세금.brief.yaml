human_notes: |
  차별화: 프리랜서 3.3%(사업소득)·근로소득 원천징수와 명확히 분리한 '기타소득' 전용 각도 —
    강연료·원고료·상금·사례금이 사업소득으로 넘어가는 경계선 + 60% 의제필요경비 vs 실제경비 비교표 +
    분리과세(300만원 이하) 유지 vs 종합과세 전환 유불리 판단 케이스.
  스캐너 큐 소진으로 운영자 수동 선정(2026-06-30). 발행 tax 슬러그와 의미중복 없음(사업소득/근로소득과 별개 소득구분).
  검수 포인트:
    - 60% 의제필요경비율·20%(실효 22%) 원천징수율·연 300만원 분리과세 기준은 2026년 소득세법/시행령 기준으로 최신 확인 필요(연도별 개정 여지).
    - 자주 틀리는 통념: "기타소득도 무조건 5월 종소세 신고" → 300만원 이하 분리과세 선택 시 원천징수로 종결. 과세최저한(건별 5만원 이하) 비과세 케이스도 명시.
    - 강연·원고 등 인적용역이 계속·반복되면 사업소득으로 재분류될 수 있다는 경계 주의(3.3% 글과 상호 링크로 명확화).
