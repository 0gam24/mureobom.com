id: tax-증여세-면제한도-증여재산공제
cluster: tax
status: published  # 2026-06-10 compliance 게이트 통과 발행

target_query: "증여세 면제한도 증여재산공제 2026"
search_intent: 정보형

signal:
  cluster_fit: 1.0
  freshness: 0.80
  manual: true

must_cover:
  - 증여재산공제 개요 — 상속세 및 증여세법 §53, 10년 합산 과세
  - 관계별 공제 한도 — 배우자 6억, 직계존속→직계비속 5천만(미성년 2천만), 직계비속→직계존속 5천만, 기타 친족 1천만
  - 혼인·출산 증여재산공제 — §53의2, 1억 원(혼인 전후 2년/출생·입양 2년), 통합 1억 한도
  - 10년 합산 원칙 — 동일인(직계존속은 배우자 합산)으로부터 10년간 합산해 한도 적용
  - 증여세 세율 — §56, 1억 이하 10% ~ 30억 초과 50% 누진
  - 신고·납부 — 증여일이 속한 달 말일부터 3개월 이내, 홈택스 신고
  - 흔한 오해 — "면제한도=비과세 전부" 아님, 한도 초과분만 과세 / 공제는 수증자 기준 합산

required_sources:
  - "상속세 및 증여세법 제53조 (증여재산 공제) — 국가법령정보센터"
  - "상속세 및 증여세법 제53조의2 (혼인·출산 증여재산 공제)"
  - "상속세 및 증여세법 제56조 (증여세 세율)"
  - "국세청 — 증여세 세율 및 증여재산공제 안내"

