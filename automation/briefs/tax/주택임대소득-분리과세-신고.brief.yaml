human_notes: |
  차별화: 주택임대소득 — 연 2천만원 이하 분리과세(14%) vs 종합과세 선택, 필요경비·기본공제(등록·미등록 차등), 1주택 비과세(기준시가 12억 초과·국외주택 예외), 간주임대료. 기발행 종합소득세 신고 글과 의도 분리(주택임대소득 단일 의도).
  검수 포인트: 과세 기준은 2026년 적용분으로 통일 — 기본공제 400만원·필요경비율(등록 60%/미등록 50%)과 등록임대 세제혜택은 연도별로 바뀌니 최신 확인.
  자주 틀리는 통념: "월세 안 받고 전세만 있으면 비과세"는 오류 — 3주택 이상 보증금은 간주임대료로 과세. "1주택은 무조건 비과세"도 오류 — 기준시가 12억 초과·국외주택은 예외.
  분리/종합 유불리는 "절대 유리"로 단정 말 것(다른 소득 규모에 따라 갈림) — 일반정보 고지 톤 유지.
