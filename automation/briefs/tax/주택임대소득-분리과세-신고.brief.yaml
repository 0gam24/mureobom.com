must_cover:
  - 주택임대소득 과세 대상 판정(연 임대수입 2천만원 기준 — 이하 분리/종합 선택, 초과 종합과세)
  - 분리과세 14% 단일세율 계산 구조와 종합과세 합산 누진세율 비교(어느 쪽이 유리한지 판단 기준)
  - 필요경비·기본공제(연 400만원) 적용 — 임대주택 등록 vs 미등록 차등(필요경비율·공제액 차이)
  - 1주택자 비과세 원칙과 예외(기준시가 12억원 초과 고가주택, 국외 소재 주택은 1주택도 과세)
  - 간주임대료 계산(보증금·전세금 3주택 이상 보유 시 합산 과세, 소형주택 제외 기준)
  - 2026년 적용 기준(과세 기준연도·등록임대 세제혜택 변동분) 명시와 신고 시기(5월 종합소득세 기간 합산)
  - 흔한 오해 바로잡기(월세 없는 전세만 있어도 간주임대료로 과세될 수 있음)

