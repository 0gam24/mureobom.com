id: tax-중소기업-취업자-소득세-감면
cluster: tax
status: published  # 2026-06-11 compliance 게이트 통과

target_query: "중소기업 취업자 소득세 감면 청년 신청 방법"
search_intent: 절차형

signal:
  cluster_fit: 1.0
  freshness: 0.80
  manual: true

must_cover:
  - 제도 개요 — 조세특례제한법 §30, 중소기업 취업자에 대한 근로소득세 감면
  - 대상자 — 청년(만 15~34세, 군복무기간 최대 6년 차감), 60세 이상, 장애인, 경력단절여성
  - 감면율·기간 — 청년 90% 5년, 그 외 70% 3년 (구간별 공식 수치 확인)
  - 감면 한도 — 과세기간별 감면세액 한도(연 200만 원) 확인
  - 대상 업종·제외 업종 — 감면 적용 제외 업종(전문서비스·금융·보건업 일부 등) 공식 기준
  - 신청 방법 — 취업일이 속하는 달의 다음 달 말일까지 원천징수의무자(회사)에 감면신청서 제출, 회사가 관할 세무서 제출
  - 소급·경정청구 — 미신청 시 경정청구로 소급 감면 가능 여부
  - 흔한 오해 — 감면율은 소득세 산출세액 기준(전액 아님), 지방소득세는 별도

required_sources:
  - "조세특례제한법 제30조 (중소기업 취업자에 대한 소득세 감면) — 국가법령정보센터"
  - "조세특례제한법 시행령 제27조 — 국가법령정보센터"
  - "국세청 — 중소기업 취업자 소득세 감면 안내"

