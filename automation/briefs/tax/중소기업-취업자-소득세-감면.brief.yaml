  llms_txt: true

human_notes: |
  차별화: 청년 90%·5년 / 그 외 70%·3년 + 연 200만 한도 + 제외 업종 + 경정청구 소급.
  검수: 연령·감면율·기간·한도는 조특법 §30 + 국세청 안내로 교차검증, 2026 기준 명시.
  "세금 0원" 단정 금지 — 산출세액 기준 감면, 지방소득세 별도. 일반정보 고지.
