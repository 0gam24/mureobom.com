human_notes: |
  차별화: 해외주식 양도차익 과세 — 기본공제 250만원·세율 22%(지방세 포함)·취득/양도 환율 적용·손익통산·5월 확정신고. 계산 예시. 기발행 부동산 양도세 글과 자산 분리(해외주식 단일 의도).
  검수 포인트: 기준연도 2026년(전년 양도분 → 2026년 5월 신고)으로 통일. 부동산 양도세(장기보유특별공제·1세대1주택)와 혼동 금지 — 해외주식은 보유기간 무관 동일 세율.
  자주 틀리는 통념: "250만원 안 넘으면 신고 자체가 불필요" → 차익이 공제액 이하라도 신고 의무가 있는 케이스 구분 명시. 취득·양도 환율을 같은 날짜로 잡아 환차손익을 누락하는 실수 경고.
  데이터는 비공식 UGC 출처가 아닌 위 required_sources 1차 출처로만 검증할 것.
