  - 기본공제 연 250만원 적용 방식(국내·해외 합산 한도, 1인 1회 적용)
  - 세율 22%(양도소득세 20% + 지방소득세 2%, 지방세 포함 실효 표기)
  - 취득가·양도가 환율 적용 기준(각 결제일 기준환율을 따로 적용 → 환차익도 과세 대상에 포함)
  - 손익통산(같은 과세기간 내 다른 해외·국내 양도자산 손실과 이익 합산) 처리
  - 5월 확정신고 기한과 신고 방법(전년도 1~12월 양도분, 다음 해 5월 신고·납부)
  - 계산 예시(취득·양도 환율과 250만원 공제를 반영한 산출세액 1건 워크스루)

