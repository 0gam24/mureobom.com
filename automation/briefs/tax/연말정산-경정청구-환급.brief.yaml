id: tax-연말정산-경정청구-환급
cluster: tax
status: published         # compliance 게이트 통과 (D-2026-06-30-1) — 운영자 즉석 승인 후 발행

target_query: "연말정산 경정청구 놓친 공제 환급 방법 기한 2026"
search_intent: 절차형     # 놓친 공제를 사후에 환급받는 신청 절차를 단계로 원함

signal:                   # 자체발굴(읽기 전용, 집계형 추정치, 원문 아님)
  score: 72.0
  trend_momentum: 0.55
  question_volume: 0.70
  cluster_fit: 1.0
  freshness: 0.45
  note: "source: self-curated 2026-06 — 고볼륨 evergreen 자체발굴, 트렌드 미측정 추정"

must_cover:
  - 경정청구 정의 — 이미 신고·납부한 세액이 과다할 때(공제·감면 누락 등) 더 낸 세금을 돌려받는 사후 정정 청구
  - 청구 기한 — 법정신고기한이 지난 후 5년 이내(국세기본법 경정청구 기간) 신청 가능, 연도별로 청구 가능한 귀속연도 범위 명시
  - 대상이 되는 흔한 누락 케이스 — 부양가족 인적공제, 월세·의료비·교육비·기부금 세액공제, 중소기업 취업자 소득세 감면 등 연말정산에서 빠뜨리기 쉬운 항목
  - 홈택스 신청 절차 — 로그인 → 세금신고 → 종합소득세/근로소득 경정청구 메뉴 → 누락 공제 입력 → 증빙 첨부 단계별 흐름
  - 처리 기간과 환급 시점 — 청구 후 세무서 심사(통상 2개월 이내 결정·통지)와 환급금 지급 시기
  - 회사를 통한 연말정산 재정산 vs 본인 직접 경정청구의 차이(언제 어느 쪽을 쓰는지)
  - 자주 틀리는 통념 바로잡기 — "환급 기한이 지났으니 끝났다"는 오해(5년 내 가능), 경정청구는 추가 환급이지 불이익이 아님

required_sources:         # 공식 1차 출처 후보 (researcher가 검증/보완). 0건이면 발행 차단
  - "국세기본법 / 소득세법 (국가법령정보센터, law.go.kr) — 경정청구 기간·요건"
  - "국세청 경정청구 안내 (nts.go.kr)"
  - "홈택스 경정청구 신청 화면·절차 (hometax.go.kr)"

