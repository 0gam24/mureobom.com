human_notes: |
  차별화: 경정청구 — 연말정산/종합소득세에서 놓친 공제·감면을 5년 내 환급 청구하는 절차(대상·기한·홈택스 신청·처리기간). 기발행 각 세액공제 글과 의도 분리(사후 환급 절차 단일 의도)·내부링크.
  검수 포인트: 청구 기한은 "법정신고기한 후 5년"이 2026 기준 맞는지 확인(국세기본법 개정 이력 주의). 처리기간 "2개월 이내" 표현은 통지 기준임을 명시.
  자주 틀리는 통념: 환급 기한 지났다는 오해, 회사 재정산과 개인 경정청구 혼동 — 두 경로 구분 표로 정리.
  각 세액공제(의료비·월세 등) 발행글은 "공제 자체" 의도, 본 글은 "놓친 뒤 사후 환급 절차" 의도로 의도 중복 회피.
