id: tax-인적공제-부양가족-소득기준
cluster: tax
status: published  # 2026-05-23 운영자 직접 발행

target_query: "인적공제 부양가족 소득기준"
search_intent: 정보형

signal:
  cluster_fit: 1.0
  freshness: 0.85
  manual: true

must_cover:
  - 인적공제 개요 — 본인·배우자·부양가족 1인당 150만원 공제 (소득세법 §50)
  - 부양가족 범위·연령 — 직계존속 60세 이상·직계비속 20세 이하·형제자매(60↑ 또는 20↓)
  - 연간 소득금액 100만원 룰 (근로소득만 있는 경우 총급여 500만원 이하)
  - 추가공제 4종 — 경로우대 100만/장애인 200만/부녀자 50만/한부모 100만 (§51)
  - 부양가족 자료제공 동의 — 홈택스/손택스, 본인인증 5종, 미성년자녀 별도
  - 동거 vs 별거 — 직계존속은 주거 형편 별거 + 실제 부양이면 인정 (시행령 §106)
  - 중복 공제 우선순위 — 배우자 → 직전 공제자 → 종합소득금액 큰 자
  - 종소세 신고에도 동일 적용 (5월 신고)

required_sources:
  - "소득세법 제50조 (기본공제) — 국가법령정보센터"
  - "소득세법 제51조 (추가공제) — 국가법령정보센터"
  - "소득세법 시행령 제106조 — 국가법령정보센터"
  - "국세상담센터 — 부양가족 소득요건 Q&A"
  - "국세상담센터 — 인적공제 범위·연령·동거 Q&A"
  - "국세상담센터 — 부양가족 자료제공 동의 신청 절차"
  - "국세청 — 종합소득세 신고 안내"

internal_links:
