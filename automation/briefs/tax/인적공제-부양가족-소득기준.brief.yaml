human_notes: |
  차별화: "연소득 100만원 룰"의 정확한 표현 + 추가공제 4종 + 처남/사위 등 헷갈리는 케이스 진단표.
  검수: 100만원은 "연간 소득금액"(종합·퇴직·양도 합산, 비과세·분리과세 제외). 단정 금지.
