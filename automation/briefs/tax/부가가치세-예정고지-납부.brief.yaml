must_cover:
  - 예정고지 개념과 대상(개인 일반과세자 원칙), 부과 과세기간(1기 4~6월분 → 7월 고지·납부)
  - 일정: 7월 1일경 고지서 발송, 7월 25일 납부기한 (제2기는 1월 25일)
  - 고지세액 산정 방식 = 직전 과세기간 납부세액의 1/2 (자동 산정, 별도 신고 불요)
  - 면제 기준: 고지세액(징수할 금액)이 50만원 미만이면 예정고지 생략·면제
  - 예정신고로 갈음 가능 조건 — 휴업·사업 부진으로 실적이 급감한 경우 등 예정신고를 선택할 수 있는 케이스(다른 사이트가 자주 누락)
  - 미납 시 가산세·납부 방법(홈택스·고지서 전자납부), 확정신고(7월/1월) 때 기납부세액 공제로 정산되는 구조
  - 간이과세자·신규사업자 등 예정고지 대상에서 빠지는 경우 한 줄 구분

