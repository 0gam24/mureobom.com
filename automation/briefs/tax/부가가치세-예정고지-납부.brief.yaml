human_notes: |
  차별화: 개인 일반과세자 부가세 예정고지(7/1 고지서·7/25 납부) — 고지세액 산정(직전 과세기간 납부세액 1/2), 50만원 미만 면제, 예정신고로 갈음 가능 조건(휴업·실적 급감). 기발행 부가세 신고/간이과세 전환 글과 의도 분리(예정고지 단일 의도).
  검수 포인트: 기준연도 2026 명시 — 일정(7/25, 1/25)·면제 기준액(50만원)은 매년 동일하나 연도 표기 갱신. 자주 틀리는 통념 = "예정고지도 신고해야 한다"(아님, 자동 고지·납부만) / "예정고지 받으면 7월 확정신고를 또 안 해도 된다"(아님, 확정신고 때 기납부세액으로 공제 정산). 예정신고 갈음은 의무 아닌 선택지임을 명확히.
