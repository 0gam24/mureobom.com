human_notes: |
  차별화: 주민세 3종 — 개인분(8월 정액 부과·지자체별)·사업소분(사업장 면적 기준)·종업원분(급여총액 0.5%) 구분, 납부기간(개인분 8/31)·과세대상·면제. 기발행 재산세·자동차세 글과 의도 분리(주민세 단일 의도).
  기준연도 2026 명시 — 개인분 정액은 지자체 조례로 매년 달라지니 "지자체별 상이, 거주지 위택스/고지서 확인" 단서 필수.
  자주 틀리는 통념: 개인분과 사업소분은 별개 세목이라 사업주는 둘 다 낼 수 있음(중복 아님). 종업원분 면세점(급여총액 기준)을 누락하면 과세 오인 발생.
