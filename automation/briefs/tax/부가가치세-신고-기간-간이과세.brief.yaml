human_notes: |
  차별화: 일반·간이·면세 사업자 한 페이지 매트릭스 + 매입세액 공제·불공제 항목 표 + 무신고·과소신고 가산세 단계별 계산 예시.
  2024년부터 간이과세 기준이 연매출 4,800만원 → 8,000만원으로 상향된 점 2026 시점에서도 동일 유지인지 최신 확인 필요.
  "간이과세자는 매입세액 공제 0원"은 통념 — 실제로는 업종별 부가가치율 기반 일부 공제 가능. 정확히 서술.
  매출 0원이어도 무실적 신고 의무 있음 → 가산세는 없지만 신고 자체는 필수라는 점 강조.
