target_query: "부가가치세 신고 2026 기간 간이과세자 일반과세자"
search_intent: 절차형     # 신고 대상·기간·구분 확인 + 실제 신고 절차 안내

signal:
  score: 81.2
  trend_momentum: 0.71
  question_volume: 0.58
  cluster_fit: 1.0
  freshness: 0.62

must_cover:
  - 부가가치세 신고 대상자(과세사업자) 범위와 면세사업자 구분
  - 일반과세자 vs 간이과세자 구분 기준(연 매출 8천만원, 2024년 상향 기준 유지)
  - 정기신고 기간(일반과세자 1월·7월 25일까지, 간이과세자 연 1회 1월) + 예정고지/예정신고 대상
  - 매입세액 공제 가능 항목 vs 불공제 항목(접대비·비영업용 승용차·면세사업 관련 등)
  - 무신고·과소신고 가산세 단계별 계산(일반 20% / 부정 40% + 납부지연가산세 일 0.022%)
  - 면세사업자 면세 항목(미가공 식료품·의료·교육·도서 등)과 면세사업자 신고의무(사업장현황신고)
  - 흔한 오해 바로잡기("매출 0이면 신고 안 해도 된다", "간이과세자는 매입세액 공제 못 받는다" 등)

required_sources:
  - "부가가치세법 / 부가가치세법 시행령 (국가법령정보센터 law.go.kr)"
  - "국세청 부가가치세 신고 안내 (nts.go.kr)"
  - "홈택스 부가가치세 전자신고 매뉴얼 (hometax.go.kr)"
  - "국세청 간이과세자 안내 (nts.go.kr)"

