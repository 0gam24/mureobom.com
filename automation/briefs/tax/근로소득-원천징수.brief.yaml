human_notes: |
  차별화: 연말정산/종소세 글이 "정산 결과"를 다룬다면, 이 글은 그 앞단인 "매월 떼이는 원천징수 메커니즘"과 간이세액표 80/100/120% 비율 선택을 표로 잡는다(선택별 매월 부담 vs 연말정산 환급·추가납부 트레이드오프).
  기준연도 2026 — 간이세액표·세율 구간은 매년 개정되니 발행 시점 최신표 확인.
  자주 틀리는 통념: "원천징수 = 최종 세금"이 아님(기납부세액일 뿐, 연말정산에서 정산). 120% 선택이 무조건 손해라는 오해도 바로잡기.
  중도퇴사자·일용근로자 케이스를 넣어 차별화 각도 확보(검수자 approve 근거).
