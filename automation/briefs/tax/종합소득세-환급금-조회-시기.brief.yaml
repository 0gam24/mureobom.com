must_cover:
  - 2025년 귀속분 신고기한과 6월 환급 시즌 진입 일정 (5/31 일요일 → 6/1 익영업일 이연 명시)
  - 홈택스·손택스 국세환급금 조회 메뉴 경로 (조회/발급 → 국세환급금찾기) — 마이페이지 아님 주의
  - 환급계좌 등록 절차 (조회/발급 경로) — 신고 후 미등록 시 입금 지연
  - 국세청 공식 환급 일정 표현 — 원클릭 안내금액 그대로 신고 시 "1개월 이내", 수정 신고 시 "2~3개월 이내" (단정 표현 금지)
  - 환급 지연 3대 사유 정리 — 계좌 미신고/오류 · 검증 대상 · 체납 충당
  - 국세기본법 제51조 충당 조항 — 체납 국세가 있으면 환급금이 먼저 그쪽으로
  - 국세환급가산금(이자) — 시행규칙 제19조의3 연 1천분의 31(=연 3.1%), 변동 가능성 고지
  - 미수령 환급금 5년 시효 — 결정일로부터 5년 경과 시 국고 귀속

required_sources:        # 9건 (research bundle 그대로). 0건이면 발행 차단
  - "국세청 — 종합소득세 신고납부기한 (nts.go.kr)"
  - "국세청 — 모두채움 신고 안내(환급) (nts.go.kr)"
