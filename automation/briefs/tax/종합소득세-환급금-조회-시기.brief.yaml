human_notes: |
  차별화: "신고 끝낸 뒤 환급 검색"이라는 좁은 절차형 인텐트. 기존 두 글(연말정산 환급 시기 / 종소세 신고 대상자·기간)과 분리 — 본 글은 "환급 조회 메뉴 경로 + 지연 사유 진단 + 가산금"에 집중. 환급계좌 등록 메뉴가 마이페이지 아닌 '조회/발급' 경로라는 사실은 통념과 달라 강한 차별화 포인트.
  검수 포인트:
  - 환급 시점 단정형 금지. 국세청 공식 표현 ("1개월 이내", "2~3개월 이내") 그대로.
  - 가산금 이율 3.1%는 시행규칙 본문 인용 + "변동 가능, 발행 시점 시행규칙 확인" 고지.
  - 체납 충당(§51)은 "다른 세금 미납이면 환급금이 그쪽 먼저"로 실용 설명.
  - 5/31 일요일 → 6/1 이연 사실 반영.
