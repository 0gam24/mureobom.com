must_cover:
  - 기초공제(2억)·일괄공제(5억) 구조와 둘 중 큰 금액 적용(일반적으로 일괄공제 5억 유리)
  - 배우자상속공제(최소 5억 ~ 최대 30억) 산정 방식과 한도
  - 금융재산상속공제(순금융재산의 20%, 한도 2억) 등 그 밖의 공제 항목
  - 과세표준 구간별 세율(10% ~ 50%, 5단계 누진)과 누진공제액
  - 신고·납부 기한(상속개시일이 속한 달의 말일부터 6개월 이내)
  - 분납·연부연납 요건과 활용(세액 일정 기준 초과 시 분할 납부)
  - 계산 예시: 상속재산 - 공제 → 과세표준 → 세율 적용 → 산출세액까지 한 흐름(다른 사이트가 한도만 나열하고 빠뜨리는 "끝까지 한 케이스" 포함)

