human_notes: |
  차별화: 상속세 — 기초공제·일괄공제(5억)·배우자상속공제(5억~30억)·금융재산공제, 과세표준·세율(10~50%), 신고기한(6개월)·분납/연부연납, 계산 예시. 기발행 증여세 면제한도 글과 쌍(상속 단일 의도)·내부링크.
  검수 포인트:
  - 기준연도는 2026. 공제 한도·세율표는 발행 시점 최신 조문으로 researcher가 재확인(개정 잦음).
  - 자주 틀리는 통념: "5억까지 무조건 비과세"가 아니라 일괄공제 5억 + 배우자공제(최소 5억)가 별개라는 점, 일괄공제와 (기초공제+그 밖의 인적공제) 중 큰 금액 택일이라는 점을 명확히.
  - 증여세 글과 톤·구조는 닮되 한도·세율·기한 숫자가 다르므로 복붙 금지. 상속만의 배우자상속공제 한도식이 핵심 차별 포인트.
