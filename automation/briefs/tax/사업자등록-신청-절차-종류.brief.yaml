  - tax/프리랜서-3-3-종합소득세-환급

compliance:
  medical_legal_financial_advice_disclaimer: true  # 일반정보 고지 삽입 (AdSense YMYL 정책 친화)

geo:
  faq_schema: true
  faq_pairs_min: 5
  llms_txt: true

human_notes: |
  차별화: 개인/법인 × 일반/간이/면세를 하나의 비교 표로 정리 + 홈택스 온라인 신청 실제 화면 순서 + 간이과세 배제(업종·지역) 함정 강조.
  간이과세 기준금액(현 1억400만원)은 연도별로 바뀌니 발행 시점 최신 기준연도를 반드시 명시.
  "간이과세가 무조건 유리"라는 통념 반박 — 부동산임대·과세유흥·특정 지역/업종은 매출 무관 배제됨.
  등록 기한 20일과 미등록가산세를 정확히(부가가치세법 제8조 근거) — 자주 틀리는 지점.
