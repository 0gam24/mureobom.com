id: tax-사업자등록-신청-절차-종류
cluster: tax
status: published        # compliance 게이트 전 항목 통과 (2026-07-12)

target_query: "사업자등록 어떻게 하나요 일반과세 간이과세 차이"
search_intent: 절차형     # 등록 방법 + 과세유형 선택을 함께 원함

signal:                  # 수동 선정(읽기 전용, 원문 아님)
  score: 0.0             # 수동 선정 — 큐 미경유
  trend_momentum: 0.0
  question_volume: 0.5
  cluster_fit: 1.0
  freshness: 1.0

must_cover:
  - 사업자등록 개념과 의무: 사업 개시일부터 20일 이내 등록(부가가치세법 제8조), 미등록 시 미등록가산세
  - 개인사업자 vs 법인사업자 구분(설립 절차·세율 구조·책임 범위 차이)
  - 과세 유형 3종 구분 기준: 일반과세자 / 간이과세자 / 면세사업자 (간이과세는 직전연도 공급대가 1억400만원 미만 기준, 부동산임대·과세유흥 등 배제)
  - 연도별 간이과세 기준금액 변동 고지(최신 기준연도 명시)
  - 홈택스 온라인 신청 실제 순서 + 필요서류(임대차계약서·신분증 등), 세무서 방문 신청 방법
  - 간이과세 배제 업종·지역(다른 사이트가 놓치는 함정)
  - 늦게 등록하거나 미등록 시 가산세

required_sources:        # 공식 1차 출처만(네이버 신호 아님). 0건이면 발행 차단
  - "부가가치세법 제8조(사업자등록)(국가법령정보센터, law.go.kr)"
  - "부가가치세법 시행령(간이과세 기준)(국가법령정보센터, law.go.kr)"
  - "국세청 사업자등록 안내(nts.go.kr)"
  - "국세청 간이과세자·일반과세자 안내(nts.go.kr) 또는 홈택스 안내"

internal_links:
