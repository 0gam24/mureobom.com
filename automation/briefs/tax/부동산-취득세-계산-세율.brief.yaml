must_cover:
  - 취득세 개요 — 지방세, 행안부 소관, 위택스 신고·납부
  - 주택 유상 취득세율 (지방세법 §11 제8호) — 6억 이하 1%, 6~9억 계산식, 9억 초과 3%, 주택 외 4%
  - 다주택자·법인 중과 (§13의2) — 8%·12%, 지방 저가주택(공시 2억 이하) 예외
  - 무상취득(증여 3.5%) / 상속(농지 2.3% / 농지 외 2.8%) / 원시취득(2.8%)
  - 농어촌특별세·지방교육세 — 본세에 부가
  - 신고·납부 기한 (§20) — 일반 60일, 증여 3개월, 상속 6개월
  - 위택스 또는 시·군·구청 세무과 신고 절차

