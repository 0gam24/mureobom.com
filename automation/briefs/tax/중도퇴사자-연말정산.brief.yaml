id: tax-중도퇴사자-연말정산
cluster: tax
status: published           # compliance 전 게이트 통과 (2026-07-12). 오케스트레이터가 _published_slugs.txt 일괄 추가

target_query: "중도퇴사자 연말정산 하는 법 환급"
search_intent: 절차형        # 퇴사 후 정산이 어떻게 되는지 + 환급 받으려면 뭘 해야 하는지

signal:                     # 수동 선정(큐 소진) — 사이트 공백 메움, 원문 아님
  score: 0.0
  trend_momentum: 0.0
  question_volume: 0.0
  cluster_fit: 1.10
  freshness: 1.0

must_cover:
  - 중도퇴사 시 연말정산은 어떻게 되나 — 퇴사한 달의 급여에서 회사가 약식(기본공제만) 정산
  - 약식정산의 한계 — 의료비·신용카드·기부금 등 각종 공제가 반영되지 않아 대부분 덜 돌려받음
  - 재취업한 경우 — 새 직장에서 전 직장 근로소득원천징수영수증을 합산해 연말정산
  - 연말까지 재취업하지 않은 경우 — 다음 해 5월 종합소득세 확정신고로 추가 공제 반영·환급
  - 필요 서류(근로소득 원천징수영수증)와 홈택스에서 확인·발급하는 방법
  - 흔한 오해(중도퇴사자는 연말정산 못 한다? 회사가 알아서 다 해준다?) 바로잡기

required_sources:           # 공식 1차 출처만. 0건이면 발행 차단
  - "소득세법 — 근로소득 연말정산·중도퇴직 (국가법령정보센터 law.go.kr)"
  - "국세청 홈택스 / 연말정산 종합안내 (nts.go.kr)"
  - "국세청 종합소득세 신고 안내 (nts.go.kr)"

internal_links:
  - tax/근로소득-원천징수
  - tax/연말정산-경정청구-환급

compliance:
  medical_legal_financial_advice_disclaimer: true

geo:
  faq_schema: true
  faq_pairs_min: 5
  llms_txt: true

human_notes: |
  차별화: '퇴사 달에 회사가 하는 약식정산'과 '5월 종합소득세로 마무리하는 정산'을
  타임라인으로 구분해 언제 무엇을 해야 하는지 흐름으로 제시. 재취업 여부에 따른
  두 갈래(합산 연말정산 vs 종소세 확정신고)를 표로 대비.
  "중도퇴사자는 공제를 못 받는다"는 통념을 반박 — 5월 종소세로 대부분 환급 가능.
  단정적 환급액 약속 금지, 개인별 상이 명시(F-* 가드).
