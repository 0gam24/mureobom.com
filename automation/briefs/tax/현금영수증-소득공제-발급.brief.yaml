human_notes: |
  차별화: 현금영수증 소득공제(30%) vs 신용카드(15%) 공제율 비교, 발급·등록(홈택스)·총급여 25% 초과분·한도. 기발행 신용카드 소득공제 글과 내부링크, "현금영수증 공제율·한도" 단일 의도.
  검수: 공제율·구간별 한도는 신용카드 글과 동일 통합 한도이므로 수치 일치 확인(중복 모순 금지).
  "현금영수증이 별도 한도로 더 받는다"는 통념 반박 — 신용카드 등과 합산 통합 한도.
  한시·연장 조항 변동 가능성 단정 금지 고지. 2026 최신 기준연도 명시.
