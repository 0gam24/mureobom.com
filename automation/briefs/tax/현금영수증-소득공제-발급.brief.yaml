must_cover:
  - 현금영수증 소득공제 개요 — 근로소득자 대상, 조세특례제한법 §126의2 사용금액 공제 항목
  - 공제율 비교 — 현금영수증·체크카드 30% vs 신용카드 15% (동일 금액 써도 공제액 2배 차이)
  - 최저사용금액 — 총급여 25% 초과분부터 공제 대상, 초과분에 결제수단별 공제율 적용
  - 발급 방법 — 결제 시 휴대폰번호·현금영수증카드 제시, 미발급 시 홈택스 자진발급(국세상담센터 126)
  - 사용처 등록·조회 — 홈택스에 휴대폰번호 등 발급수단 사전 등록 시 자동 누적, 연말정산 간소화 반영
  - 총급여 구간별 한도 — 신용카드 등 사용액과 합산 적용(7천 이하 300만/7천 초과 250만 등 통합 한도)
  - 자주 틀리는 케이스 — 사업용 지출·세금·공과금은 제외, 의료비·교육비 세액공제와의 중복공제 가능 여부

required_sources:        # 공식 1차 출처만. 비공식 UGC 출처 인용 금지. 0건이면 발행 차단
