human_notes: |
  차별화: 이자·배당 합산 2천만 원 초과 시 종합과세 — 기준·세율·계산 예시(Gross-up·기준금액 공제), 건강보험료 영향. 기발행 연금소득세 글과 내부링크, "2천만 원 기준 판정" 단일 의도.
  검수 포인트:
  - 기준연도 2026 명시. 종합소득세율 누진구간·Gross-up 가산율은 최신 개정 반영 후 researcher가 수치 확정.
  - 자주 틀리는 통념: "2천만 원 넘으면 전액 종합과세" — 실제는 초과분만 합산, 2천만 원 이하분은 14% 분리과세 유지(비교과세). 반박 단락 필수.
  - 건강보험료 영향은 별도 비공식 UGC 출처에서 과장·혼동되는 지점 → 건보공단 기준으로만 서술.
