human_notes: |
  차별화: 일반환급 vs 조기환급 대상·환급 시기(30일 vs 15일) 비교표 + 매월 조기환급 신고를 활용한 자금 회전 팁.
  조기환급 대상 3요건(영세율·사업설비 투자·재무구조개선)은 시행령 제107조 기준으로 최신 확인.
  "확정신고만 하면 알아서 조기환급된다"는 통념 반박 — 조기환급 신고를 별도로 해야 15일 이내 적용됨을 명시.
  신고 단위(예정신고기간·과세기간 종료 후 또는 매월/매2월 단위 선택)를 헷갈리지 않게 정리.
