id: tax-부가가치세-조기환급-대상-신청-기간
cluster: tax
status: published      # compliance 게이트 통과 (2026-07-18 KST 발행)

target_query: "부가가치세 조기환급 대상 신청 방법"
search_intent: 절차형     # 대상 자격 확인 + 신고·신청 절차를 함께 원함

signal:                  # 스캐너 산출(읽기 전용, 원문 아님) — 큐 stale, 운영자 수동 선정
  score: 45.0
  trend_momentum: 0.05
  question_volume: 0.48
  cluster_fit: 1.0
  freshness: 1.0

must_cover:
  - 조기환급 대상 3가지(영세율 적용 사업자, 사업설비 신설·취득·확장, 재무구조개선계획 이행)
  - 일반환급(확정신고 기한 후 30일 이내)과 조기환급(신고기한 후 15일 이내) 환급 시기·요건 차이
  - 조기환급 신고 기간 단위(예정신고기간·과세기간 종료 후 또는 매월·매2월 단위 선택 신고)
  - 신청 방법(홈택스 부가가치세 조기환급 신고, 예정·확정신고와의 관계)
  - 필요 서류(건물등 감가상각자산 취득명세서, 영세율 첨부서류 등)
  - 흔한 오해(조기환급은 자동이 아니라 신고해야 적용 · 매월 단위로도 신청 가능하다는 점)

required_sources:        # 공식 1차 출처만. 집계 신호 외 외부 원문 금지. 0건이면 발행 차단
  - "부가가치세법 / 부가가치세법 시행령 제107조 조기환급 (국가법령정보센터 law.go.kr)"
  - "국세청 부가가치세 환급 안내 (nts.go.kr)"
  - "국세청 홈택스 부가가치세 조기환급 신고 안내"
  - "국세청 세금절약 가이드 / 부가가치세 환급 관련 안내자료"

