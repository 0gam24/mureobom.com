must_cover:
  - 부양가족 인적공제는 부부 중 한 명만 신청 가능(중복 불가) — 원칙적으로 총급여(과세표준)가 높은 배우자에게 몰아야 세율이 높은 만큼 절세 효과가 크다
  - 자녀 기본공제(1명당 150만원)와 자녀세액공제 배분 — 자녀는 부부 중 한 명의 부양가족으로만 등록, 기본공제 넣은 쪽이 자녀세액공제도 함께 적용
  - 의료비 세액공제는 한쪽에 모으는 편이 유리할 수 있음 — 총급여의 3% 초과분만 공제되므로 문턱(3%)이 낮은 소득 적은 배우자에게 가족 의료비를 몰면 공제 대상액이 커지는 경우
  - 신용카드 등 사용액 소득공제는 각자 명의 사용분으로 배분 — 명의자 본인 카드만 본인 공제로 잡히고(부양가족 카드는 기본공제받은 사람에게 귀속), 여기도 총급여 25% 문턱이 있어 무조건 고소득자 몰기가 답이 아님
  - 부양가족 소득요건 — 연간 소득금액 100만원 이하(근로소득만 있으면 총급여 500만원 이하), 배우자는 서로를 부양가족(인적공제 대상)으로 넣을 수 없음 (세부는 인적공제-부양가족-소득기준 글로 링크)
  - 맞벌이 최적화 원칙 정리 — '무조건 고소득자 몰기'가 기본값이나, 총급여 대비 문턱(%)이 있는 세액공제(의료비·신용카드 등)는 소득 낮은 배우자 쪽이 유리할 수 있어 항목별로 나눠 판단해야 한다

required_sources:        # 공식 1차 출처만. 블로그·질의응답 게시판 금지. 0건이면 발행 차단
  - "소득세법 / 소득세법 시행령 (인적공제·특별세액공제·신용카드 소득공제 조문, 국가법령정보센터 law.go.kr)"
  - "국세청 연말정산 종합안내 (nts.go.kr)"
  - "국세청 맞벌이 근로자 절세 안내 / 편리한 연말정산 배우자 공제 시뮬레이션 안내 (nts.go.kr)"

