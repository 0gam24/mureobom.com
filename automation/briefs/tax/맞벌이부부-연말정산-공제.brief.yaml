human_notes: |
  차별화: 맞벌이 부부의 '공제 배분 전략' 전용 — 누구에게 어떤 공제를 몰지 항목별 판단
  기준(고소득자 몰기 기본 vs 문턱형 세액공제 예외)으로, 부양가족 소득요건을 다루는
  tax/인적공제-부양가족-소득기준과 명확히 분리(소득요건 세부는 링크로만).
  스캐너 큐 소진으로 운영자 수동 선정(score=0) — 검수자는 클러스터 적합성만 확인하면 됨.
  검수 포인트:
  - '무조건 고소득(높은 세율) 배우자에게 몰기'를 답처럼 단정하지 말 것. 총급여 대비
    문턱(%)이 있는 의료비(3%)·신용카드(25%) 세액/소득공제는 소득 낮은 배우자가
    유리할 수 있어 항목별로 균형있게 서술 (한쪽 결론으로 몰지 않기).
  - 배우자는 서로 부양가족으로 못 넣는다는 점(맞벌이 특유의 오해) 명시.
  - 기준연도 2026 귀속분 기준으로 공제 한도·요건 확인(자녀세액공제 금액·의료비 3% 등).
