target_query: "맞벌이 부부 연말정산 부양가족 몰아주기 공제 배분"
search_intent: 정보형     # 누구에게 어떤 공제를 몰지 '판단 기준'을 원함 (신청 절차 아님)

signal:                  # 스캐너 큐 소진 → 운영자 수동 공백 선정 (스캐너 산출 아님)
  score: 0
