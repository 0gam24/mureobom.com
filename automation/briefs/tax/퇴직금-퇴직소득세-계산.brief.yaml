human_notes: |
  차별화: 퇴직소득세 계산 구조 — 근속연수공제·환산급여·환산급여공제·연분연승, 단계별 계산 예시 표. 기발행 퇴직연금 DB/DC/IRP 글과 내부링크하되 "퇴직소득세 계산" 단일 의도.
  검수 포인트: 근속연수공제·환산급여공제 표는 2026 최신 기준연도 명시(연도 누락 시 통념 오류 빈발).
  비공식 UGC 출처는 결과 세액만 던지고 환산급여·연분연승 중간 단계를 생략하는 경우가 많음 — 본 글은 중간 계산을 표로 전부 노출하는 것이 차별점.
  자주 틀리는 통념: "퇴직금은 무조건 퇴직소득세를 뗀다" / "근속연수=재직연수 반올림" — 중간정산·1년 미만 근속 처리를 정확히.
