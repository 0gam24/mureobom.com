human_notes: |
  차별화: 가족간 계좌이체가 증여로 추정되는 기준 vs 생활비·교육비 비과세, 증여재산공제 한도(배우자 6억·직계존비속 5천만·미성년 2천만), 차용증·소명. 기발행 증여세-면제한도 글과 내부링크하되 "계좌이체 소명" 단일 의도.
  검수 포인트:
  - 한도 수치는 2026 기준 재확인(증여재산공제 10년 합산: 배우자 6억/직계존비속 성년 5천만/미성년 2천만/기타친족 1천만).
  - "한도 이내면 신고 불필요"는 통념 오류 — 한도 내라도 합산 관리·증명 위해 신고 권장임을 명확히.
  - 생활비·교육비 비과세는 '받아서 그 용도로 쓴 경우'에 한함 — 모아서 자산화하면 과세되는 경계를 사례로 분리.
  - 1차 출처는 law.go.kr·nts.go.kr만. 비공식 UGC 출처 인용 금지.
