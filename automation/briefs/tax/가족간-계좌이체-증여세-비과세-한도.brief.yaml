must_cover:
  - 증여재산공제 한도(배우자 6억 / 직계존비속 성년 5천만 / 미성년 직계비속 2천만 / 기타친족 1천만, 10년 합산 기준)
  - 단순 계좌이체 자체는 과세 대상 아님 — 다만 자금 출처·대가 없는 무상이전이면 국세청이 증여로 '추정'하는 기준
  - 비과세되는 생활비·교육비(사회통념상 통상 필요 비용)와, 비과세 명목으로 받아 예금·주식·부동산에 쓰면 과세되는 경계
  - 부모-자식 간 빌려준 돈(차용증·이자지급·상환내역)으로 증여 추정을 벗어나는 소명 방법과 흔한 실수
  - 계좌이체가 증여로 잡히는 대표 케이스: 자녀 명의 예금·전세보증금 대납·주택 취득자금 보조(자금조달계획서 연계)
  - 신고기한(증여일 속한 달 말일부터 3개월)과 무신고·과소신고 시 가산세, 10년 합산 누적 시 한도 소진 개념
  - 흔한 오해 바로잡기: "한도 안이면 신고 안 해도 된다" / "가족끼리 이체는 무조건 안전하다"는 통념 반박

required_sources:        # 공식 1차 출처 후보 (researcher 검증·보완). 0건이면 발행 차단
  - "상속세 및 증여세법 / 동 시행령 (국가법령정보센터 law.go.kr) — 증여재산공제·증여추정 조항"
