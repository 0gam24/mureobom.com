human_notes: |
  차별화: 일당 15만원 이하 세금 0원의 근거를 "근로소득공제 → 6% → 55% 세액공제 → 소액부징수 1,000원 미만" 4단계 계산으로 실제 금액 예시(예: 일당 15만원·20만원·25만원)와 함께 단계별 표로 분해. 대부분의 글이 "6.6%"만 던지고 소액부징수 임계점을 계산으로 보여주지 않는다.
  기준연도 2026 확인: 1일 근로소득공제 15만원·세율 6%·세액공제 55%는 소득세법 개정 시 변동 가능하니 발행 시점 조문값 재확인.
  가장 자주 틀리는 통념 3개 반드시 반박: (1) 일용직=3.3% 아님(3.3%는 사업소득), (2) 일용근로소득은 분리과세 종결이라 연말정산·5월 종소세 신고 대상 아님, (3) 그래서 "떼인 세금 환급" 프레임 자체가 대개 오해(다만 사업소득 3.3%로 잘못 처리된 케이스는 별개).
  일용/상용 구분 기준(3개월·건설 1년)은 4대보험 적용과도 얽히니 tax/4대보험료-공제로 자연 연결.
