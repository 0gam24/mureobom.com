  - "소득세법 제47조 근로소득공제 / 제14조 분리과세 종결 (law.go.kr 국가법령정보센터)"
  - "소득세법 제86조 소액부징수(1,000원 미만 미징수) (law.go.kr 국가법령정보센터)"
