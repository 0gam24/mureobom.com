target_query: "일용직 일당 받을 때 세금 얼마나 떼나요 일용근로소득 원천징수"
search_intent: 정보형      # 일당에서 떼는 세금 구조·계산 원리를 이해하려는 의도

signal:                   # 스캐너 산출 아님 — 수동 선정 gap-filling 추정치(읽기용)
  score: 44.0
  trend_momentum: 0.30
  question_volume: 0.48
