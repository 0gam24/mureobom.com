  freshness: 1.0

must_cover:
  - 일용근로소득 원천징수 구조: 6% 단일세율 + 1일 15만원 근로소득공제 + 산출세액의 55% 근로소득세액공제
  - 실효 부담률: 지방소득세(소득세의 10%) 포함 시 15만원 초과분에 대해 사실상 6.6%로 정리되는 계산 흐름
  - 소액부징수: 원천징수 세액이 1일 1,000원 미만이면 징수하지 않음(소득세법 제86조) — 일당 약 187,000원 근처까지 세금 0원이 되는 이유
  - 일용근로소득은 분리과세로 종결 — 연말정산·종합소득세 확정신고 대상이 아니라는 점(소득세법 제14조)
  - 일용근로자와 일반(상용) 근로자 구분 기준: 동일 고용주에게 3개월(건설은 1년) 미만 계속 고용 등, 구분에 따라 원천징수 방식이 달라짐
  - 흔한 오해 바로잡기: "일당은 무조건 3.3% 뗀다"(사업소득 오인)·"일용직도 5월에 종소세 신고해야 한다"·"떼인 세금 연말정산으로 돌려받는다"는 통념
  - 여러 곳에서 일한 경우/사업소득(3.3%)으로 잘못 신고된 경우의 확인·정정 방향(원천징수영수증·지급명세서 확인)

