id: tax-자녀장려금-신청자격
cluster: tax
status: published  # 2026-06-08 운영자 직접 발행

target_query: "자녀장려금 신청자격 금액"
search_intent: 절차형

signal:
  cluster_fit: 1.0
  freshness: 0.85
  manual: true

must_cover:
  - 자녀장려금 개요 — 조세특례제한법 §100의27~31, 국세청
  - 자녀세액공제와 차이 — 별개 제도, 동시 적용 금지 (§100의30 ② 둘 중 본인이 유리한 쪽 선택)
  - 신청 자격 — 만 18세 미만 부양자녀, 부부합산 연 7천만 이하
  - 자녀 1인당 최대 100만 (홑벌이·맞벌이 동일)
  - 재산 — 2.4억 미만 (변동)
  - 정기 신청 — 매년 5월
  - 자녀장려금은 정기 신청만 (반기 신청은 근로장려금만)
  - 지급 — 8~9월
  - 근로·사업·종교인 소득 기준

required_sources:
  - "국세청 — 자녀장려금 소개"
  - "국세청 — 자녀장려금 신청자격"
  - "국세청 — 근로·자녀장려금 신청·심사·지급"
  - "조세특례제한법 제10절의2 (근로 장려를 위한 조세특례)"
  - "근로·자녀장려금 신청자격 소득 증거자료 고시"

internal_links:
