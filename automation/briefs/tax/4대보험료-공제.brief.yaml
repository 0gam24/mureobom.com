must_cover:              # 모두 세금(연말정산·종소세) 각도 — 가입조건·요율표 설명은 최소화
  - 국민연금 보험료 = 전액 소득공제(연금보험료공제, 소득세법 §51-3) — 한도 없이 납입액 전액
  - 건강보험료·고용보험료(+장기요양보험료) = 특별소득공제로 전액 공제(근로자 부담분)
  - 산재보험료는 전액 사업주 부담이라 근로자 공제 대상 아님(흔한 오해 정정)
  - 연말정산 자동 반영 여부 — 국세청 연말정산간소화 자료로 대부분 자동 입력되나 누락분은 직접 확인
  - 지역가입자(자영업자)의 4대보험료 — 종합소득세 신고 시 연금보험료공제 처리 방식과 건보료 공제 가능 범위
  - 소득공제(과세표준 차감) vs 세액공제(산출세액 차감) 차이 — 4대보험료가 어디에 해당하는지 정리

required_sources:        # 공식 1차 출처만. 공식 기관/법령 외 커뮤니티·Q&A 사이트 인용 금지. 0건이면 발행 차단
