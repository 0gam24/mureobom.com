human_notes: |
  차별화: 세금 공제 각도 전용 — "내가 낸 4대보험료가 연말정산/종소세에서 어떻게 공제되는가"만 다룬다.
  가입조건·보험요율표는 insurance/4대보험-가입조건-요율에서 이미 발행했으므로 본 글에서는 설명하지 않고 링크로만 연결(중복 금지).
  검수 포인트:
  - 2026년 기준 조문/한도 명시. 국민연금 연금보험료공제는 한도 없이 전액 — "한도 있다"는 통념 정정.
  - 산재보험료 근로자 부담 0% → 공제 대상 아님이 핵심 오해 포인트. 반드시 정정 단락 포함.
  - 4대보험료는 세액공제가 아니라 소득공제(연금보험료공제/특별소득공제)임을 명확히 — 세액공제 혼동 빈번.
  - 지역가입자 건보료는 사업소득 종소세에서의 처리가 직장가입자와 달라 구분 필요.
