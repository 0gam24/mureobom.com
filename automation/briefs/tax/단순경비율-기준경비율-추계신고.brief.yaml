must_cover:
  - 추계신고 개념 — 장부가 없을 때 국세청 고시 경비율로 필요경비를 추정해 소득금액을 계산하는 방식
  - 단순경비율 vs 기준경비율 적용 구분 기준 — 직전연도 수입금액(업종별 기준금액) 및 신규사업자 여부에 따라 갈림
  - 계산 방식 차이 — 단순: 수입금액 × (1 − 단순경비율) / 기준: 수입금액 − 주요경비 − (수입금액 × 기준경비율)
  - 업종별 경비율은 매년 국세청이 고시(홈택스 조회) — 예시 수치를 단정하지 말고 조회 방법으로 안내
  - 무기장가산세(장부 미작성 시)와 복식부기의무자 여부 — 기준경비율 대상이면서 장부 미작성 시 불이익
  - 추계신고 vs 장부작성(간편장부·복식부기)의 유불리 — 경비율보다 실제 경비가 크면 장부가 유리한 케이스

