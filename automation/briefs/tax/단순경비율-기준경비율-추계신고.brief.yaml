human_notes: |
  차별화: 장부 없이 신고할 때의 추계신고 전용 각도 — 단순경비율 vs 기준경비율 적용 구분(직전연도 수입금액·신규사업자 기준)과 두 경비율의 계산식을 비교표로 나란히. 3.3% 환급/신고 대상·기간 글과 명확히 분리.
  스캐너 큐 소진으로 운영자 수동 선정(2026-07-09). score=0은 수동 선정 플레이스홀더.
  검수 포인트:
  - 업종별 경비율(단순·기준) 수치는 매년 국세청이 고시로 바꾸므로 본문에 특정 %를 단정하지 말 것. "홈택스에서 업종코드로 조회" 안내로 대체 — 2026 귀속 기준 최신 고시 확인.
  - 자주 틀리는 통념: 단순경비율은 자동 적용이 아니라 직전연도 수입금액이 업종별 기준금액 미만일 때만 적용. 기준경비율 대상은 주요경비 증빙(매입·인건비·임차료)이 있어야 공제되고, 장부 미작성이면 무기장가산세가 붙는다는 점을 오해 없이.
  - 복식부기의무자·간편장부대상자 구분과 "추계가 항상 편한 건 아니다(실경비 > 경비율이면 장부 유리)"를 반드시 짚을 것.
