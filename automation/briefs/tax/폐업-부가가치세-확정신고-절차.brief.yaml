must_cover:
  - 폐업신고 절차(홈택스·세무서, 폐업신고서·사업자등록증) 및 부가세 확정신고와의 관계
  - 폐업 부가가치세 확정신고 기한 — 폐업일이 속한 달의 다음 달 25일까지
  - 잔존재화(폐업 시 남은 재고·비품)의 간주공급 부가세 과세 원리
  - 폐업 사업소득의 종합소득세는 다음 해 5월 확정신고(원리·대상)
  - 간이과세자 폐업 시 신고 차이(연 1회 기준과 폐업 확정신고)
  - 흔한 오해: "매출 없으면 신고 안 해도 된다" 바로잡기(무실적도 신고 의무)

required_sources:        # 공식 1차 출처만(법령·기관). 0건이면 발행 차단
  - "부가가치세법 제5조·제10조(재화 공급의 특례)·제49조(확정신고) (국가법령정보센터 law.go.kr 조문 렌더)"
