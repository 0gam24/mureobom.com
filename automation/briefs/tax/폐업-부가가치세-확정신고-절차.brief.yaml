human_notes: |
  차별화: 폐업을 "부가세 확정신고 → 잔존재화 간주공급 → 다음해 5월 종소세"
  세 시점의 타임라인으로 정리. 기발행 tax/부가가치세-신고-기간-간이과세(정기신고)와 달리
  '폐업'이라는 이벤트 축이라 의미중복 아님.
  잔존재화 간주공급은 실무자가 가장 많이 놓치는 지점 — 취득 후 경과기간별 시가 산정 원리
  꼭 포함(부가세법 시행령). 무실적 폐업도 신고 의무 강조.
  단정적 절세 약속·특정 세액 확언 금지(F-*). 세율/기한은 2026 현행 대조.
