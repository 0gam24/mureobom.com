must_cover:
  - 무신고가산세 — 신고 자체를 안 한 경우. 일반 무신고 20%, 부정행위 무신고 40% (납부세액 기준)
  - 과소신고가산세 — 신고는 했으나 줄여서 신고한 경우. 일반 10%, 부정행위 40%
  - 납부지연가산세 — 미납·과소납부 세액 × 경과일수 × 1일 이자율(2026 기준 약 0.022% 수준, 정확율은 매년 개정 확인)
  - 무기장가산세 / 복식부기의무자 관련 가산세 — 장부 미작성 시 산출세액의 20% (소규모 사업자 예외 포함)
  - 가산세 감면 — 법정신고기한 후 수정신고·기한후신고 시 경과 기간별 감면율 표 (1개월 이내 최대치 → 기간 늘수록 체감)
  - 계산 예시 — 가정값(예: 산출세액 300만 원, 3개월 지연) 명시한 무신고+납부지연 합산 시뮬레이션

