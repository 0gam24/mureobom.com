human_notes: |
  차별화: 장기보유특별공제 — 일반(연 2%·최대 30%) vs 1세대1주택(보유+거주 각 연 4%·최대 80%) 공제율표, 보유·거주기간 계산. 기발행 1세대1주택 비과세 글의 심화(공제율 단일 의도)로 분리.
  검수 포인트: 공제율은 표 1(일반)·표 2(1세대1주택) 두 종을 반드시 분리 게시 — 합쳐 쓰면 거주요건 미충족 케이스에서 오답.
  보유기간/거주기간은 "연 단위 환산" 기준(예: 보유 10년 = 일반 20%, 1세대1주택 보유분 40%)을 2026 최신 기준으로 검증.
  자주 틀리는 통념: "1세대1주택이면 무조건 80%" — 거주기간 미충족 시 일반 공제율만 적용됨을 명시.
