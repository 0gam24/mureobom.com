human_notes: |
  차별화: 청약 1순위(loan/주택청약종합저축-1순위)와 각도를 분리한 '연말정산 소득공제 전용' 글.
  1순위 가입기간·예치금은 일절 다루지 않고, 청약저축 납입액의 소득공제(무주택 세대주·총급여 7천만원 이하)만 파고든다.
  검수 포인트:
  - 기준연도 2026. 공제 한도는 2024년 납입한도 상향(240→300만원) 이후 기준(300만원×40%=최대 120만원)으로 통일할 것. 구 240만원 한도로 쓰인 타 사이트와 수치가 다르니 재확인.
  - 자주 틀리는 통념: "공제받으려면 무주택확인서가 자동 반영된다" 오해 → 실제로는 가입 은행에 무주택확인서를 별도 제출해야 적용된다는 점 강조.
  - 중도해지 추징·감면 배제 조건은 조특법 시행령 원문으로 확정. 세대주 vs 세대원 요건 혼동 주의.
  - 스캐너 큐 소진으로 운영자 수동 선정(2026-07). signal은 0 플레이스홀더 — score 게이트 예외로 검수자가 차별화 각도만 확정하면 approve.
