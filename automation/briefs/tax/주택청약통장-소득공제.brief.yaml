target_query: "주택청약통장 소득공제 조건 한도 무주택 세대주 2026"
search_intent: 정보형     # 공제 자격·한도를 확인하려는 정보 탐색 의도

signal:                  # 스캐너 큐 소진 → 운영자 수동 선정 (자동 산출 아님)
  score: 0
  trend_momentum: 0
  question_volume: 0
  cluster_fit: 1.0
  freshness: 1.0

must_cover:              # 전부 '연말정산 소득공제' 각도 (청약 1순위 조건은 다루지 않음)
  - 주택마련저축(청약저축·주택청약종합저축) 납입액 소득공제의 개념과 대상 상품
  - 공제 한도: 연 납입액 300만원 한도의 40% = 최대 120만원 소득공제 (2024년 납입 한도 240→300만원 상향분 반영)
  - 무주택 세대주 요건 (본인 명의 세대주, 세대원 전원 무주택)
  - 총급여 7천만원 이하 근로자 요건 (근로소득자 한정, 초과 시 공제 배제)
  - 무주택확인서 제출 절차 (가입 은행에 익년 2월 말까지 제출해야 공제 적용)
  - 5년 내 중도해지 시 추징(납입누계액의 6% 감면세액 추징) 및 국민주택규모(85㎡) 초과 당첨 시 감면 배제
  - 청약 1순위 조건(가입기간·예치금)과는 별개 제도임 — 소득공제와 무관, 내부링크로만 연결

required_sources:        # 공식 1차 출처만. 청약홈·블로그·개인 Q&A 인용 금지. 0건이면 발행 차단
  - "조세특례제한법 제87조(주택청약종합저축 등에 대한 소득공제 등) (국가법령정보센터 law.go.kr)"
  - "조세특례제한법 시행령 제81조 (국가법령정보센터 law.go.kr)"
  - "국세청 연말정산 안내 — 주택마련저축 소득공제 (nts.go.kr)"

