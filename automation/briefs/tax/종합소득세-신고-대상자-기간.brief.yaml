  cluster_fit: 1.0
  freshness: 0.70

must_cover:
  - 종합소득세 신고 대상자 범위 — 사업소득·기타소득·금융소득·연금소득·근로소득이 동시에 발생할 때 신고 주체가 결정되는 매트릭스(근로 단일은 연말정산으로 종결, 사업/프리랜서 소득 합산 시 종소세 의무)
  - 신고 의무 면제·예외 기준 — 기타소득 연 300만원 이하 분리과세 선택 가능, 근로소득 단일·연말정산 완료자 면제 등 (researcher가 2026년 기준 정확 수치 확인)
  - 정기 신고 기간 — 5월 1일~5월 31일(일반) + 성실신고확인대상자 6월 30일까지 연장, 휴일 도래 시 익영업일 처리
  - 신고 방식 구분 — 추계신고(단순경비율·기준경비율) vs 간편장부 vs 복식부기, 직전 연도 수입금액 기준으로 갈리는 의무 구분
  - 종합과세 vs 분리과세 경계 — 금융소득(이자+배당) 2천만원 초과 시 종합과세 전환, 사적연금 1,500만원 초과 등 경계 케이스 (소득 구조에 따라 갈림, 단정 금지)
  - 무신고·과소신고 가산세 — 무신고 가산세 20%(부정 40%) + 납부지연 가산세 일 0.025% 등 단계별 계산 예시 (researcher가 2026년 최신 요율 검증)
  - 흔한 오해 바로잡기 — "3.3% 원천징수했으니 신고 끝", "직장인은 무조건 면제", "소액이면 안 걸린다" 등 통념 반박

