human_notes: |
  차별화: 1주체 결정 매트릭스(근로+사업+금융소득 동시 케이스) + 종합과세 vs 분리과세 경계 표(금융소득 2천만원·기타소득 300만원·사적연금 1,500만원) + 무신고시 가산세 단계별(무신고 20% + 일 0.025%) 계산 예시.
  F-01 가드: "X 소득이면 무조건 분리과세/면제" 단정 절대 금지 — "소득 구조와 합산 결과에 따라 갈린다" 톤 유지. 분리과세 선택권은 납세자가 행사하는 것이지 자동 적용이 아님을 명시.
  검수 포인트: (1) 2026년 신고 기간·가산세 요율 최신 기준 확인 (2) 성실신고확인대상 수입금액 기준 업종별 차이 누락 주의 (3) "3.3% 원천징수 = 신고 면제" 통념은 가장 흔하지만 가장 위험한 오해 — 단락 하나 통째로 할당 (4) 금융소득 2천만원은 부부 합산 아닌 개인별 기준.
