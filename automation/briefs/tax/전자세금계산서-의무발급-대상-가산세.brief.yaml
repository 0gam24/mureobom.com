human_notes: |
  차별화: 7월 부가세 1기 확정신고 시즌에 맞춘 의무발급 '대상 판정' 기준(법인 전원 + 개인 직전연도 사업장별 공급가액 합계 기준)과 발급·전송 기한, 미발급·지연발급·미전송·지연전송 가산세율을 사업자 유형별 표로 정리 — "모든 개인사업자 의무", "발급하면 전송 자동" 오해 반박.
  검수 포인트 1: 개인사업자 기준금액은 연도별로 하향 조정되어 왔으므로 2026 기준 최신 금액을 nts.go.kr에서 재확인 후 명시 (writer가 옛 기준 복붙하지 않도록).
  검수 포인트 2: 발급 기한(다음 달 10일)과 국세청 전송 기한을 분리해 설명 — 발급과 전송은 별개 의무이며 가산세율도 다르다.
  검수 포인트 3: 가산세율은 공급가액 대비 %이며 미발급/지연발급/미전송/지연전송이 각기 다르다. 세율 수치는 부가가치세법 조문으로 최종 대조.
