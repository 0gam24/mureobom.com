must_cover:
  - 과세유형 전환 판정 기준 매출액(직전 연도 공급대가 합계 일반→간이 4,800만원 미만 / 간이→일반 1억400만원 이상)과 1역년 단위 판정 개념
  - 7월 1일 과세유형 전환 효력 발생 시점과 국세청 전환 통지(전환되는 과세기간 개시 20일 전까지 통지) 시기
  - 일반과세자로 전환 시 재고매입세액공제 — 보유 재고품·감가상각자산 대상, 재고품등 신고서 제출 기한과 공제 계산 구조
  - 간이과세 포기신고 — 적용받지 않으려는 달의 전달 마지막 날까지 신고, 포기 후 3년간 간이과세 재적용 제한
  - 전환 직후 첫 부가가치세 신고·납부 의무 변화(예정고지·세금계산서 발급의무·신고 주기) 요약
  - 흔한 오해 바로잡기: 통지를 받아야만 전환되는 것이 아니라 매출 기준 충족 시 자동 전환된다는 점
  - 2026 적용 기준금액(간이과세 기준 1억400만원) 명시와 부동산임대·과세유흥장소 등 업종별 간이 배제 예외 안내

required_sources:         # 공식 1차 출처 후보 (researcher가 검증/보완). 0건이면 발행 차단
  - "부가가치세법 / 부가가치세법 시행령 (국가법령정보센터 law.go.kr) — 간이과세 기준·과세유형 전환·재고매입세액공제·포기신고 조항"
  - "국세청 (nts.go.kr) — 간이과세자 안내 및 과세유형 전환 통지 설명자료"
  - "홈택스 (hometax.go.kr) — 과세유형 조회·간이과세 포기신고·재고품등 신고 전자신고 화면 안내"

