human_notes: |
  차별화: 7/1 과세유형 전환 — 전환 기준 매출액(연 1억400만/4,800만)·전환 통지 시기·재고매입세액공제·간이과세 포기신고. 기발행 부가가치세 신고 글과 의도 분리(전환 통지 대응만 단일 의도).
  검수 포인트 1: 간이과세 기준금액은 2024년 1억400만원으로 상향됨 — 구 8,000만원 기준 표기 금지, 2026 적용 1억400만원으로 확정.
  검수 포인트 2: 전환 통지는 "과세기간 개시 20일 전"이 법령 문구 — 막연히 "6월말"로 적지 말고 시행령 조항 그대로. 자동 전환(통지=확정 아님)과 통지의 관계를 명확히.
  검수 포인트 3: 재고매입세액공제·포기신고 기한은 자주 틀리는 통념 → 시행령 기한 문구 1차 출처로 재확인 후 표기.
