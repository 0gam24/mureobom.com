  - 회사 정산 vs 5월 종합소득세 신고(경정청구·확정신고) 분기 — 어떤 경우에 5월로 넘어가는가
  - 환급액 산정 메커니즘 — 결정세액과 기납부세액 차액 구조, 추가환급/추가납부 분기
  - 경정청구 가능 기한(법정신고기한 후 5년) — 놓친 공제 회복 경로
