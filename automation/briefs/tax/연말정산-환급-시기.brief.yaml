human_notes: |
  차별화: 회사 정산(2월→3월 급여) vs 5월 종소세 신고/경정청구 분기 표 + 경정청구 5년 시효 활용 + 환급 안 오는 케이스 진단표.
  검수 포인트:
  - 2026 기준: 간소화 서비스 오픈 일정·정산 일정은 매년 미세 변동 → 발행 시점 최신 국세청 공지 기준으로 명시.
  - "연말정산 = 환급"이라는 통념은 오답 — 결정세액 > 기납부세액이면 추가납부. writer가 단정 표현("무조건 환급") 쓰지 않도록 주의.
  - 경정청구 기한은 법정신고기한(보통 5월 31일) 후 5년. "5년 = 정산일 기준"으로 오해하는 케이스 많음 → 정확히 표기.
