  - 흔한 오해 진단표 — "연말정산 = 무조건 환급", "환급 안 오면 회사가 떼먹는다" 등 통념 반박
  - 환급이 늦거나 안 들어오는 케이스 — 회사 정산 지연, 결정세액 0 케이스, 추가납부 케이스

