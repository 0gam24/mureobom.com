human_notes: |
  차별화: 기발행 tax/재산세-부과기준-세율은 "얼마 내나"(부과·세율) 중심.
  본 글은 단일 의도 "어떻게 가장 싸게 내나"(카드사별 무이자 개월·캐시백·체크 vs 신용 선택표).
  7월 1기분 납부 직전 시즌 선점 — 매년 6월 말~7월 초 카드사 공지가 갱신되므로
  본문 안에 "2026년 7월 1기분 기준" 명시 + updated 날짜로 신선도 신호.

  검수 포인트:
  - 카드사 무이자 개월은 매월 갱신되니 "여신금융협회 공지 + 발행 시점" 명시 필수.
    카드사명·개월 수를 단정적으로 박지 말고 "발행일 기준 공지 예시" 형식 권장.
  - "지방세 신용카드 수수료 = 납세자 부담 0원" — 국세(연 0.8%)와 헷갈리는 통념 반박.
  - 250만 원 초과 분할납부(2개월 이내) 조건은 재산세 한정. 자동차세와 다름.
