must_cover:
  - 재산세 카드납부 가능 여부와 납부 채널(위택스/스마트위택스/ARS/은행 CD/ATM)
  - 카드사별 무이자 할부 개월 수 비교 (2026년 7월 1기분 기준)
  - 카드 포인트·캐시백·M포인트·하나머니 등 부분납·전액납 혜택 정리
  - 신용카드 납부 시 납세자 수수료 0원 원칙(지방세는 카드사 부담) 명시
  - 부분 무이자(예: 5·6개월 부분 무이자) 구조와 실제 이자 부담 계산 방법
  - 체크카드 캐시백 vs 신용카드 무이자 — 본인 상황별 선택 기준 표
  - 7월 1기분 vs 9월 2기분 납부 일정과 분할납부(250만 원 초과) 조건

required_sources:         # 공식 1차 출처 우선. 카드사 안내는 화이트리스트 한도 내에서 보조.
  - "위택스(Wetax) 공식 안내 — 지방세 신용카드 납부 가능 채널·수수료"
  - "행정안전부 지방세 납부 안내(재산세 부과·납기 1기분 7월·2기분 9월)"
  - "지방세법 / 지방세징수법 (국가법령정보센터) — 신용카드 납부 근거·분할납부 조건"
  - "서울시 ETAX / 광역지자체 세정 포털 — 카드납부 캐시백·혜택 공지(매년 7월 갱신)"
  - "여신금융협회 카드사별 무이자 할부 공지(시즌 안내)"

