human_notes: |
  차별화: '나는 간편장부인가 복식부기인가'를 업종별 기준수입금액 표로 즉시 판정하게 하고, 안 썼을 때(추계) vs 복식부기 자발적 작성 시(기장세액공제)의 손익을 대비시키는 각도. 개념 설명에 그치지 않고 판정 → 손익 계산까지.
  기준수입금액은 소득세법 시행령 제208조 별표의 업종별 값(도소매 3억, 제조·음식·건설 1.5억, 서비스·부동산임대 7,500만원). 신규사업자·직전연도 기준 등 예외를 정확히.
  단정적 절세 약속 금지(F-*). 개별 업종 판정은 국세청·세무 전문가 확인 안내(일반정보 고지).
