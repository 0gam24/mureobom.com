human_notes: |
  차별화: 부담부증여(전세보증금·대출 등 채무 인수 동반) — 채무액분은 양도소득세, 나머지는 증여세 동시 과세 구조와 계산 예시·절세 조건. 기발행 증여세 면제한도·양도세 글과 내부링크, "채무 인수 증여 과세" 단일 의도.
  기준연도 2026 확인: 증여재산공제 한도·이월과세 보유기간(5년)·증여취득세율 최신값으로 검증.
  자주 틀리는 통념: "부담부증여는 무조건 절세" — 양도세분이 커지면 오히려 불리한 케이스 + 가공채무·채무 미상환 시 추징을 반드시 반박 단락으로.
  비공식 UGC 출처의 계산 사례는 신호로만, 본문 수치는 국세청·법령 기준으로만 재계산.
