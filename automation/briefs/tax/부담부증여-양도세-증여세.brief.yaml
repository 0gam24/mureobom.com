must_cover:
  - 부담부증여 정의 — 수증자가 증여재산에 딸린 채무(전세보증금·담보대출 등)를 함께 인수하는 증여
  - 과세 분리 구조 — 채무 인수액분은 증여자에게 양도소득세, 채무 차감 후 잔여 증여가액은 수증자에게 증여세 동시 과세
  - 양도세 계산 — 양도가액을 채무액으로 보고 취득가액 안분, 보유기간·1세대1주택 비과세·장기보유특별공제 적용 여부
  - 증여세 계산 — (증여재산가액 − 인수채무) 과세표준에 증여재산공제(직계존비속 5천만원, 미성년 2천만원 등) 적용
  - 계산 예시 — 시가·채무액을 가정한 양도세분 + 증여세분 합산 vs 일반증여(전액 증여세) 세부담 비교
  - 절세 성립 조건과 함정 — 채무가 진성(실제 부담) 인수여야 하며 국세청 사후관리(채무 상환 자금출처) 대상이라는 점
  - 2026년 유의점 — 증여취득세·이월과세(증여 후 5년 내 양도 시 취득가액 이월) 등 절세 효과를 무력화하는 조건

