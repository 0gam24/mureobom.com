human_notes: |
  차별화: 국민건강보험공단 건강생활실천지원금제 시범사업 — 예방형(국가건강검진 BMI 25↑·혈압/혈당 주의)·관리형(일차의료 만성질환관리 등록) 대상 구분, 실천활동(걷기·건강교육·자가측정)→포인트(연 최대 6만)→사용처. 다른 사이트가 놓치는 예방형vs관리형 자격 구분표.
  기준연도 2026: 시범사업이라 참여 지역·적립 상한·사용처가 지침 개정마다 바뀌니 최신 운영지침 기준 명시.
  흔한 통념 반박: "전 국민 누구나 받는다"는 오해 → 시범사업 지역 + 예방형/관리형 자격 충족자만 대상임을 명확히.
  포인트는 현금이 아니라 사용처가 제한된 적립 포인트임을 분명히 구분(지급금액=포인트 환산임을 오해하지 않도록).
