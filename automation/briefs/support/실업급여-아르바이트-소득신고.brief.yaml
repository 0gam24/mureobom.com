human_notes: |
  차별화: 실업급여 '수급 중 아르바이트·단기근로' 전용 각도 — 신청·자발적퇴사 글과 분리.
  '취업 간주 기준(시간/기간)'과 '근로소득 신고 의무'를 근로 형태별 표로 정리하고,
  일한 날 미지급/감액과 부정수급 결과를 나란히 대비. 다른 사이트가 '알바하면 무조건
  끊긴다'로 뭉뚱그리는 지점을 '신고하면 적법'으로 바로잡는 것이 핵심 차별화.
  수요 신호 기반 수동 선정, 질문 원문 미보관(절대 원칙 1 — signal은 집계값만).
  검수 포인트:
  - 취업 간주 시간·기간 기준과 감액 산식은 2026 최신(고용보험법 시행령/고시) 재확인.
  - 공포조장 금지 — '신고하면 적법하게 수급 가능'을 명확히. 부정수급은 '미신고·허위'일 때만.
  - 자영업/프리랜서/일용/현금 소득도 신고 대상임을 빠뜨리지 말 것(통념상 자주 누락).
