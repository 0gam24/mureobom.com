must_cover:
  - "'취업'으로 간주되는 기준 — 근로 형태별(월 60시간/주 소정근로 15시간 이상, 1개월 이상 근로 등)로 실업 상태 인정 여부가 갈리는 지점"
  - 단기·소액 아르바이트라도 실업인정 신청 시 근로 사실·소득을 반드시 신고해야 하는 의무
  - 근로한 날은 그날의 구직급여 미지급 또는 소득 수준에 따른 감액 처리 원칙(일한 만큼 공제)
  - 미신고·허위신고 시 부정수급 — 지급 중단, 받은 금액 반환, 추가징수(최대 배액) 및 형사처벌 가능성
  - 자영업·프리랜서·일용직 소득도 근로소득과 동일하게 신고 대상(현금·단발성 포함)
  - 적법하게 아르바이트하며 수급하는 절차 — 실업인정일 신고 방법, 고용24(고용노동부) 온라인 신고 흐름

required_sources:        # 공식 1차 출처만. 비공식 블로그·커뮤니티 금지. 0건이면 발행 차단
  - "고용보험법 / 고용보험법 시행령 (실업인정·취업 간주 기준·부정수급 조문, 국가법령정보센터 law.go.kr)"
  - "고용노동부 실업인정 안내(근로 사실 신고 의무·감액 기준, moel.go.kr)"
  - "고용노동부 실업급여 부정수급 안내(반환·추가징수·처벌, moel.go.kr)"

