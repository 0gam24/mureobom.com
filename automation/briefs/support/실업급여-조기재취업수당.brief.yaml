human_notes: |
  차별화: 수급 중 취업신고(고용24) 의무 + 조기재취업수당 전용 — 기존 실업급여 글(신청방법·자발적퇴사)과 분리. "잔여 소정급여일수 1/2 이상 남기고 재취업 + 12개월 계속 근무" 요건과 "잔여 일수의 1/2 지급" 계산을 한 표로 정리, 자영업/과거 수급 이력 제외 케이스까지 커버.
  수요 신호 기반 수동 선정, 질문 원문 미보관(절대 원칙 1) — signal 수치는 수동 선정 표식(score:0).
  검수 포인트: 요건·지급률(잔여 1/2)·12개월 계속근무 기준은 2026년 시행령 기준으로 재확인. "취업하면 무조건 실업급여 끝난다"는 통념은 오해 — 조기재취업수당으로 일부 보전됨을 명확히. 지급액은 "받을 수 있다"로 단정하지 말고 요건 충족 시 지급 대상이라는 조건부 표현 유지.
