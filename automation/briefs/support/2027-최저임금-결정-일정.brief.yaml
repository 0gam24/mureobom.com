human_notes: |
  차별화: 최저임금위원회 6~7월 심의·8/5 고시 법정 일정 타임라인 + 최근 5년 인상률 추이표 + 공익위원 중재안 결정 패턴 분석. 결정 보도 때마다 검색 급증하는 시즌성 키워드.
  검수 포인트:
  - 2027년 적용분은 2026년 6~7월 심의 → 8/5 고시 예정. 작성 시점이 의결 전/후인지 따라 본문 톤 분기 필요 (의결 전: "심의 중, 예정", 의결 후: "확정 시급 X원, 인상률 Y%").
  - "최저임금 = 한국노총·민주노총이 정한다"는 통념 반박 (실제로는 9-9-9 위원회 표결, 공익위원이 캐스팅보트).
  - 월 환산 209시간 근거(주 40시간 + 유급주휴 8시간 × 4.345주) 정확히 표기 — 자주 틀리는 부분.
