human_notes: |
  차별화: "참여 대상(수급자에 한정되지 않음) × 자활근로 유형 × 자활급여" 세 축으로 정리하고,
  차상위·자활급여특례도 참여 가능하다는 점과 자활근로가 유급이라는 사실로 통념을 반박.
  자산형성지원(내일저축계좌 등)과의 연계 흐름을 내부링크로 연결.
  검수 포인트(egress 복구 후 researcher가 확정):
  - 참여 대상 구분·급여 수준·유형별 조건은 복지부 자활사업 안내(연도판) 기준으로 확정 표기.
  - 급여 금액은 연도별 변동 — 발행 연도(2026) 기준 명시, 추측성 수치 금지.
  - 자활장려금·자산형성 연계는 제도 연동 관계만 서술, 특정 통장 가입 권유·수익 약속 금지.
