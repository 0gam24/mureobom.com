must_cover:
  - 2026년 지원 금액 — 단태아 100만 원, 다태아(쌍둥이 이상) 140만 원
  - 신청 경로 두 가지 — 카드사(국민행복카드 발급사) 창구·앱 vs 정부24·복지로 온라인 신청
  - 신청 자격·시점 — 임신 확인서 발급 후 분만예정일 기준, 출산 후 신청 가능 여부
  - 사용처 — 산부인과 등 요양기관 진료비·약제비, 사용 가능 항목과 제외 항목 구분
  - 사용 기간(소멸 시한) — 분만예정일/출산일 기준 사용 만료일과 미사용 잔액 소멸 규정
  - 다른 출산 제도와의 구분 — 첫만남이용권·부모급여는 별개 제도(이 글은 의료비 바우처 단일 의도)
  - 자주 틀리는 통념 — 국민행복카드 자체와 임신·출산 진료비 바우처(이용권)는 다른 개념

