human_notes: |
  차별화: 임신·출산 진료비 바우처(국민행복카드, 단태아 100만·다태아 140만) — 신청(카드사·정부24)·사용처·사용기간. 기발행 첫만남이용권/부모급여 글과 별제도(의료비 바우처 단일 의도).
  검수 포인트: 2026 기준 금액(단태아 100만/다태아 140만)이 연도별로 자주 바뀌니 최신 기준 확인.
  "국민행복카드 = 바우처"로 혼동하는 통념 반박 — 카드는 결제수단, 진료비 지원은 그 위에 충전되는 이용권.
  사용 기간(소멸 시한) 누락이 흔하니 분만예정일/출산일 기준 만료일 반드시 명시.
