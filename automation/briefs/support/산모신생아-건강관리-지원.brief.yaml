must_cover:
  - 산모·신생아 건강관리 지원사업 정의(건강관리사를 가정에 파견해 산후 회복·신생아 돌봄을 지원하는 바우처 사업)와 임신·출산 진료비 바우처·아이돌봄과의 차이
  - 2026년 소득기준 — 기준중위소득 150% 이하 원칙 + 150% 초과 예외지원(지자체별 자체 기준) 대상
  - 지원기간 일수 — 단태아/다태아/삼태아 이상, 출산 순위·출생아 수에 따른 표준·단축·연장 구간 구분
  - 서비스 가격과 본인부담금 구조(정부지원금 + 본인부담금 = 총 서비스 가격), 소득구간·태아유형별 본인부담 차등
  - 신청 방법과 기한 — 복지로 온라인 또는 관할 보건소 신청, 출산일 전 60일~출산일 후 30일 이내 신청 기한
  - 자주 틀리는 통념 — "맞벌이 고소득이면 무조건 못 받는다"는 오해(예외지원 존재)와 산후조리원 비용 지원과의 혼동 바로잡기

