human_notes: |
  차별화: 산모·신생아 건강관리 지원사업 — 건강관리사 가정 파견 바우처. 소득기준(기준중위 150% 이하 + 예외)·지원기간(단태아/다태아)·서비스 가격·본인부담·신청(복지로). 기발행 임신출산바우처·아이돌봄 글과 별제도(산후 건강관리 단일 의도).
  검수 포인트:
  - 소득기준·본인부담금·지원일수는 매년 갱신되니 2026년 최신 기준으로 명시(researcher가 보건복지부 당해연도 안내로 확정).
  - 150% 초과 예외지원은 지자체별 자체 운영 — "전국 동일"로 단정하지 말고 관할 보건소 확인 안내를 둘 것.
  - 산후조리원 비용 지원·임신출산 진료비 바우처와 혼동하는 통념을 본문에서 분리해 바로잡을 것.
