human_notes: |
  차별화: 2025년 인상 급여 구조(구간별 상한) + 6+6 부모육아휴직제 + 육아휴직 vs 근로시간단축 구분.
  검수: 금액·구간은 반드시 2026년(2025 인상 반영) 공식 기준으로, 변동 명시. 사후지급금 폐지 여부 공식 출처로 확정.
  단정 금지 — 개인 통상임금에 따라 달라짐 안내, 일반정보 고지.
