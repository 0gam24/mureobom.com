id: support-육아휴직-급여-신청조건-금액
cluster: support
status: published  # 2026-06-11 compliance 게이트 통과

target_query: "육아휴직 급여 신청조건 금액 2026"
search_intent: 절차형

signal:
  cluster_fit: 1.0
  freshness: 0.88
  manual: true

must_cover:
  - 육아휴직 제도 개요 — 남녀고용평등법 §19, 만 8세 이하/초2 이하 자녀, 부모 각각 최대 1년(요건 충족 시 1년 6개월)
  - 육아휴직 급여 지급 요건 — 고용보험 피보험 단위기간 180일 이상, 30일 이상 육아휴직
  - 2025년 인상 급여 구조 — 통상임금 기준 월 상한 인상(1~3개월/4~6개월/7개월~ 구간별 상한), 하한
  - 사후지급금 제도 변화 — 2025년 폐지/완화 여부 공식 확인
  - 6+6 부모육아휴직제 — 생후 18개월 이내 부모 모두 사용 시 첫 6개월 상향 지급
  - 한부모 특례 — 한부모 근로자 상향 지급 기준
  - 신청 절차 — 사업주에 휴직 신청 후 고용센터(고용보험)로 급여 신청, 매월 또는 사후 신청, 필요 서류
  - 흔한 오해 — 육아휴직(무급 원칙·급여는 고용보험 지원) vs 육아기 근로시간 단축 구분

required_sources:
  - "남녀고용평등과 일·가정 양립 지원에 관한 법률 제19조 (육아휴직) — 국가법령정보센터"
  - "고용보험법 / 시행령 육아휴직 급여 — 국가법령정보센터"
  - "고용노동부 — 육아휴직 급여 안내(모성보호·일가정양립)"
  - "고용보험 누리집 / 근로복지공단 — 육아휴직 급여 신청"

