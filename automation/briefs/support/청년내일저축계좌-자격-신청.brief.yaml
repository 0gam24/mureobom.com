human_notes: |
  차별화: 청년내일저축계좌 — 대상(기준 중위소득 100% 이하 일하는 청년)·본인적립(월 10만)+정부매칭(차상위 30만/그외 10만)·3년 만기 수령액·신청 기간/방법. 기발행 청년도약계좌와 별제도(저소득 청년 자산형성 단일 의도).
