must_cover:
  - 노인일자리 사업 개요 — 노인복지법 §23, 노인 일자리 및 사회활동 지원법, 보건복지부·한국노인인력개발원
  - 공익활동형 — 사회참여활동(근로 아님), 월 약 30시간, 활동비 약 29만
  - 사회서비스형 — 보육·교육·복지시설 등, 월 60시간, 급여 약 76만
  - 시장형(공동체사업단) — 시장 진출 일자리, 매출 기반
  - 대상 — 만 65세 이상 (사업유형별 차등)
  - 신청 — 노인일자리 통합 누리집(seniorro.or.kr), 시니어클럽, 주민센터
  - 모집 시기 — 12월~다음 해 1월 (지자체별 차이)
  - 기초연금 등과 중복 — 일반적으로 가능 (단정 X)
  - 금액·시간 매년 변동

