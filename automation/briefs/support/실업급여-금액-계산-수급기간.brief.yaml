human_notes: |
  차별화: 실업급여 '얼마·며칠' 전용 글 — 구직급여일액(평균임금 60%)·상한/하한액·
  소정급여일수(연령·피보험단위기간별 120~270일) 표 + 가정값을 명시한 계산 예시로
  '신청방법'·'자발적퇴사 인정사유' 글과 완전 분리(중복 회피).
  수요 신호 기반 수동 선정, 질문 원문 미보관(절대 원칙 1) — signal은 집계 수치만.
  검수 포인트:
  - 상한액·하한액·최저임금 연동값은 매년 고시로 변경 → 반드시 2026 기준으로 표기하고
    "정확한 최신값은 고용24/고용보험 공식 페이지에서 조회"로 단정 회피.
  - 소정급여일수는 2019.10 개정(90~240 → 120~270일) 이후 기준 유지 여부 확인.
  - 계산 예시는 반드시 '가정값(예: 평균임금 X원·근속 Y년·연령 Z)'임을 명시 —
    독자 실제 수급액을 확정하는 문장 금지.
