human_notes: |
  차별화: 서울주택도시공사(SH) 행복주택 — 공급계층별(청년·신혼부부·고령자·주거급여수급자) 소득·자산 기준표와 거주기간, 모집공고→청약→서류심사 절차. 서울 한정 명시, 기발행 주거급여/청년월세와 별제도(공공임대 입주).
  검수 포인트: 소득·자산 기준은 매년 갱신되니 2026 기준연도(전년도 도시근로자 월평균소득) 수치를 SH·마이홈 공식값으로 확인. LH 행복주택과 혼동 주의 — 본 글은 서울 SH 한정.
  자주 틀리는 통념: "행복주택=현금 지원"이 아니라 '시세보다 저렴한 임대주택 입주' 제도. 주거급여·청년월세(현금성)와 명확히 선 긋기.
