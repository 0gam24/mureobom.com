  차별화: 상한제·산정특례와 뚜렷이 다른 '소득기준 사후 지원' 전용 해설 — 세 제도 비교표(재난적의료비=소득·재산 기준으로 비급여 일부까지 사후 지원 / 상한제=건보 본인부담 총액 상한 환급 / 산정특례=중증질환 부담률 경감)와 중복 적용 순서를 한 화면에 정리.
  스캐너 큐 소진으로 운영자 수동 선정(공백 선정, score=0). 트렌드/질문량 미측정.
  소득·재산 기준, 지원 비율(50~80%), 연간 한도(최대 5천만원), 기준금액은 연도별로 자주 바뀌니 2026 기준 재확인 필수(researcher가 law.go.kr·mohw.go.kr·nhis.or.kr로 검증).
  의료 정보는 제도 안내 수준으로만 — 특정 질환 진단·치료 권유 금지(AdSense YMYL). "모든 의료비를 다 받는다"는 통념 반박(대상 질환·기준금액 초과 조건이 있음) 단락 포함.
