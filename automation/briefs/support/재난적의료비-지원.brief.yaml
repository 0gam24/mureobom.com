must_cover:
  - 제도 개념 — 과도한 의료비로 경제적 어려움을 겪는 가구에 본인부담 의료비 일부를 사후 지원(건강보험 급여·비급여 일부 포함, 국민건강보험공단 운영)
  - 지원 대상 — 기준중위소득 100% 이하 중심의 소득기준 + 재산 기준(가구 재산 과표 상한), 지원제외자 및 기준 초과 시 개별심사 제도
  - 대상 질환·의료비 기준 — 모든 질환 입원 + 중증질환(암·뇌혈관·심장·희귀·중증난치 등) 외래, 연간 본인부담의료비가 소득구간별 기준금액을 초과할 때
  - 지원 한도·비율 — 소득구간별 본인부담의료비의 50~80% 지원, 연간 최대 5천만원(2026 기준 수치 확인 필요)
  - 신청 방법·기한 — 국민건강보험공단 지사 방문 신청, 퇴원일·최종 진료일 다음 날부터 180일 이내 청구, 필요 서류(진료비 영수증·진단서 등)
  - 본인부담상한제·산정특례와의 차이 — 재난적의료비=소득기준 사후 지원(비급여 일부 포함) / 본인부담상한제=건강보험 본인부담금 연간 총액 상한 초과분 환급 / 산정특례=중증질환 본인부담률 경감. 세 제도 중복 적용 순서 안내

required_sources:        # 공식 1차 출처만. 블로그·병원광고·질의응답 게시판 금지. 0건이면 발행 차단
