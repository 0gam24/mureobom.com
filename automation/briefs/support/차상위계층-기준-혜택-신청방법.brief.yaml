# cta 필드는 폐기 — 수익화는 AdSense 단독 (계산기/제휴 CTA 미사용)

compliance:
  medical_legal_financial_advice_disclaimer: true  # 일반정보 고지 삽입 (AdSense YMYL 정책 친화)

geo:
  faq_schema: true
  faq_pairs_min: 4
  llms_txt: true

human_notes: |
  차별화: '기준중위소득 50% 이하'를 소득인정액(소득평가액 + 재산의 소득환산액) 개념까지
  풀어 설명하고, 차상위 세부 유형(본인부담경감·자활·장애수당·한부모 등)별 대표 혜택을
  표로 정리 + 기초생활수급자(중위 30~50%)와의 구간 차이를 명확히.
  기준연도는 2026년 기준중위소득으로 통일(연도 혼용 금지) — 금액은 required_sources로 대조.
  자주 틀리는 통념 2개 반드시 반박: (1) "소득만 보면 된다" -> 재산의 소득환산액 포함,
  (2) "한 번 신청하면 자동 갱신" -> 주기적 자격 재확인 필요.
  세부 유형별 근거 법령·소관이 달라 혜택이 유형마다 다름을 명시(단일 혜택으로 오인 주의).
