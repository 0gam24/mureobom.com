target_query: "차상위계층 기준 소득 조건 혜택 신청 방법"
search_intent: 절차형     # 선정 기준 확인 + 유형별 혜택 + 신청 절차를 함께 원함

signal:                  # 수동 선정 추정치(읽기 전용, 집계 수치만)
  score: 54
  trend_momentum: 0.3
  question_volume: 0.47
  cluster_fit: 1.0
  freshness: 0.85

must_cover:
  - 차상위계층 정의와 선정 기준(기준중위소득 50% 이하, 소득인정액 개념)
  - 소득인정액 산정 구조(소득평가액 + 재산의 소득환산액) 개요
  - 기초생활수급자(중위 30~50% 구간)와의 구분 표
  - 차상위 세부 유형별 대표 혜택(본인부담경감, 차상위 자활, 장애수당, 한부모 등)
  - 신청 방법·장소(읍면동 주민센터, 복지로), 필요 서류 개요
  - 통념 바로잡기("소득만 보면 된다", "한 번 신청하면 자동 갱신")

required_sources:        # 공식 1차 출처만. 0건이면 발행 차단
  - "국민기초생활 보장법 / 시행령 (국가법령정보센터 law.go.kr)"
  - "복지로 복지서비스 안내 (bokjiro.go.kr)"
  - "정부24 (gov.kr)"

