human_notes: |
  차별화: '육아휴직 급여'와 자주 혼동되는 '육아기 근로시간 단축 급여'를 분리해, 단축시간별 급여가 어떻게 계산되는지(최초 10시간 100% 상한 + 초과분 80%) 예시 숫자로 보여주는 각도. 육아휴직을 다 안 써도 병행·분할 사용 가능하다는 점을 명확히.
  2025~2026 제도 확대(대상 자녀 연령, 사용 기간, 최소 사용단위 등) 반영하되 연도별 변동 가능 명시. 상한액·통상임금 수치는 고용노동부 현행 기준을 확인해 최신값만.
  개인별 지급액은 고용센터·고용보험 확인 안내(일반정보 고지).
