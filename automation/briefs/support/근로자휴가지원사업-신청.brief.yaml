must_cover:
  - 사업 개요와 적립 구조(정부·기업·근로자 분담으로 휴가비를 적립해 사용하는 방식)
  - 2026년 기준 정확한 적립 비율·금액(정부 적립액 + 기업 적립액 + 근로자 본인 적립액 = 총 휴가비) — 공식 기준으로 확정
  - 신청 대상(중소·중견기업, 소상공인 사업장 소속 근로자 / 사회적기업 등 우대 대상 포함 여부)
  - 신청 절차와 일정(기업 신청 → 근로자 등록 → 적립금 충전, 연중 모집 시기·선착순 마감 유의)
  - 적립금 사용처(국내 여행·숙박·교통·관광지 등 지정 가맹점·전용몰)와 사용 불가 항목
  - 다른 사이트가 놓치는 케이스: 여름휴가 직전 6~7월 신청·사용 타이밍과 잔액 소진 마감 기한, 중도 퇴사 시 적립금 처리
  - 흔한 오해 바로잡기(전 국민 대상 아님 / 자영업자 본인 vs 소속 근로자 구분 / 현금 환급 불가)

