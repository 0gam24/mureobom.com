human_notes: |
  차별화: 근로자휴가지원사업 — 정부 10만+기업 10만+근로자 20만 적립(총 40만 휴가비) 구조, 대상(중소·중견·소상공인 근로자)·신청 절차·사용처. 시즌성(여름휴가 직전). 정확한 적립 비율·금액은 2026 공식 기준 확인.
  검수 포인트1: 적립 비율·금액(정부/기업/근로자 분담분)은 연도별로 바뀌므로 2026 한국관광공사 공식 공고로 반드시 재확인 — 위 40만 구조는 차별화 각도용 가설값.
  검수 포인트2: "전 국민이 받는 정부 휴가비"라는 통념은 오답. 신청 기업 소속 근로자 한정 + 기업이 먼저 참여 신청해야 근로자가 등록 가능한 구조임을 명확히.
  검수 포인트3: 연중 선착순·예산 소진 시 조기 마감되는 모집 사업이므로 "현재 모집 중" 단정 표현 금지 — 신청 시기·잔여 여부는 공식 누리집 확인 안내로 처리.
