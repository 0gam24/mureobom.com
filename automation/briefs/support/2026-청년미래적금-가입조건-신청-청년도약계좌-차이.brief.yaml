  비교 표는 청년도약계좌 발행글(support/청년도약계좌-신청자격-혜택)과 정합 유지 — 두 글 수치가 어긋나지 않게 같은 출처판 기준으로 작성.
  비공식 UGC 출처에 떠도는 "출생연도 5부제 첫날 자동탈락" 류 통념은 공식 일정으로 반박. 신청 채널은 공식 안내(서민금융진흥원)로만 확정.
