  차별화: 2026 신규 청년미래적금(6/22 출시) — 일반형/우대형 소득기준·정부기여·비과세, 출생연도 5부제 신청 절차, 청년도약계좌와 차이/중복가입·갈아타기. 신규 정책이라 출시일·기준 정확 반영, 확정 안된 수치는 단정 금지.
