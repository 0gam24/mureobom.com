human_notes: |
  차별화: 실업급여 부정수급 "유형→제재(반환·추가징수 배수·형사처벌)→자진신고 완화" 전용 각도.
    기존 실업급여 허브(신청방법·자발적퇴사·금액계산·아르바이트·조기재취업수당)와 분리 —
    이 글만 제재·자진신고를 다룬다. 근로자가 흔히 모르는 "실수형 미신고 vs 고의 부정" 경계와
    자진신고 구제 경로를 표로 구분.
  수요 신호 기반 수동 선정, 질문 원문 미보관(절대 원칙 1). signal은 미측정 placeholder(0).
  추가징수 배수(최대 2배·공모 5배)·벌칙(3년/3천만원)은 2026 기준 고용보험법 현행 조문으로 재확인 —
    개정 잦은 영역이니 researcher가 law.go.kr 조문 날짜 대조.
  공포조장 금지: "미신고·허위일 때만 제재" 전제를 서두에 명시하고, 자진신고 완화를 반드시 병기.
    단순 신고 지연·경미한 착오까지 형사처벌로 오해시키지 말 것.
