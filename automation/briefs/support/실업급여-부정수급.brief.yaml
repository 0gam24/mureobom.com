id: support-실업급여-부정수급
cluster: support
status: published        # compliance 게이트 통과 (2026-07-10) — 발행 승인

target_query: "실업급여 부정수급 처벌 반환 자진신고 신고"
search_intent: 정보형     # 유형·제재·자진신고를 확인하려는 지식 탐색

signal:                  # 수요 신호 기반 수동 선정(스캐너 미측정, 원문 아님)
  score: 0
  trend_momentum: 0
  question_volume: 0
  cluster_fit: 1.0
  freshness: 1.0

must_cover:
  - 부정수급의 대표 유형 — 취업·근로·소득 미신고, 허위 이직사유, 위장 고용, 이직확인서·구직활동 확인서 위조
  - 적발 시 행정제재 — 지급 중단 + 받은 실업급여 전액 반환 + 추가징수(부정수급액의 최대 2배, 사업주 공모 시 최대 5배)
  - 형사처벌 — 고용보험법상 3년 이하 징역 또는 3천만원 이하 벌금(사안·공모에 따라 가중)
  - 자진신고 시 완화 — 부정수급 사전·자진 신고하면 추가징수 면제 등 제재 경감(공포조장 아닌 구제 경로로 병기)
  - 사업주 공모·연루 시 연대책임 — 근로자와 함께 반환·추가징수 대상, 이직확인서 허위 작성의 책임
  - 신고 방법 — 관할 고용센터·국번없이 1350 부정수급 신고, 신고포상금 제도(제보자 대상)

required_sources:        # 공식 1차 출처만. 블로그·커뮤니티 인용 금지. 0건이면 발행 차단
  - "고용보험법 (부정행위에 따른 급여 지급 제한·반환명령·추가징수 조문, 국가법령정보센터 law.go.kr)"
  - "고용보험법 시행령·시행규칙 (추가징수 배수·자진신고 감면 세부, 국가법령정보센터 law.go.kr)"
  - "고용보험법 벌칙 조항 (부정수급 형사처벌 3년/3천만원, 국가법령정보센터 law.go.kr)"
  - "고용노동부 실업급여 부정수급 안내·신고 (moel.go.kr)"

