human_notes: |
  차별화: 장애인연금 전용 각도 — 기초연금·장애수당과 헷갈리는 3제도를 "중증(장애인연금)/경증(장애수당)/65세(기초연금)" 축으로 구분한 표 + 기초급여·부가급여 2단 구조 시각화. 기존 support/장애인-활동지원-연금(활동지원 서비스)과 겹치지 않게 '소득보장 현금급여'만 다룬다.
  스캐너 큐 소진으로 운영자 수동 공백 선정(score=0, cluster_fit=1.0) — 발행 전 검수자가 차별화 각도 재확인 필수.
  급여액·선정기준액(단독/부부 가구)은 매년 고시 변경 → 반드시 2026 기준으로 확인하고 정확 금액은 복지부/복지로 조회 안내로 병기, 단정 표현 회피.
  자주 틀리는 통념: (1) 장애등급 폐지 후 '중증/경증' 장애정도로 판정된다는 점 (2) 기초연금과 장애인연금은 별개 제도이며 65세 관계 정리 (3) 소득인정액 = 소득평가액 + 재산 소득환산액이라 근로소득만으로 판단하지 않는다는 점.
