must_cover:
  - 두루누리 사회보험료 지원사업이란 — 소규모 사업장 저임금 근로자·사업주의 고용보험·국민연금 보험료 일부 국가 지원
  - 지원 대상 요건 — 근로자 수(10명 미만 사업), 근로자 월평균 보수 기준 상한, 재산·소득 요건
  - 지원 수준(보험료의 일정 비율)과 지원 기간 제한(신규 가입자 중심)
  - 지원되는 보험(고용보험·국민연금)과 지원되지 않는 보험(건강보험·산재보험) 구분
  - 신청 방법 — 사업주가 4대사회보험 정보연계센터·공단을 통해 신청하는 절차
  - 흔한 오해(4대보험 전부 지원? 근로자가 직접 신청?) 바로잡기

required_sources:           # 공식 1차 출처만. 0건이면 발행 차단
  - "고용보험법 / 국민연금법 관련 보험료 지원 근거 (국가법령정보센터 law.go.kr)"
  - "고용노동부 두루누리 사회보험료 지원 안내 (moel.go.kr)"
  - "근로복지공단 / 4대사회보험 정보연계센터 두루누리 안내"

