human_notes: |
  차별화: '지원되는 보험(고용·국민연금)'과 '지원 안 되는 보험(건강·산재)'을 명확히
  구분하는 표 — 가장 흔한 오해. 근로자 수·월평균 보수 상한·소득/재산 요건을
  체크리스트로 정리. 신청 주체가 근로자가 아니라 사업주라는 점, 신규 가입자 중심의
  지원 기간 제한을 강조. 연도별 보수 상한 기준은 최신값을 명시하되 변동 가능성 고지.
  단정적 지원 확정 표현 금지, 요건·예산에 따라 달라질 수 있음 명시(F-* 가드).
