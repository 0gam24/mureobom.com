must_cover:
  - 기초생활보장 개요 — 국민기초생활 보장법 §1·§7, 4대 급여(생계·의료·주거·교육) + 해산·장제·자활
  - 2026 기준 중위소득 6.51% 인상 (4인 649.5만, 1인 256.4만)
  - 4대 급여 선정기준 — 생계 32%/의료 40%/주거 48%/교육 50%
  - 가구원수별 생계급여 선정기준액 (1인 820,556 ~ 6인 2,737,905)
  - 생계급여액 = 선정기준액 − 소득인정액
  - 소득인정액 = 소득평가액 + 재산의 소득환산액
  - 부양의무자 기준 — 생계·주거·교육 폐지(2021.10), 의료만 유지. 2026.1부터 의료 '부양비' 추가 폐지
  - 신청 절차 — 주민센터 / 복지로 / 6단계 + 이의신청 90일

