  차별화: 국민내일배움카드 — 대상(재직·실업·자영업자)·지원한도(300~500만원)·자비부담률·사용처(HRD-Net 인정 과정)·신청 절차(고용24). 기발행 국민취업지원제도·내일배움 관련 글과 내부링크, 직업훈련 비용 지원 단일 의도.
