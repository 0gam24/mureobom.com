must_cover:
  - 국민취업지원제도 개요 — 구직자취업촉진법, 고용노동부, 고용센터 운영
  - I형(취업지원서비스 + 구직촉진수당) — 저소득 구직자
  - II형(취업지원서비스만) — 청년·중장년 구직자
  - I형 자격 — 만 15~69세, 가구 소득 중위 60% 이하 + 재산 4억 이하 + 최근 2년 100일/800시간 일한 적
  - 구직촉진수당 — 월 50만 × 6개월 + 부양가족수당 (변동 가능)
  - II형 자격 — 청년(18~34세) 또는 저소득 중장년
  - 취업지원서비스 — 직업훈련·상담·구직활동·심리상담
  - 신청 방법 — 워크넷/고용24, 가까운 고용센터
  - 실업급여와 차이 — 실업급여(고용보험 가입자) vs 국민취업(비가입·신규 진입)

