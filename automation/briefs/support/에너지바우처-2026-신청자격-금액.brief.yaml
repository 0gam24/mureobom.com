id: support-에너지바우처-2026-신청자격-금액
cluster: support
status: published   # compliance gate passed

target_query: "에너지바우처 2026 신청자격 금액 여름·겨울"
search_intent: 절차형     # 자격 확인 + 신청 기간/금액/사용방법까지 함께 원함

signal:
  score: 76.4
  trend_momentum: 0.58
  question_volume: 0.49
  cluster_fit: 1.0
  freshness: 0.61

must_cover:
  - 에너지바우처 정의(전기·도시가스·지역난방·등유·LPG·연탄 등 요금 결제에 쓰는 이용권)
  - 2026년 신청자격 — 소득기준(생계·의료급여 수급자, 일부 주거·교육급여 포함 여부)
    + 가구원 요건(노인·영유아·장애인·임산부·중증질환자·희귀질환자·한부모·소년소녀가정)
  - 가구원 수별 지원금액 매트릭스(여름 바우처 / 겨울 바우처 각각, 2026 기준)
  - 신청 기간 캘린더(여름·겨울 신청 시기와 사용 기간이 다름 — 둘을 별도로)
  - 사용 방법 2종 — 요금차감(자동 차감) vs 국민행복카드(직접 결제) 장단점·전환 가능 여부
  - 잔액 환불·이월 가능 여부와 미사용 시 처리
  - 흔한 오해 바로잡기("소득 0이면 무조건 받는다"·"수급자면 신청 안 해도 자동" 등)

required_sources:
  - "에너지법 / 사회보장기본법 (국가법령정보센터 law.go.kr)"
  - "산업통상자원부 에너지복지 정책 (motie.go.kr)"
  - "한국에너지공단 에너지바우처 공식 안내 (energyv.or.kr — 도메인 검증 필요)"
  - "복지로 에너지바우처 서비스 안내 (bokjiro.go.kr)"

internal_links:
  - support/기초생활수급자-조건-혜택
  - support/긴급복지지원-신청-조건

compliance:
  medical_legal_financial_advice_disclaimer: true
  # F-01: 가구원 수·계절·연도별로 금액이 달라지므로 "X만원 무조건 지급" 단정 금지.
  # 모든 금액은 "2026년 기준, 가구원 수 N인 가구 여름/겨울 바우처" 형식으로 조건부 명시.

geo:
  faq_schema: true
  faq_pairs_min: 4
  llms_txt: true

human_notes: |
  차별화: 가구원 수별 + 여름/겨울 구분 지원금액 매트릭스 + 사용방법별(요금차감 vs 카드)
  장단점 + 신청 기간 캘린더.
  - 2026 기준 금액은 에너지공단 공고 확정본 인용 — 전년도 수치 답습 금지.
  - 여름·겨울은 신청 시기, 사용 기간, 금액이 모두 다름. 표에서 행/열로 분리.
  - 요금차감은 편하지만 가구가 사용하는 에너지원(도시가스/지역난방/LPG 등)이
    바우처 결제 가능한지에 따라 달라짐 — 카드 전환 사례 1~2개 포함.
  - "수급자면 자동 지급"은 오해. 신청 행위가 필요한지 vs 자동 책정 여부 명확히.
