human_notes: |
  차별화: 긴급복지 — 위기 사유(실직·질병·휴폐업 등)별 지원 종류·생계지원 금액(가구원수별)·소득재산 기준·신청(보건복지상담 129). 기발행 기초생활수급 글과 의도 분리(일시 긴급지원).
  검수 포인트: 생계지원 금액은 매년 고시로 바뀌니 2026 최신 가구원수별 지급액·기준중위소득 한도 명시.
  "기초생활수급과 같은 제도"라는 통념 반박 — 긴급복지는 위기 상황 일시·신속 지원(선지원 후조사)이고 수급은 상시 보장. 의도 겹치지 않게.
  자영업 휴·폐업과 단순 무직의 위기사유 인정 차이, 부정수급 시 환수 가능성 1단락 꼭.
