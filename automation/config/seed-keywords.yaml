# 물어봄 시드 키워드 사전
# - 각 클러스터의 seed: 데이터랩 트렌드 + kin API 질의에 사용
# - aliases: cluster_fit 매칭 강화를 위한 동의어/구어 표현
# - 분기마다 PoC 데이터 보고 갱신

clusters:

  tax:
    label: "세금"
    path: "/tax"
    seed:
      - 연말정산
      - 종합소득세 신고
      - 부가가치세 신고
      - 양도소득세
      - 종합소득세 환급
      - 사업소득 경비처리
      - 근로소득 원천징수
      - 4대보험 세금
      - 프리랜서 종합소득세
      - 주택임대소득 신고
    aliases: ["연말정산 환급", "세금 토해내기", "3.3 떼는거", "세금 신고 기간", "경정청구"]

  support:
    label: "정부지원금"
    path: "/support"
    seed:
      - 실업급여 조건
      - 실업급여 신청방법
      - 근로장려금
      - 자녀장려금
      - 청년도약계좌
      - 국민취업지원제도
      - 햇살론
      - 출산지원금
      - 에너지바우처
      - 긴급복지 지원
    aliases: ["실업급여 얼마", "정부지원금 신청", "지원금 자격", "받을 수 있나요", "소득기준"]

  loan:
    label: "대출·신용"
    path: "/loan"
    seed:
      - 전세자금대출 조건
      - 주택담보대출 한도
      - 신용대출 금리
      - 신용점수 올리기
      - 중도상환수수료
      - DSR 계산
      - 보금자리론
      - 디딤돌대출
      - 마이너스통장
      - 대출 갈아타기
    aliases: ["대출 얼마까지", "신용등급", "이자 줄이기", "대환대출", "한도 조회"]

  insurance:
    label: "보험·연금"
    path: "/insurance"
    seed:
      - 국민연금 수령액
      - 국민연금 임의가입
      - 건강보험 피부양자
      - 실손보험 청구
      - 연금저축 세액공제
      - 4대보험 가입
      - 퇴직연금 IRP
      - 국민연금 추납
      - 자동차보험 할증
      - 실비보험 중복
    aliases: ["연금 얼마 받나", "피부양자 자격", "보험 청구 방법", "세액공제 한도", "지역가입자"]
