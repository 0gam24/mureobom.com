<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 600" role="img" aria-label="추계신고 경비율 두 가지 비교: 직전연도 수입금액이 업종별 기준금액 미만이거나 신규사업자면 단순경비율(소득금액 = 수입금액 - 수입금액 곱하기 단순경비율), 기준금액 이상이면 기준경비율(소득금액 = 수입금액 - 주요경비 - 수입금액 곱하기 기준경비율). 복식부기의무자는 기준경비율의 2분의 1만 공제. 경비율 퍼센트는 매년 국세청 고시로 홈택스에서 조회.">
  <rect x="0" y="0" width="860" height="600" fill="#FBF7F0"/>

  <!-- 제목 -->
  <text x="40" y="46" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="25" font-weight="700" fill="#1A2B2A">추계신고 경비율 2가지: 단순경비율 vs 기준경비율</text>
  <text x="40" y="74" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="15" fill="#4A5856">장부 없이 종합소득세를 신고할 때, 국세청 고시 경비율로 필요경비를 추정하는 방식이에요</text>

  <!-- 갈림 판단 박스 -->
  <rect x="230" y="95" width="400" height="58" rx="10" fill="#E3F0EE" stroke="#0E7C72" stroke-width="1.5"/>
  <text x="430" y="122" text-anchor="middle" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="16" font-weight="700" fill="#0A5F58">직전연도 수입금액 &gt; 업종별 기준금액?</text>
  <text x="430" y="143" text-anchor="middle" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="13" fill="#4A5856">※ 신규사업자는 원칙적으로 단순경비율 적용</text>

  <!-- 갈림 화살표 -->
  <line x1="365" y1="153" x2="245" y2="177" stroke="#0E7C72" stroke-width="2"/>
  <polygon points="245,177 256,171 254,182" fill="#0E7C72"/>
  <line x1="495" y1="153" x2="615" y2="177" stroke="#C2873B" stroke-width="2"/>
  <polygon points="615,177 604,171 606,182" fill="#C2873B"/>
  <text x="300" y="171" text-anchor="middle" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="13" font-weight="700" fill="#0E7C72">미만</text>
  <text x="560" y="171" text-anchor="middle" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="13" font-weight="700" fill="#C2873B">이상</text>

  <!-- ===== 왼쪽 패널: 단순경비율 ===== -->
  <rect x="40" y="182" width="375" height="378" rx="12" fill="#F4EEE2"/>
  <rect x="60" y="200" width="180" height="34" rx="17" fill="#0E7C72"/>
  <text x="150" y="223" text-anchor="middle" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="17" font-weight="700" fill="#FBF7F0">단순경비율</text>

  <text x="60" y="268" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="13" fill="#8A938F">적용 대상</text>
  <text x="60" y="290" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="15" font-weight="700" fill="#1A2B2A">직전연도 수입금액이 업종별</text>
  <text x="60" y="311" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="15" font-weight="700" fill="#1A2B2A">기준금액 미만 · 신규사업자</text>

  <line x1="60" y1="328" x2="395" y2="328" stroke="#E3DCCF" stroke-width="1.5"/>

  <text x="60" y="354" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="13" fill="#8A938F">계산식</text>
  <rect x="60" y="366" width="335" height="86" rx="8" fill="#E3F0EE"/>
  <text x="78" y="398" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="15" font-weight="700" fill="#0A5F58">소득금액 = 수입금액</text>
  <text x="78" y="428" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="15" font-weight="700" fill="#0A5F58">− (수입금액 × 단순경비율)</text>

  <text x="60" y="500" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="14" fill="#4A5856">✓ 주요경비 증빙 없이 계산</text>
  <text x="60" y="526" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="14" fill="#4A5856">✓ 모두채움 신고 대상이 되기도 해요</text>

  <!-- ===== 오른쪽 패널: 기준경비율 ===== -->
  <rect x="445" y="182" width="375" height="378" rx="12" fill="#F4EEE2"/>
  <rect x="465" y="200" width="180" height="34" rx="17" fill="#C2873B"/>
  <text x="555" y="223" text-anchor="middle" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="17" font-weight="700" fill="#FBF7F0">기준경비율</text>

  <text x="465" y="268" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="13" fill="#8A938F">적용 대상</text>
  <text x="465" y="290" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="15" font-weight="700" fill="#1A2B2A">단순경비율 대상이 아닌 사업자</text>
  <text x="465" y="311" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="15" font-weight="700" fill="#1A2B2A">(수입금액 기준 이상)</text>

  <line x1="465" y1="328" x2="800" y2="328" stroke="#E3DCCF" stroke-width="1.5"/>

  <text x="465" y="354" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="13" fill="#8A938F">계산식</text>
  <rect x="465" y="366" width="335" height="86" rx="8" fill="#F4EEE2" stroke="#C2873B" stroke-width="1.2"/>
  <text x="483" y="398" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="15" font-weight="700" fill="#1A2B2A">소득금액 = 수입금액 − 주요경비</text>
  <text x="483" y="428" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="15" font-weight="700" fill="#1A2B2A">− (수입금액 × 기준경비율)</text>

  <rect x="465" y="472" width="335" height="70" rx="8" fill="#FBF7F0" stroke="#B5462F" stroke-width="1.5"/>
  <text x="483" y="500" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="14" font-weight="700" fill="#B5462F">복식부기의무자 주의</text>
  <text x="483" y="524" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="14" fill="#4A5856">기준경비율의 1/2만 필요경비로 공제</text>

  <!-- 하단 캡션 -->
  <text x="40" y="584" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="13" fill="#8A938F">업종별 경비율(%)은 매년 국세청이 고시해요 — 특정 수치는 홈택스 '기준·단순경비율 조회'에서 업종코드로 확인하세요.</text>
</svg>
