<svg viewBox="0 0 760 582" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="청년형 장기펀드 소득공제 요약: 대상 만 19~34세 총급여 5천만 원 이하, 연 600만 원의 40% 소득공제, 계약기간 3~5년, 3년 미만 해지 시 납입누계액 6% 추징, 신규 가입 2025년 12월 종료">
  <rect width="760" height="582" fill="#FBF7F0"/>

  <rect x="0" y="0" width="760" height="86" fill="#0A5F58"/>
  <text x="40" y="42" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="26" font-weight="700" fill="#FBF7F0">청년형 장기펀드 소득공제 한눈에</text>
  <text x="40" y="70" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="14" fill="#E3F0EE">조세특례제한법 제91조의20 · 2026년 7월 기준</text>

  <!-- Row 1 -->
  <rect x="40" y="104" width="680" height="66" rx="12" fill="#F4EEE2" stroke="#E3DCCF" stroke-width="1"/>
  <rect x="58" y="120" width="34" height="34" rx="9" fill="#0E7C72"/>
  <text x="75" y="143" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="18" font-weight="700" fill="#FBF7F0" text-anchor="middle">1</text>
  <text x="110" y="131" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="13" fill="#8A938F">대상 연령·소득</text>
  <text x="110" y="155" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="17" font-weight="600" fill="#1A2B2A">만 19~34세, 총급여 5천만 원 이하 (병역 최대 6년 차감)</text>

  <!-- Row 2 -->
  <rect x="40" y="182" width="680" height="66" rx="12" fill="#F4EEE2" stroke="#E3DCCF" stroke-width="1"/>
  <rect x="58" y="198" width="34" height="34" rx="9" fill="#0E7C72"/>
  <text x="75" y="221" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="18" font-weight="700" fill="#FBF7F0" text-anchor="middle">2</text>
  <text x="110" y="209" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="13" fill="#8A938F">납입 한도</text>
  <text x="110" y="233" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="17" font-weight="600" fill="#1A2B2A">연 600만 원</text>

  <!-- Row 3 -->
  <rect x="40" y="260" width="680" height="66" rx="12" fill="#F4EEE2" stroke="#E3DCCF" stroke-width="1"/>
  <rect x="58" y="276" width="34" height="34" rx="9" fill="#0E7C72"/>
  <text x="75" y="299" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="18" font-weight="700" fill="#FBF7F0" text-anchor="middle">3</text>
  <text x="110" y="287" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="13" fill="#8A938F">소득공제율</text>
  <text x="110" y="311" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="17" font-weight="600" fill="#0A5F58">납입액의 40% 소득공제 (세액공제 아님)</text>

  <!-- Row 4 -->
  <rect x="40" y="338" width="680" height="66" rx="12" fill="#F4EEE2" stroke="#E3DCCF" stroke-width="1"/>
  <rect x="58" y="354" width="34" height="34" rx="9" fill="#0E7C72"/>
  <text x="75" y="377" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="18" font-weight="700" fill="#FBF7F0" text-anchor="middle">4</text>
  <text x="110" y="365" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="13" fill="#8A938F">계약기간</text>
  <text x="110" y="389" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="17" font-weight="600" fill="#1A2B2A">3년 이상 5년 이하</text>

  <!-- Row 5 -->
  <rect x="40" y="416" width="680" height="66" rx="12" fill="#F4EEE2" stroke="#E3DCCF" stroke-width="1"/>
  <rect x="58" y="432" width="34" height="34" rx="9" fill="#B5462F"/>
  <text x="75" y="455" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="18" font-weight="700" fill="#FBF7F0" text-anchor="middle">5</text>
  <text x="110" y="443" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="13" fill="#8A938F">중도해지 추징</text>
  <text x="110" y="467" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="17" font-weight="600" fill="#B5462F">3년 미만 해지 시 납입누계액의 6% 추징</text>

  <!-- Sunset band -->
  <rect x="40" y="496" width="680" height="66" rx="12" fill="#E3F0EE" stroke="#E3DCCF" stroke-width="1"/>
  <circle cx="64" cy="521" r="7" fill="#C2873B"/>
  <text x="84" y="526" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="15" font-weight="700" fill="#0A5F58">신규 가입 종료 (2025.12.31 일몰)</text>
  <text x="84" y="549" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="14" fill="#4A5856">기존 가입자는 계약기간(3~5년) 동안 계속 납입·소득공제할 수 있어요</text>
</svg>
