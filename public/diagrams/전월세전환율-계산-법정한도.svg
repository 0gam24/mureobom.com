<svg viewBox="0 0 760 480" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="주택과 상가의 월세 전환율 상한 산정 구조 비교. 주택은 주택임대차보호법 제7조의2에 따라 min(기준금리+2%p, 10%)로, 기준금리 2.75%면 4.75%가 상한. 상가는 상가건물 임대차보호법 제12조에 따라 min(기준금리×4.5, 12%)로, 2.75%×4.5는 12.375%지만 캡 12%가 상한. 주택은 덧셈에 캡 10%, 상가는 곱셈에 캡 12%로 구조가 다름. 기준금리 2026-07-16 기준.">
  <rect x="0" y="0" width="760" height="480" fill="#FBF7F0"/>
  <text x="40" y="42" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="23" font-weight="700" fill="#1A2B2A">주택 vs 상가 월세 전환율 상한, 산정 구조가 달라요</text>
  <text x="40" y="68" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="13" fill="#4A5856">둘 다 법정 캡과 기준금리 연동값 중 낮은 값이 실제 상한이에요 (기준금리 연 2.75%, 2026-07-16 기준)</text>

  <!-- 주택 panel -->
  <rect x="40" y="92" width="330" height="312" fill="#F4EEE2"/>
  <rect x="40" y="92" width="330" height="54" fill="#0A5F58"/>
  <text x="58" y="122" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="18" font-weight="700" fill="#FBF7F0">주택 (주거용)</text>
  <text x="58" y="140" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="11.5" fill="#E3F0EE">주택임대차보호법 제7조의2 · 시행령 제9조</text>

  <text x="58" y="176" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="12" fill="#8A938F">산정식</text>
  <rect x="58" y="184" width="294" height="40" fill="#FBF7F0"/>
  <text x="205" y="209" text-anchor="middle" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="14.5" font-weight="700" fill="#1A2B2A">min( 기준금리 + 2%p , 10% )</text>

  <text x="58" y="250" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="12" fill="#8A938F">대입 (기준금리 2.75%)</text>
  <rect x="58" y="258" width="294" height="40" fill="#FBF7F0"/>
  <text x="205" y="283" text-anchor="middle" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="13" fill="#4A5856">min( 2.75%+2%p=4.75% , 10% )</text>

  <rect x="58" y="322" width="294" height="58" fill="#E3F0EE"/>
  <text x="76" y="346" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="12" fill="#4A5856">실제 상한</text>
  <text x="76" y="372" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="22" font-weight="700" fill="#0A5F58">연 4.75%</text>
  <text x="212" y="346" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="11" fill="#8A938F">= 기준금리 + 2%p</text>
  <text x="212" y="366" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="11" fill="#8A938F">(캡 10%보다 낮음)</text>

  <!-- 상가 panel -->
  <rect x="390" y="92" width="330" height="312" fill="#F4EEE2"/>
  <rect x="390" y="92" width="330" height="54" fill="#0E7C72"/>
  <text x="408" y="122" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="18" font-weight="700" fill="#FBF7F0">상가 (상업용)</text>
  <text x="408" y="140" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="11.5" fill="#E3F0EE">상가건물 임대차보호법 제12조 · 시행령</text>

  <text x="408" y="176" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="12" fill="#8A938F">산정식</text>
  <rect x="408" y="184" width="294" height="40" fill="#FBF7F0"/>
  <text x="555" y="209" text-anchor="middle" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="14.5" font-weight="700" fill="#1A2B2A">min( 기준금리 × 4.5 , 12% )</text>

  <text x="408" y="250" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="12" fill="#8A938F">대입 (기준금리 2.75%)</text>
  <rect x="408" y="258" width="294" height="40" fill="#FBF7F0"/>
  <text x="555" y="283" text-anchor="middle" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="12.5" fill="#4A5856">min( 2.75%×4.5=12.375% , 12% )</text>

  <rect x="408" y="322" width="294" height="58" fill="#E3F0EE"/>
  <text x="426" y="346" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="12" fill="#4A5856">실제 상한</text>
  <text x="426" y="372" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="22" font-weight="700" fill="#0A5F58">연 12%</text>
  <text x="540" y="346" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="11" fill="#8A938F">= 법정 캡</text>
  <text x="540" y="366" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="11" fill="#8A938F">(연동값 12.375%보다 낮음)</text>

  <!-- footnote -->
  <rect x="40" y="420" width="680" height="40" fill="#F4EEE2"/>
  <text x="58" y="444" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="12.5" font-weight="700" fill="#B5462F">유의</text>
  <text x="94" y="444" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="12.5" fill="#1A2B2A">기준금리는 금통위 결정으로 변동해요. 위 상한은 2026-07-18 기준값이며, 금리가 바뀌면 상한도 달라져요.</text>
</svg>
