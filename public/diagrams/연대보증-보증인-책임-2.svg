<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 400" role="img" aria-labelledby="prot-title prot-desc" font-family="'IBM Plex Sans KR', system-ui, sans-serif">
  <title id="prot-title">보증인 보호 4가지 장치</title>
  <desc id="prot-desc">서면 방식으로 구두보증은 무효(민법 제428조의2), 최고액을 서면에 특정하지 않은 백지·포괄보증은 무효(민법 제428조의3·특별법 제4·6조), 보증기간 약정이 없으면 3년으로 봄(특별법 제7조), 주채무 연체 시 채권자의 통지의무는 금융기관 1개월·일반 채권자 3개월(특별법 제5조·민법 제436조의2).</desc>

  <!-- 배경 -->
  <rect x="0" y="0" width="680" height="400" fill="#FBF7F0"/>

  <!-- 제목 -->
  <text x="32" y="36" font-size="17" font-weight="700" fill="#1A2B2A">보증인을 지켜주는 4가지 장치</text>
  <text x="32" y="58" font-size="11.5" fill="#8A938F">보증 서기 전·후에 이 요건이 지켜졌는지 확인하세요</text>

  <!-- Card1 서면 방식 -->
  <rect x="24" y="76" width="632" height="68" rx="10" ry="10" fill="#F4EEE2" stroke="#E3DCCF" stroke-width="1"/>
  <circle cx="60" cy="110" r="18" fill="#0E7C72"/>
  <text x="60" y="115" text-anchor="middle" font-size="15" font-weight="700" fill="#FBF7F0">1</text>
  <text x="96" y="104" font-size="13.5" font-weight="700" fill="#1A2B2A">서면 방식 — 구두보증은 무효</text>
  <text x="96" y="126" font-size="10.5" fill="#4A5856">보증은 보증인이 서명·기명날인한 서면이라야 효력이 생겨요</text>
  <rect x="500" y="94" width="140" height="32" rx="6" ry="6" fill="#E3F0EE" stroke="#0E7C72" stroke-width="1"/>
  <text x="570" y="114" text-anchor="middle" font-size="10.5" fill="#0A5F58">민법 제428조의2</text>

  <!-- Card2 최고액 서면 특정 -->
  <rect x="24" y="154" width="632" height="68" rx="10" ry="10" fill="#F4EEE2" stroke="#E3DCCF" stroke-width="1"/>
  <circle cx="60" cy="188" r="18" fill="#0E7C72"/>
  <text x="60" y="193" text-anchor="middle" font-size="15" font-weight="700" fill="#FBF7F0">2</text>
  <text x="96" y="182" font-size="13.5" font-weight="700" fill="#1A2B2A">최고액 서면 특정 — 백지보증 무효</text>
  <text x="96" y="204" font-size="10.5" fill="#4A5856">얼마까지 책임지는지 최고액을 서면에 못 적으면 (근)보증은 무효</text>
  <rect x="500" y="172" width="140" height="32" rx="6" ry="6" fill="#E3F0EE" stroke="#0E7C72" stroke-width="1"/>
  <text x="570" y="192" text-anchor="middle" font-size="10.5" fill="#0A5F58">민법 428의3·특별법 4·6</text>

  <!-- Card3 보증기간 -->
  <rect x="24" y="232" width="632" height="68" rx="10" ry="10" fill="#F4EEE2" stroke="#E3DCCF" stroke-width="1"/>
  <circle cx="60" cy="266" r="18" fill="#0E7C72"/>
  <text x="60" y="271" text-anchor="middle" font-size="15" font-weight="700" fill="#FBF7F0">3</text>
  <text x="96" y="260" font-size="13.5" font-weight="700" fill="#1A2B2A">보증기간 — 약정 없으면 3년</text>
  <text x="96" y="282" font-size="10.5" fill="#4A5856">기간을 정하지 않으면 그 보증기간은 3년으로 봐요</text>
  <rect x="500" y="250" width="140" height="32" rx="6" ry="6" fill="#E3F0EE" stroke="#0E7C72" stroke-width="1"/>
  <text x="570" y="270" text-anchor="middle" font-size="10.5" fill="#0A5F58">특별법 제7조</text>

  <!-- Card4 통지의무 -->
  <rect x="24" y="310" width="632" height="68" rx="10" ry="10" fill="#F4EEE2" stroke="#E3DCCF" stroke-width="1"/>
  <circle cx="60" cy="344" r="18" fill="#0E7C72"/>
  <text x="60" y="349" text-anchor="middle" font-size="15" font-weight="700" fill="#FBF7F0">4</text>
  <text x="96" y="338" font-size="13.5" font-weight="700" fill="#1A2B2A">채권자의 통지의무 — 연체 알림</text>
  <text x="96" y="360" font-size="10.5" fill="#4A5856">주채무 연체 시 통지 (금융기관 1개월·일반 채권자 3개월)</text>
  <rect x="500" y="328" width="140" height="32" rx="6" ry="6" fill="#E3F0EE" stroke="#0E7C72" stroke-width="1"/>
  <text x="570" y="348" text-anchor="middle" font-size="10.5" fill="#0A5F58">특별법 5·민법 436의2</text>
</svg>
