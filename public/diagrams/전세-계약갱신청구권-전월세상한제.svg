<svg viewBox="0 0 760 570" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="계약갱신요구권 행사 기간 타임라인과 전월세 증액 상한 5% 계산. 임대차 종료 6개월 전부터 2개월 전까지 갱신을 요구할 수 있고, 1회 한정에 갱신되면 2년 거주. 증액은 5% 이내라 보증금 3억원이면 최대 1,500만원, 월세 60만원이면 최대 3만원까지. 증액 후 1년 이내 재증액 불가, 새 임차인과의 신규 계약에는 미적용.">
  <rect x="0" y="0" width="760" height="570" fill="#FBF7F0"/>
  <text x="40" y="42" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="23" font-weight="700" fill="#1A2B2A">계약갱신요구권 행사 기간과 전월세 5% 상한</text>
  <text x="40" y="68" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="13" fill="#4A5856">주택임대차보호법 제6조의3·제7조, 시행령 제8조 기준 (2026-07-19)</text>

  <!-- 타임라인 -->
  <text x="40" y="106" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="14" font-weight="700" fill="#0A5F58">행사 기간 · 임대차 종료일 기준</text>
  <rect x="40" y="124" width="240" height="46" fill="#E3DCCF"/>
  <rect x="280" y="124" width="280" height="46" fill="#0E7C72"/>
  <rect x="560" y="124" width="160" height="46" fill="#F4EEE2" stroke="#E3DCCF" stroke-width="1"/>
  <text x="160" y="152" text-anchor="middle" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="13" fill="#4A5856">계약 기간 진행 중</text>
  <text x="420" y="152" text-anchor="middle" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="14" font-weight="700" fill="#FBF7F0">갱신요구 가능 기간</text>
  <text x="640" y="152" text-anchor="middle" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="13" fill="#B5462F">행사 기한 지남</text>
  <line x1="280" y1="170" x2="280" y2="180" stroke="#8A938F" stroke-width="1.5"/>
  <line x1="560" y1="170" x2="560" y2="180" stroke="#8A938F" stroke-width="1.5"/>
  <line x1="720" y1="170" x2="720" y2="180" stroke="#8A938F" stroke-width="1.5"/>
  <text x="280" y="196" text-anchor="middle" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="12" font-weight="700" fill="#1A2B2A">종료 6개월 전</text>
  <text x="560" y="196" text-anchor="middle" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="12" font-weight="700" fill="#1A2B2A">종료 2개월 전</text>
  <text x="720" y="196" text-anchor="end" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="12" font-weight="700" fill="#1A2B2A">계약 종료일</text>

  <rect x="40" y="212" width="88" height="28" fill="#C2873B"/>
  <text x="84" y="231" text-anchor="middle" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="13" font-weight="700" fill="#FBF7F0">1회 한정</text>
  <rect x="140" y="212" width="108" height="28" fill="#0A5F58"/>
  <text x="194" y="231" text-anchor="middle" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="13" font-weight="700" fill="#FBF7F0">갱신되면 2년</text>
  <text x="262" y="231" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="12.5" fill="#4A5856">기간 내 요구하면 임대인은 정당한 사유 없이 거절하지 못해요</text>

  <!-- 5% 상한 계산 -->
  <text x="40" y="280" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="14" font-weight="700" fill="#0A5F58">증액 상한 · 갱신 때 5%를 넘지 못해요 (가정 값 예시)</text>

  <rect x="40" y="296" width="336" height="170" fill="#F4EEE2"/>
  <text x="58" y="324" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="14.5" font-weight="700" fill="#1A2B2A">전세 보증금 3억원이라면</text>
  <text x="58" y="350" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="12" fill="#8A938F">최대 증액</text>
  <rect x="58" y="358" width="300" height="36" fill="#FBF7F0"/>
  <text x="208" y="381" text-anchor="middle" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="13.5" fill="#1A2B2A">3억원 × 5% = 1,500만원</text>
  <rect x="58" y="406" width="300" height="44" fill="#E3F0EE"/>
  <text x="76" y="424" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="11.5" fill="#4A5856">갱신 후 상한</text>
  <text x="76" y="443" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="16" font-weight="700" fill="#0A5F58">최대 3억 1,500만원</text>

  <rect x="384" y="296" width="336" height="170" fill="#F4EEE2"/>
  <text x="402" y="324" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="14.5" font-weight="700" fill="#1A2B2A">월세 60만원이라면</text>
  <text x="402" y="350" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="12" fill="#8A938F">최대 증액</text>
  <rect x="402" y="358" width="300" height="36" fill="#FBF7F0"/>
  <text x="552" y="381" text-anchor="middle" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="13.5" fill="#1A2B2A">60만원 × 5% = 3만원</text>
  <rect x="402" y="406" width="300" height="44" fill="#E3F0EE"/>
  <text x="420" y="424" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="11.5" fill="#4A5856">갱신 후 상한</text>
  <text x="420" y="443" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="16" font-weight="700" fill="#0A5F58">최대 월 63만원</text>

  <!-- 유의 -->
  <rect x="40" y="486" width="680" height="62" fill="#F4EEE2"/>
  <text x="58" y="510" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="12.5" font-weight="700" fill="#B5462F">유의</text>
  <text x="94" y="510" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="12.5" fill="#1A2B2A">증액 후 1년 이내에는 다시 증액을 청구하지 못하고, 시·도 조례로 상한이 더 낮을 수 있어요.</text>
  <text x="58" y="532" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="12" fill="#4A5856">5% 상한은 계약을 이어갈 때의 증액청구 기준이에요. 새 임차인과 맺는 신규 계약에는 적용되지 않아요.</text>
</svg>
