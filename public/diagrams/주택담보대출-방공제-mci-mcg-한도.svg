<svg viewBox="0 0 760 560" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="주택담보대출 방공제와 MCG 구조: 시세 5억원 아파트에 LTV 70%를 적용하면 3억 5,000만원, 여기서 지역별 최우선변제 소액임차보증금(그 밖의 지역 2,500만원)을 방공제로 빼면 실제 한도는 3억 2,500만원. HF 모기지신용보증(MCG)에 가입하면 공제분 2,500만원을 되살려 3억 5,000만원까지 가능하고 보증료는 차용인이 연 0.05~0.35% 부담. 규제지역은 LTV 40% 기준으로 다시 계산.">
  <rect x="0" y="0" width="760" height="560" fill="#FBF7F0"/>

  <text x="40" y="46" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="24" font-weight="700" fill="#1A2B2A">방공제로 깎인 한도, MCG로 되살리는 구조</text>
  <text x="40" y="72" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="13.5" fill="#4A5856">가정 예시: 비규제지역 시세 5억원 아파트, 기준 LTV 70%, 그 밖의 지역 방공제 2,500만원</text>

  <!-- step 1 -->
  <rect x="40" y="100" width="210" height="96" fill="#F4EEE2"/>
  <rect x="40" y="100" width="210" height="5" fill="#0A5F58"/>
  <text x="58" y="130" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="12.5" font-weight="700" fill="#8A938F">1단계</text>
  <text x="58" y="152" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="15" font-weight="700" fill="#1A2B2A">담보 시세</text>
  <text x="58" y="180" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="20" font-weight="700" fill="#0A5F58">5억원</text>

  <polygon points="258,142 274,150 258,158" fill="#0E7C72"/>

  <!-- step 2 -->
  <rect x="282" y="100" width="210" height="96" fill="#F4EEE2"/>
  <rect x="282" y="100" width="210" height="5" fill="#0A5F58"/>
  <text x="300" y="130" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="12.5" font-weight="700" fill="#8A938F">2단계</text>
  <text x="300" y="152" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="15" font-weight="700" fill="#1A2B2A">LTV 70% 적용</text>
  <text x="300" y="180" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="20" font-weight="700" fill="#0A5F58">3억 5,000만원</text>

  <polygon points="500,142 516,150 500,158" fill="#0E7C72"/>

  <!-- step 3 -->
  <rect x="524" y="100" width="196" height="96" fill="#F4EEE2"/>
  <rect x="524" y="100" width="196" height="5" fill="#B5462F"/>
  <text x="542" y="130" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="12.5" font-weight="700" fill="#8A938F">3단계</text>
  <text x="542" y="152" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="15" font-weight="700" fill="#1A2B2A">방공제 차감</text>
  <text x="542" y="180" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="20" font-weight="700" fill="#B5462F">-2,500만원</text>

  <!-- result A -->
  <rect x="40" y="216" width="330" height="86" fill="#F4EEE2"/>
  <text x="60" y="246" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="13.5" font-weight="700" fill="#4A5856">MCG 없이 받는 실제 한도</text>
  <text x="60" y="280" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="24" font-weight="700" fill="#B5462F">3억 2,500만원</text>

  <!-- result B -->
  <rect x="390" y="216" width="330" height="86" fill="#E3F0EE"/>
  <text x="410" y="246" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="13.5" font-weight="700" fill="#4A5856">MCG 가입 시 회복된 한도</text>
  <text x="410" y="280" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="24" font-weight="700" fill="#0A5F58">3억 5,000만원</text>

  <!-- divider -->
  <rect x="40" y="322" width="680" height="1" fill="#E3DCCF"/>

  <!-- MCG panel -->
  <text x="40" y="352" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="17" font-weight="700" fill="#1A2B2A">MCG(모기지신용보증) 기본 조건</text>

  <rect x="40" y="366" width="220" height="86" fill="#E3F0EE"/>
  <text x="58" y="392" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="12.5" font-weight="700" fill="#4A5856">보증한도</text>
  <text x="58" y="416" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="15" font-weight="700" fill="#0A5F58">통합 3억원</text>
  <text x="58" y="438" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="13" fill="#1A2B2A">보증종류별 1억원</text>

  <rect x="270" y="366" width="220" height="86" fill="#E3F0EE"/>
  <text x="288" y="392" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="12.5" font-weight="700" fill="#4A5856">보증료</text>
  <text x="288" y="416" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="15" font-weight="700" fill="#C2873B">연 0.05~0.35%</text>
  <text x="288" y="438" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="13" fill="#1A2B2A">차용인 부담</text>

  <rect x="500" y="366" width="220" height="86" fill="#E3F0EE"/>
  <text x="518" y="392" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="12.5" font-weight="700" fill="#4A5856">신청 시기</text>
  <text x="518" y="416" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="15" font-weight="700" fill="#0A5F58">구입용도 3개월 이내</text>
  <text x="518" y="438" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="13" fill="#1A2B2A">소유권이전등기일 기준</text>

  <!-- note -->
  <rect x="40" y="468" width="680" height="66" fill="#F4EEE2"/>
  <text x="58" y="494" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="12.5" font-weight="700" fill="#B5462F">유의</text>
  <text x="98" y="494" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="12.5" fill="#1A2B2A">규제지역은 기준 LTV가 40%라 같은 5억원이라도 2억원에서 방공제를 다시 빼고 계산해요.</text>
  <text x="58" y="518" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="12.5" fill="#4A5856">위 금액은 이해를 돕는 가정 예시예요. 실제 승인 한도와 보증료율은 개인 조건에 따라 달라져요.</text>
</svg>
