<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 392" role="img" aria-labelledby="cmp-title cmp-desc" font-family="'IBM Plex Sans KR', system-ui, sans-serif">
  <title id="cmp-title">(단순)보증과 연대보증 비교</title>
  <desc id="cmp-desc">최고의 항변과 검색의 항변은 (단순)보증인에게는 있으나 연대보증인에게는 없어, 채권자가 주채무자를 거치지 않고 연대보증인에게 바로 전액을 청구할 수 있다는 민법 제437조 단서 비교표. 두 보증 모두 책임 범위는 원금·이자·위약금·지연손해금까지 미친다(민법 제429조).</desc>

  <!-- 배경 -->
  <rect x="0" y="0" width="680" height="392" fill="#FBF7F0"/>

  <!-- 제목 -->
  <text x="32" y="36" font-size="17" font-weight="700" fill="#1A2B2A">(단순)보증 vs 연대보증, 무엇이 다를까?</text>
  <text x="32" y="58" font-size="11.5" fill="#8A938F">핵심 차이는 '최고·검색의 항변' 유무예요 — 민법 제437조 단서</text>

  <!-- 열 머리글 -->
  <rect x="236" y="74" width="200" height="38" rx="8" ry="8" fill="#F4EEE2" stroke="#E3DCCF" stroke-width="1"/>
  <text x="336" y="99" text-anchor="middle" font-size="14" font-weight="700" fill="#1A2B2A">(단순)보증</text>
  <rect x="448" y="74" width="200" height="38" rx="8" ry="8" fill="#0E7C72" stroke="#0A5F58" stroke-width="1"/>
  <text x="548" y="99" text-anchor="middle" font-size="14" font-weight="700" fill="#FBF7F0">연대보증</text>

  <!-- Row1 최고의 항변 -->
  <rect x="24" y="122" width="200" height="52" rx="8" ry="8" fill="#F4EEE2" stroke="#E3DCCF" stroke-width="1"/>
  <text x="40" y="146" font-size="12.5" font-weight="700" fill="#1A2B2A">최고(催告)의 항변</text>
  <text x="40" y="164" font-size="10" fill="#4A5856">"먼저 주채무자에게 청구하라"</text>
  <rect x="236" y="122" width="200" height="52" rx="8" ry="8" fill="#E3F0EE" stroke="#0E7C72" stroke-width="1"/>
  <text x="336" y="147" text-anchor="middle" font-size="13" font-weight="700" fill="#0A5F58">있음</text>
  <text x="336" y="164" text-anchor="middle" font-size="10" fill="#4A5856">요구할 수 있어요</text>
  <rect x="448" y="122" width="200" height="52" rx="8" ry="8" fill="#FBF7F0" stroke="#B5462F" stroke-width="1"/>
  <text x="548" y="147" text-anchor="middle" font-size="13" font-weight="700" fill="#B5462F">없음</text>
  <text x="548" y="164" text-anchor="middle" font-size="10" fill="#4A5856">요구할 수 없어요</text>

  <!-- Row2 검색의 항변 -->
  <rect x="24" y="184" width="200" height="52" rx="8" ry="8" fill="#F4EEE2" stroke="#E3DCCF" stroke-width="1"/>
  <text x="40" y="208" font-size="12.5" font-weight="700" fill="#1A2B2A">검색(檢索)의 항변</text>
  <text x="40" y="226" font-size="10" fill="#4A5856">"주채무자 재산 먼저 집행하라"</text>
  <rect x="236" y="184" width="200" height="52" rx="8" ry="8" fill="#E3F0EE" stroke="#0E7C72" stroke-width="1"/>
  <text x="336" y="209" text-anchor="middle" font-size="13" font-weight="700" fill="#0A5F58">있음</text>
  <text x="336" y="226" text-anchor="middle" font-size="10" fill="#4A5856">요구할 수 있어요</text>
  <rect x="448" y="184" width="200" height="52" rx="8" ry="8" fill="#FBF7F0" stroke="#B5462F" stroke-width="1"/>
  <text x="548" y="209" text-anchor="middle" font-size="13" font-weight="700" fill="#B5462F">없음</text>
  <text x="548" y="226" text-anchor="middle" font-size="10" fill="#4A5856">요구할 수 없어요</text>

  <!-- Row3 채권자의 청구 -->
  <rect x="24" y="246" width="200" height="52" rx="8" ry="8" fill="#F4EEE2" stroke="#E3DCCF" stroke-width="1"/>
  <text x="40" y="270" font-size="12.5" font-weight="700" fill="#1A2B2A">채권자의 청구</text>
  <text x="40" y="288" font-size="10" fill="#4A5856">누구에게 먼저 청구하나?</text>
  <rect x="236" y="246" width="200" height="52" rx="8" ry="8" fill="#E3F0EE" stroke="#0E7C72" stroke-width="1"/>
  <text x="336" y="271" text-anchor="middle" font-size="12.5" font-weight="700" fill="#0A5F58">주채무자 먼저</text>
  <text x="336" y="288" text-anchor="middle" font-size="10" fill="#4A5856">순서를 요구할 수 있어요</text>
  <rect x="448" y="246" width="200" height="52" rx="8" ry="8" fill="#FBF7F0" stroke="#B5462F" stroke-width="1"/>
  <text x="548" y="271" text-anchor="middle" font-size="12.5" font-weight="700" fill="#B5462F">보증인에게 바로</text>
  <text x="548" y="288" text-anchor="middle" font-size="10" fill="#4A5856">전액 청구가 가능해요</text>

  <!-- 하단 공통 안내 -->
  <rect x="24" y="330" width="624" height="44" rx="8" ry="8" fill="#E3F0EE" stroke="#0E7C72" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="336" y="357" text-anchor="middle" font-size="11" fill="#1A2B2A">두 보증 모두 책임 범위는 원금+이자+위약금+지연손해금까지예요 (민법 제429조)</text>
</svg>
