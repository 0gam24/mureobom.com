<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 520" role="img" aria-label="조기노령연금 연령별 지급률: 개시연령보다 5년 전 70퍼센트, 4년 전 76퍼센트, 3년 전 82퍼센트, 2년 전 88퍼센트, 1년 전 94퍼센트, 개시연령 100퍼센트, 5년 연기 136퍼센트">
  <rect x="0" y="0" width="820" height="520" fill="#FBF7F0"/>
  <text x="40" y="44" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="25" font-weight="700" fill="#1A2B2A">조기노령연금 연령별 지급률 (개시연령 대비)</text>
  <text x="40" y="73" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="16" fill="#4A5856">1년 앞당길 때마다 6%씩 감액 · 최대 5년 30% 감액 · 한번 정하면 평생 적용</text>

  <rect x="40" y="92" width="740" height="342" rx="10" fill="#F4EEE2"/>

  <!-- 정상 100% 기준선 -->
  <line x1="60" y1="196" x2="762" y2="196" stroke="#8A938F" stroke-width="1.5" stroke-dasharray="6 5"/>
  <text x="756" y="190" text-anchor="end" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="13" fill="#8A938F">정상 100% 기준선</text>

  <!-- 기준(바닥)선 -->
  <line x1="60" y1="434" x2="762" y2="434" stroke="#E3DCCF" stroke-width="2"/>

  <!-- 조기수령 5개 막대 (틸) -->
  <rect x="70"  y="265" width="60" height="169" rx="3" fill="#0E7C72"/>
  <rect x="170" y="251" width="60" height="183" rx="3" fill="#0E7C72"/>
  <rect x="270" y="237" width="60" height="197" rx="3" fill="#0E7C72"/>
  <rect x="370" y="224" width="60" height="210" rx="3" fill="#0E7C72"/>
  <rect x="470" y="210" width="60" height="224" rx="3" fill="#0E7C72"/>
  <!-- 정상수령 (딥틸) -->
  <rect x="570" y="196" width="60" height="238" rx="3" fill="#0A5F58"/>
  <!-- 연기연금 5년 (골드) -->
  <rect x="670" y="113" width="60" height="321" rx="3" fill="#C2873B"/>

  <!-- 지급률 라벨 -->
  <text x="100" y="257" text-anchor="middle" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="17" font-weight="700" fill="#0A5F58">70%</text>
  <text x="200" y="243" text-anchor="middle" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="17" font-weight="700" fill="#0A5F58">76%</text>
  <text x="300" y="229" text-anchor="middle" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="17" font-weight="700" fill="#0A5F58">82%</text>
  <text x="400" y="216" text-anchor="middle" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="17" font-weight="700" fill="#0A5F58">88%</text>
  <text x="500" y="202" text-anchor="middle" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="17" font-weight="700" fill="#0A5F58">94%</text>
  <text x="600" y="188" text-anchor="middle" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="17" font-weight="700" fill="#1A2B2A">100%</text>
  <text x="700" y="105" text-anchor="middle" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="17" font-weight="700" fill="#C2873B">136%</text>

  <!-- x축 라벨 (개시연령 대비) -->
  <text x="100" y="456" text-anchor="middle" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="14" fill="#0E7C72">5년 전</text>
  <text x="200" y="456" text-anchor="middle" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="14" fill="#0E7C72">4년 전</text>
  <text x="300" y="456" text-anchor="middle" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="14" fill="#0E7C72">3년 전</text>
  <text x="400" y="456" text-anchor="middle" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="14" fill="#0E7C72">2년 전</text>
  <text x="500" y="456" text-anchor="middle" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="14" fill="#0E7C72">1년 전</text>
  <text x="600" y="456" text-anchor="middle" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="14" fill="#0A5F58">개시연령</text>
  <text x="700" y="456" text-anchor="middle" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="14" fill="#C2873B">5년 연기</text>

  <!-- 캡션: 실제 나이는 출생연도별로 다름 -->
  <text x="40" y="495" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="13" fill="#8A938F">예시(1965~1968년생, 개시연령 64세): 5년 전=59세 · 4년 전=60세 · 3년 전=61세 · 2년 전=62세 · 1년 전=63세.</text>
  <text x="40" y="513" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="13" fill="#8A938F">정상 개시연령은 출생연도별로 달라 실제 나이도 달라져요(1969년생 이후는 개시 65세 → 조기 60~64세).</text>
</svg>
