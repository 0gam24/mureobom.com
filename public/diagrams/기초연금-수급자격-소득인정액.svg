<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 550" role="img" aria-label="기초연금 소득인정액 계산 구조. 소득평가액은 근로소득에서 기본공제 116만 원을 뺀 뒤 70퍼센트를 반영하고 기타소득을 더한 금액, 재산의 소득환산액은 재산에서 기본재산 공제와 부채를 뺀 뒤 연 4퍼센트를 곱하고 12개월로 나눈 금액. 둘을 더한 소득인정액이 2026년 단독가구 247만 원, 부부가구 395만 2천 원 이하면 기초연금 대상">
  <rect x="0" y="0" width="860" height="550" fill="#FBF7F0"/>

  <text x="40" y="44" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="25" font-weight="700" fill="#1A2B2A">소득인정액 = 소득평가액 + 재산의 소득환산액</text>
  <text x="40" y="72" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="15" fill="#4A5856">통장에 찍히는 월급이 아니라, 소득과 재산을 함께 환산한 금액으로 판정합니다 (2026년 공식 안내 기준)</text>

  <!-- 왼쪽: 소득평가액 -->
  <rect x="40" y="96" width="360" height="42" rx="8" fill="#0E7C72"/>
  <text x="220" y="124" text-anchor="middle" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="17" font-weight="700" fill="#FBF7F0">① 소득평가액</text>
  <rect x="40" y="138" width="360" height="162" rx="8" fill="#E3F0EE"/>
  <text x="220" y="172" text-anchor="middle" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="16" fill="#1A2B2A">(근로소득 − 116만 원) × 70%</text>
  <text x="220" y="198" text-anchor="middle" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="13" fill="#8A938F">기본공제 116만 원 차감 후 30% 추가공제</text>
  <text x="220" y="234" text-anchor="middle" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="15" fill="#1A2B2A">+ 사업 · 재산 · 공적이전소득 등</text>
  <text x="220" y="272" text-anchor="middle" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="18" font-weight="700" fill="#0A5F58">= 소득평가액</text>

  <!-- 가운데 플러스 -->
  <text x="430" y="228" text-anchor="middle" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="34" font-weight="700" fill="#C2873B">+</text>

  <!-- 오른쪽: 재산의 소득환산액 -->
  <rect x="460" y="96" width="360" height="42" rx="8" fill="#0E7C72"/>
  <text x="640" y="124" text-anchor="middle" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="17" font-weight="700" fill="#FBF7F0">② 재산의 소득환산액</text>
  <rect x="460" y="138" width="360" height="162" rx="8" fill="#E3F0EE"/>
  <text x="640" y="172" text-anchor="middle" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="16" fill="#1A2B2A">(재산 − 기본재산 공제 − 부채)</text>
  <text x="640" y="198" text-anchor="middle" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="16" fill="#1A2B2A">× 연 4% ÷ 12개월</text>
  <text x="640" y="232" text-anchor="middle" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="13" fill="#8A938F">기본재산 공제: 대도시 1억 3,500만 원</text>
  <text x="640" y="252" text-anchor="middle" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="13" fill="#8A938F">중소도시 8,500만 원 · 농어촌 7,250만 원</text>
  <text x="640" y="286" text-anchor="middle" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="18" font-weight="700" fill="#0A5F58">= 재산의 소득환산액</text>

  <!-- 아래 화살표 -->
  <line x1="430" y1="302" x2="430" y2="326" stroke="#0E7C72" stroke-width="2"/>
  <polygon points="424,326 436,326 430,336" fill="#0E7C72"/>

  <!-- 합계 -->
  <rect x="40" y="340" width="780" height="60" rx="10" fill="#F4EEE2" stroke="#0E7C72" stroke-width="2"/>
  <text x="430" y="378" text-anchor="middle" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="20" font-weight="700" fill="#0A5F58">소득인정액 = ① 소득평가액 + ② 재산의 소득환산액</text>

  <!-- 선정기준액 비교 -->
  <rect x="40" y="416" width="380" height="66" rx="8" fill="#E3F0EE"/>
  <text x="230" y="443" text-anchor="middle" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="14" fill="#4A5856">2026년 단독가구 선정기준액</text>
  <text x="230" y="470" text-anchor="middle" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="19" font-weight="700" fill="#0E7C72">월 2,470,000원 이하</text>

  <rect x="440" y="416" width="380" height="66" rx="8" fill="#E3F0EE"/>
  <text x="630" y="443" text-anchor="middle" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="14" fill="#4A5856">2026년 부부가구 선정기준액</text>
  <text x="630" y="470" text-anchor="middle" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="19" font-weight="700" fill="#0E7C72">월 3,952,000원 이하</text>

  <text x="40" y="508" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="13" fill="#8A938F">소득인정액이 선정기준액 이하이면 기초연금 대상이 됩니다. 2026년 기준연금액(최대 지급액)은 월 349,700원입니다.</text>
  <text x="40" y="530" font-family="'IBM Plex Sans KR', system-ui, sans-serif" font-size="13" fill="#8A938F">선정기준액 · 기준연금액은 매년 1월 보건복지부 고시로 바뀝니다. 실제 판정은 복지로 모의계산과 국민연금공단 확인이 필요합니다.</text>
</svg>
